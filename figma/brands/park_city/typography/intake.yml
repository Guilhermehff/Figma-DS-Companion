validation:
  extraction_notes:
  - The source is explicit about family choice, case, tracking, and leading behavior.
  - The source does not provide governed numeric sizes, so live size semantics remain inherited from the
    shared baseline.
  - Park City uses one primary family across headline, body, and CTA, with a separate condensed face only
    for subheads.
  governance_notes:
  - The Park City condensed Trade Gothic face is preserved as a raw utility family rather than forced
    into a semantic slot that would misrepresent the CTA guidance.
  - No new shared raw weight or size primitives are needed in this pass.
  - Brand-safe typography aliases now stage on `park_city/family_safe/*` from Vail Resorts Guidelines.pdf.
