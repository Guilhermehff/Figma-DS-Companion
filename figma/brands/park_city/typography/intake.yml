  source_safe_reference_column: cta_font
primitive_recommendations:
  reuse_existing:
    families: []
    weights:
    - source_weight_label: Bold
      existing_token: universal/weight/bold
      reason: Headlines, CTA, and the condensed subhead face all explicitly use bold treatments.
    - source_weight_label: Light
      existing_token: universal/weight/light
      reason: Body copy explicitly uses Light.
    sizes:
    - source_size_reference: headline default
      existing_token: inherited current heading ladder
      assumption_status: deferred_no_new_size
      assumption_note: The source gives hierarchy and leading behavior but not a governed headline size
        token.
      reason: Live semantic size aliases remain inherited from the shared baseline in this pass.
    - source_size_reference: body default
      existing_token: inherited current body ladder
      assumption_status: deferred_no_new_size
      assumption_note: The source defines leading but not a governed numeric size.
      reason: Keeps live size semantics inherited.
    - source_size_reference: cta default
      existing_token: inherited current action ladder
      assumption_status: deferred_no_new_size
      assumption_note: The source defines family, case, and tracking but not a governed CTA size.
      reason: Keeps live size semantics inherited.
  proposed_primitives:
    families:
    - token_name: park_city/family/01
      source_family_name: Futura Std
      source_style_reference: Bold headline and CTA system plus Light body system
      rationale: Futura Std is the repeated Park City brand family across heading, body, and action copy,
        with weight carrying the distinction.
      safe_family_token: ''
      safe_family_note: Multiple approved role-level safe-family mappings apply to this brand family;
        use the semantic safe aliases and role recipes below.
    - token_name: park_city/family/02
      source_family_name: Trade Gothic LT Std Bold Condensed No. 20
      source_style_reference: subhead system
      rationale: Preserve the condensed Park City subhead face as a raw utility family until the semantic
        theme typography schema gains a dedicated subhead lane.
      safe_family_token: park_city/family_safe/02
      safe_family_note: Approved safe-family companion from Vail Resorts Guidelines.pdf.
    safe_families:
    - token_name: park_city/family_safe/01
      source_family_name: Josefin-sans
      source_role_reference: eyebrow
      rationale: Approved web safe family from Vail Resorts Guidelines.pdf for the eyebrow lane.
    - token_name: park_city/family_safe/02
      source_family_name: Futura Bold
      source_role_reference: headline
      rationale: Approved web safe family from Vail Resorts Guidelines.pdf for the headline lane.
    - token_name: park_city/family_safe/03
      source_family_name: Open Sans
      source_role_reference: body, cta
      rationale: Approved web safe family from Vail Resorts Guidelines.pdf for the body, cta lane.
  hold_for_review:
  - item: semantic subhead lane
    reason: The current semantic theme typography schema exposes `heading`, `body`, and `action` families
      only, so the distinct condensed Park City subhead face is preserved as a raw utility recipe rather
      than forced into the live semantic extension.
semantic_recommendations:
  family_aliases:
  - semantic_token: family/heading
    global_token: park_city/family/01
    safe_semantic_token: family/heading_safe
    safe_global_token: park_city/family_safe/02
    intended_channels:
    - web
    - email
    - ads
    notes: Futura Std drives the Park City display system. Safe mapping is staged from Vail Resorts Guidelines.pdf.
  - semantic_token: family/body
    global_token: park_city/family/01
    safe_semantic_token: family/body_safe
    safe_global_token: park_city/family_safe/03
    intended_channels:
    - web
    - email
    - ads
    notes: Park City body copy stays on the same Futura Std family, with Light carrying the reading tone.
      Safe mapping is staged from Vail Resorts Guidelines.pdf.
  - semantic_token: family/action
    global_token: park_city/family/01
    safe_semantic_token: family/action_safe
    safe_global_token: park_city/family_safe/03
    intended_channels:
    - web
    - email
    - ads
    notes: CTA is explicitly Futura Std Bold, so the action lane remains on the primary Park City family.
      Safe mapping is staged from Vail Resorts Guidelines.pdf.
  weight_aliases:
  - semantic_token: weight/heading/base
    global_token: universal/weight/bold
    intended_channels:
    - web
    - email
    - ads
    notes: Headlines explicitly use Bold.
  - semantic_token: weight/body/base
    global_token: universal/weight/light
    intended_channels:
    - web
    - email
    - ads
    notes: Body copy explicitly uses Light.
  - semantic_token: weight/action/base
    global_token: universal/weight/bold
    intended_channels:
    - web
    - email
    - ads
    notes: CTA explicitly uses Bold.
  size_aliases: []
