- email
- ads
figma:
  design_system_file_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Foundations?node-id=1-3
  global_collections:
    color_id: VariableCollectionId:23:2
    typography_id: VariableCollectionId:23:3
    dimensions_id: VariableCollectionId:23:4
  semantic_extensions:
    theme:
      collection_name: Park City
      collection_id: VariableCollectionId:186:46
      parent_collection: 'Semantic: Theme'
      parent_collection_id: VariableCollectionId:41:135
artifacts:
  color:
    intake_artifact: figma/brands/park_city/color/intake.yml
    preview_artifact: figma/brands/park_city/color/preview.md
    decision_artifacts:
    - figma/decisions/2026-03-18-park-city-foundations-written-to-figma.md
  typography:
    intake_artifact: figma/brands/park_city/typography/intake.yml
    preview_artifact: figma/brands/park_city/typography/preview.md
    decision_artifacts:
    - figma/decisions/2026-03-18-park-city-foundations-written-to-figma.md
semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: neutral
        source_family: park_city/park_city_gray
        targets:
        - surface/neutral/*
        - surface/neutral/*_inverse
        - foreground/default
        - foreground/default_inverse
        - foreground/subtle
        - foreground/subtle_inverse
        - border/default
        - border/default_inverse
        - border/subtle
        - border/subtle_inverse
      - scope: brand
        source_family: park_city/park_city_red
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: park_city/bright_red
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Park City
        targets:
        - assets/logo
      inherited_from_base:
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - Park City stages `Pale Red`, `Cool Gray`, and `Park City Gray` into one absorbed neutral family, `park_city/park_city_gray`, so the tinted background wash and the darker readable neutrals remain on one governed ladder.
      - "`park_city_red` drives the primary expressive semantic lane, while `bright_red` drives the secondary expressive lane."
      - "`assets/logo` is overridden to the string `Park City` in the semantic theme extension."
      - Exact white remains shared through `universal/white` rather than duplicated under the Park City group.
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: park_city/family/01
      - semantic_token: family/body
        alias_of: park_city/family/01
      - semantic_token: family/action
        alias_of: park_city/family/01
      - semantic_token: weight/heading/base
        alias_of: universal/weight/bold
      - semantic_token: weight/body/base
        alias_of: universal/weight/light
      - semantic_token: weight/action/base
        alias_of: universal/weight/bold
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/heading/strong
      - weight/body/strong
      notes:
      - Park City uses `Futura Std` across headline, body, and CTA work, with Bold and Light carrying the hierarchy.
      - "`park_city/family/02` preserves `Trade Gothic LT Std Bold Condensed No. 20` as a raw primitive because the current semantic theme typography schema has no dedicated subhead family lane."
      - 'Typography size now binds directly from published `Global: Typography`; the supplied hierarchy guidance defines case, tracking, and leading behavior but not new governed numeric size tokens.'
notes:
- Park City is live in the Foundations file with three raw color families, two raw typography family primitives, a semantic theme logo-name override, and Park City semantic theme extension.
