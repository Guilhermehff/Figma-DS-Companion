semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: neutral
        source_family: park_city/park_city_gray
        targets:
          - surface/neutral/*
          - on_surface/neutral/*
          - foreground/default
          - foreground/subtle
          - border/default
          - border/subtle
      - scope: brand
        source_family: park_city/park_city_red
        targets:
          - surface/brand/*
          - on_surface/brand/*
          - foreground/brand
          - border/brand
      - scope: brand_secondary
        source_family: park_city/bright_red
        targets:
          - surface/brand_secondary/*
          - on_surface/brand_secondary/*
          - foreground/brand_secondary
          - border/brand_secondary
      - scope: asset_logo
        source_value: Park City
        targets:
          - assets/logo
    inherited_from_base:
      - surface/positive/*
      - on_surface/positive/*
      - surface/warning/*
      - on_surface/warning/*
      - surface/critical/*
      - on_surface/critical/*
      - foreground/positive
      - foreground/warning
      - foreground/critical
      - border/positive
      - border/warning
      - border/critical
    notes:
      - Park City stages `Pale Red`, `Cool Gray`, and `Park City Gray` into one absorbed neutral family, `park_city/park_city_gray`, so the tinted background wash and the darker readable neutrals remain on one governed ladder.
      - `park_city_red` drives the primary expressive semantic lane, while `bright_red` drives the secondary expressive lane.
      - "`assets/logo` is overridden to the string `Park City` in the semantic color extension."
      - Exact white remains shared through `universal/white` rather than duplicated under the Park City group.
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: park_city/family/primary
      - semantic_token: family/body
        alias_of: park_city/family/primary
      - semantic_token: family/action
        alias_of: park_city/family/primary
      - semantic_token: weight/heading/base
        alias_of: universal/weight/bold
      - semantic_token: weight/body/base
        alias_of: universal/weight/light
      - semantic_token: weight/action/base
        alias_of: universal/weight/bold
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/heading/strong
      - weight/body/strong
      - size/*
    notes:
      - Park City uses `Futura Std` across headline, body, and CTA work, with Bold and Light carrying the hierarchy.
      - "`park_city/family/utility` preserves `Trade Gothic LT Std Bold Condensed No. 20` as a raw primitive because the current semantic typography schema has no dedicated subhead family lane."
      - Live size semantics remain inherited because the supplied hierarchy guidance defines case, tracking, and leading behavior but not governed numeric size tokens.
notes:
  - Park City is live in the Foundations file with three raw color families, two raw typography family primitives, a semantic color logo-name override, and Park City semantic color and typography extensions.
