semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: brand
        source_family: park_city/park_city_red
        targets:
        - color/surface/brand/*
        - color/surface/brand/*_inverse
        - color/on_surface/brand/emphasis_inverse
        - color/foreground/brand
        - color/foreground/brand_inverse
        - color/border/brand
        - color/border/brand_inverse
      - scope: brand_secondary
        source_family: park_city/bright_red
        targets:
        - color/surface/brand_secondary/*
        - color/surface/brand_secondary/*_inverse
        - color/on_surface/brand_secondary/emphasis_inverse
        - color/foreground/brand_secondary
        - color/foreground/brand_secondary_inverse
        - color/border/brand_secondary
        - color/border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Park City
        targets:
        - variables/assets/logo
      inherited_from_base:
      - color/surface/neutral/*
      - color/surface/neutral/*_inverse
      - color/foreground/default
      - color/foreground/default_inverse
      - color/foreground/subtle
      - color/foreground/subtle_inverse
      - color/border/default
      - color/border/default_inverse
      - color/border/subtle
      - color/border/subtle_inverse
      - color/on_surface/brand/*
      - color/on_surface/brand/default_inverse
      - color/on_surface/brand/muted_inverse
      - color/on_surface/brand/strong_inverse
      - color/on_surface/brand/subtle_inverse
      - color/on_surface/brand_secondary/*
      - color/on_surface/brand_secondary/default_inverse
      - color/on_surface/brand_secondary/muted_inverse
      - color/on_surface/brand_secondary/strong_inverse
      - color/on_surface/brand_secondary/subtle_inverse
      - color/surface/positive/*
      - color/surface/positive/*_inverse
      - color/on_surface/positive/*
      - color/on_surface/positive/*_inverse
      - color/surface/warning/*
      - color/surface/warning/*_inverse
      - color/on_surface/warning/*
      - color/on_surface/warning/*_inverse
      - color/surface/critical/*
      - color/surface/critical/*_inverse
      - color/on_surface/critical/*
      - color/on_surface/critical/*_inverse
      - color/foreground/positive
      - color/foreground/positive_inverse
      - color/foreground/warning
      - color/foreground/warning_inverse
      - color/foreground/critical
      - color/foreground/critical_inverse
      - color/border/positive
      - color/border/positive_inverse
      - color/border/warning
      - color/border/warning_inverse
      - color/border/critical
      - color/border/critical_inverse
      notes:
      - '`color/on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted.'
      - Park City keeps `park_city_gray` as the semantic neutral family, but the live ladder is now a true gray scale anchored by `Cool Gray` at `park_city_gray/400` and `Park City Gray` at `park_city_gray/800`.
      - '`pale_red` is preserved as a raw global-only family for branded wash usage and no longer drives semantic neutral surfaces.'
      - '`park_city_red` drives the primary expressive semantic lane, while `bright_red` drives the secondary expressive lane.'
      - '`variables/assets/logo` is overridden to the string `Park City` in the semantic theme extension.'
      - Exact white remains shared through `universal/white` rather than duplicated under the Park City group.
    typography:
      override_scopes:
      - semantic_token: typography/family/heading
        alias_of: park_city/family/01
      - semantic_token: typography/family/body
        alias_of: park_city/family/01
      - semantic_token: typography/family/action
        alias_of: park_city/family/01
      - semantic_token: typography/weight/body/base
        alias_of: universal/weight/light
      - semantic_token: typography/weight/action/base
        alias_of: universal/weight/bold
      - semantic_token: typography/family/heading_safe
        alias_of: park_city/family_safe/02
      - semantic_token: typography/family/body_safe
        alias_of: park_city/family_safe/03
      - semantic_token: typography/family/action_safe
        alias_of: park_city/family_safe/03
      inherited_from_base:
      - typography/weight/heading/base
      - typography/weight/heading/strong
      - typography/weight/body/strong
      notes:
      - Park City uses `Futura Std` across headline, body, and CTA work, with Bold and Light carrying the hierarchy.
      - '`park_city/family/02` preserves `Trade Gothic LT Std Condensed No. 20` as a raw primitive because the current semantic theme typography schema has no dedicated subhead family lane.'
      - 'Typography size now binds directly from published `Global: Typography`; the supplied hierarchy guidance defines case, tracking, and leading behavior but not new governed numeric size tokens.'
      - Brand-safe typography aliases now stage on `park_city/family_safe/*` from Vail Resorts Guidelines.pdf.
      - Ads heading size now stages on the 0.875x row in the approved row-order mapping.
notes:
- Park City is live in the Foundations file with four raw color families, two raw typography family primitives, a semantic theme logo-name override, and Park City semantic theme extension.
