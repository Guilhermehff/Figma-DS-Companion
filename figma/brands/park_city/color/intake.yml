validation:
  perceptual_consistency_notes:
    - Park City Red lands at `700` because the supplied swatch is already a dark, high-contrast brand red rather than a mid-tone accent.
    - Bright Red lands at `600` because the supplied swatch sits cleanly in the governed mid-dark expressive band while still supporting lighter and darker steps above and below it.
    - Park City stages `Pale Red`, `Cool Gray`, and `Park City Gray` into one neutral ladder because the palette and proportion guidance present them as one continuous low-chroma system from soft background tint to dark readable neutral.
    - Exact white is reused from `universal/white` rather than duplicated under the Park City group.
  contrast_checks:
    - token: park_city/park_city_gray/800
      foreground: white
      ratio: "10.31:1"
      result: pass
    - token: park_city/park_city_gray/700
      foreground: white
      ratio: "7.10:1"
      result: pass
    - token: park_city/park_city_red/700
      foreground: white
      ratio: "8.43:1"
      result: pass
    - token: park_city/bright_red/600
      foreground: white
      ratio: "5.17:1"
      result: pass

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Park City neutral system
      channels:
        - web
        - email
        - ads
      rule: Use the absorbed `park_city_gray` family for tinted canvases, soft neutral surfaces, borders, and dark readable foregrounds before introducing any extra neutral lane.
      source_basis: The supplied palette and ratio image pair a pale pink field with cool and dark grays as one brand-neutral system.
    - subject: Park City expressive lane order
      channels:
        - web
        - email
        - ads
      rule: Keep `park_city_red` as the primary expressive lane and `bright_red` as the secondary expressive lane.
      source_basis: The palette image presents Park City Red as the dominant signature swatch and Bright Red as the supporting saturated accent.

