color_proportion_guidance:
  status: active
  source_basis: Approximate ratios inferred from the Park City ratio diagram plus the accompanying text that Bright Red should be treated as an accent rather than a dominant field. The source does not publish exact percentages.
  contexts:
  - name: brand_touchpoints
    intent: Pale Red and Park City Red carry most of the brand field. Bright Red stays accent-sized even when it is fully saturated. Cool Gray, Park City Gray, and White remain supporting neutrals outside the ratio bar.
    proportions:
    - source_color: Pale Red
      token: park_city/pale_red/300
      percentage: 50
      rationale: Largest field in the proportion graphic and the branded wash behind the expressive red bars.
    - source_color: Park City Red
      token: park_city/park_city_red/700
      percentage: 30
      rationale: Dominant horizontal brand bar in the ratio graphic and the main expressive lane.
    - source_color: Bright Red
      token: park_city/bright_red/600
      percentage: 20
      rationale: Narrowest field in the ratio graphic and explicitly called out as more of an accent color.
    notes:
    - These percentages are approximate documentation guidance inferred from the displayed ratio diagram rather than exact published values.
    - The source text explicitly says Bright Red should be treated more like an accent color, like arrow trios.
validation:
  perceptual_consistency_notes:
  - Park City Red lands at `700` because the supplied swatch is already a dark, high-contrast brand red rather than a mid-tone accent.
  - Bright Red lands at `600` because the supplied swatch sits cleanly in the governed mid-dark expressive band while still supporting lighter and darker steps above and below it.
  - Pale Red is preserved as a dedicated raw tint family so the brand wash remains available without tinting the semantic neutral lane pink.
  - Park City keeps `park_city_gray` as the semantic neutral family, but the reviewed ladder now stays genuinely gray while preserving `Cool Gray` at `400` and `Park City Gray` at `800`.
  - Exact white is reused from `universal/white` rather than duplicated under the Park City group.
  contrast_checks:
  - token: park_city/park_city_gray/800
    foreground: white
    ratio: 10.31:1
    result: pass
  - token: park_city/park_city_gray/700
    foreground: white
    ratio: 6.21:1
    result: pass
  - token: park_city/park_city_red/700
    foreground: white
    ratio: 8.43:1
    result: pass
  - token: park_city/bright_red/600
    foreground: white
    ratio: 5.17:1
    result: pass
review_readiness:
  intended_review_channels:
  - web
  - email
  - ads
  review_rules:
  - subject: Park City neutral correction
    channels:
    - web
    - email
    - ads
    rule: Keep `park_city_gray` as a true gray neutral family for semantic neutral roles, and preserve `pale_red` as a separate raw family for branded wash usage.
    source_basis: The supplied palette includes a branded pale red wash, but semantic neutral surfaces need a coherent gray ladder anchored by Cool Gray and Park City Gray.
  - subject: Park City expressive lane order
    channels:
    - web
    - email
    - ads
    rule: Keep `park_city_red` as the primary expressive lane and `bright_red` as the secondary expressive lane.
    source_basis: The palette image presents Park City Red as the dominant signature swatch and Bright Red as the supporting saturated accent.
