primitive_recommendations:
  reuse_existing:
    families: []
    weights:
    - source_weight_label: body copy default assumption
      existing_token: universal/weight/normal
      reason: The source does not specify a numeric body weight, so the initial review keeps body copy
        on the existing universal normal weight until a stricter raw mapping is approved.
    sizes:
    - source_size_reference: headline default
      existing_token: universal/size/800
      assumption_status: assumed
      assumption_note: Source provides no numeric headline size, so the initial review uses the current
        extra-large heading step.
      reason: Keeps the role on the governed size ladder without inventing a new raw size.
    - source_size_reference: subhead default
      existing_token: universal/size/600
      assumption_status: assumed
      assumption_note: The image shows a strong but clearly smaller supporting heading, so the first review
        uses a mid-large heading step.
      reason: Preserves the hierarchy visually while staying inside the shared size ladder.
    - source_size_reference: body copy default
      existing_token: universal/size/300
      assumption_status: assumed
      assumption_note: Source provides no numeric body size, so body defaults to the universal base reading
        size.
      reason: Keeps body on the shared raw ladder until channel testing suggests a change.
    - source_size_reference: cta default
      existing_token: universal/size/300
      assumption_status: assumed
      assumption_note: Source provides no numeric CTA size, so the review uses the base action size for
        the initial pass.
      reason: Preserves the brand relationship without inventing a new raw size.
  proposed_primitives:
    families:
    - token_name: breckenridge/family/01
      source_family_name: Poppins
      source_style_reference: Poppins Bold across headline, subhead, and cta
      rationale: Shared Breckenridge brand family across the display and action roles.
      safe_family_token: breckenridge/family_safe/01
      safe_family_note: Approved safe-family companion from Vail Resorts Guidelines.pdf.
    - token_name: breckenridge/family/02
      source_family_name: Avenir Next
      source_style_reference: Avenir Next body copy
      rationale: Secondary reading family used for body copy.
      safe_family_token: breckenridge/family_safe/01
      safe_family_note: Approved safe-family companion from Vail Resorts Guidelines.pdf.
    weights:
    - token_name: universal/weight/bold
      source_weight_label: Bold
      proposed_value: '700'
      rationale: Breckenridge introduces a recurring Bold label, and the shared raw typography ladder
        should expose it as a universal weight instead of a brand-specific token.
    safe_families:
    - token_name: breckenridge/family_safe/01
      source_family_name: Poppins
      source_role_reference: eyebrow, headline, body, cta
      rationale: Approved web safe family from Vail Resorts Guidelines.pdf for the eyebrow, headline,
        body, cta lane.
  hold_for_review: []
semantic_recommendations:
  family_aliases:
  - semantic_token: family/heading
    global_token: breckenridge/family/01
    safe_semantic_token: family/heading_safe
    safe_global_token: breckenridge/family_safe/01
    intended_channels:
    - web
    - email
    - ads
    notes: Breckenridge headings should use Poppins where the brand family can be delivered and the safe
      alias where it cannot. Safe mapping is staged from Vail Resorts Guidelines.pdf.
  - semantic_token: family/body
    global_token: breckenridge/family/02
    safe_semantic_token: family/body_safe
    safe_global_token: breckenridge/family_safe/01
    intended_channels:
    - web
    - email
    - ads
    notes: Body copy should stay on Avenir Next in brand-capable channels and move to the safe alias in
      constrained channels. Safe mapping is staged from Vail Resorts Guidelines.pdf.
  - semantic_token: family/action
    global_token: breckenridge/family/01
    safe_semantic_token: family/action_safe
    safe_global_token: breckenridge/family_safe/01
    intended_channels:
    - web
    - email
    - ads
    notes: CTA copy should stay on Poppins in brand-capable channels and use the safe action alias when
      necessary. Safe mapping is staged from Vail Resorts Guidelines.pdf.
  weight_aliases:
  - semantic_token: weight/heading/base
    global_token: universal/weight/bold
    intended_channels:
    - web
    - email
    - ads
    notes: Uses the shared raw bold weight now approved for the global typography ladder.
  - semantic_token: weight/body/base
    global_token: universal/weight/normal
    intended_channels:
    - web
    - email
    - ads
    notes: Assumed baseline body weight because the source does not list a numeric or named body weight
      beyond the family.
  - semantic_token: weight/action/base
    global_token: universal/weight/bold
    intended_channels:
    - web
    - email
    - ads
    notes: Uses the shared raw bold weight now approved for the global typography ladder.
  size_aliases:
  - semantic_token: size/heading/base
    global_token: universal/size/600
    intended_channels:
    - web
    - email
    - ads
    notes: Assumed supporting heading size for the H1 subhead treatment.
  - semantic_token: size/heading/xl
    global_token: universal/size/800
    intended_channels:
    - web
    - email
    - ads
    notes: Assumed display heading size for the H1 headline treatment.
  - semantic_token: size/body/base
    global_token: universal/size/300
    intended_channels:
    - web
    - email
    - ads
    notes: Assumed base body size pending any numeric source guidance.
  - semantic_token: size/action/base
    global_token: universal/size/300
    intended_channels:
    - web
    - email
    - ads
    notes: Assumed base CTA size pending any numeric source guidance.
