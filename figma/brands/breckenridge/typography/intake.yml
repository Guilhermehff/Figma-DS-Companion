validation:
  extraction_notes:
  - The source clearly defines family, case, and tracking behavior but does not provide numeric sizes
    or numeric font-weight values.
  - Poppins is the repeated brand family across heading and CTA roles, while Avenir Next is reserved for
    body copy.
  governance_notes:
  - The shared raw bold token can be written into the global typography collection without creating a
    Breckenridge-specific weight token.
  - The body weight mapping remains a provisional normal-weight assumption because the source names only
    the family, not a specific weight.
  - Brand-safe typography aliases now stage on `breckenridge/family_safe/*` from Vail Resorts Guidelines.pdf.
