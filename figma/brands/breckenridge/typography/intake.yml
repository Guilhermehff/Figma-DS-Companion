  - role_name: body
    source_role: Body Copy | Avenir Next
    proposed_family_token: breckenridge/family/secondary
    fallback_token: universal/family/web_safe
    proposed_weight_token: universal/weight/normal
    proposed_size_token: universal/size/300
    size_assumption_status: assumed
    text_case: sentence_case
    tracking: 0px
    leading_rule: not specified in source
    size_rule: body copy size not numerically specified
    punctuation_rule: sentence punctuation allowed
    sample_copy: Lorem ipsum dolor sit amet, consectetuer adipiscing elit, sed diam nonummy nibh euismod tincidunt ut laoreet dolore magna aliquam erat volutpat.
    notes: Body weight remains a provisional normal-weight assumption until the source provides a stricter raw mapping.
  - role_name: cta
    source_role: CTA | Poppins Bold
    proposed_family_token: breckenridge/family/primary
    fallback_token: universal/family/web_safe
    proposed_weight_token: universal/weight/bold
    proposed_size_token: universal/size/300
    size_assumption_status: assumed
    text_case: sentence_case
    tracking: -15px
    leading_rule: not specified in source
