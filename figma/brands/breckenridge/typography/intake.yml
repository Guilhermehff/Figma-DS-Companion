validation:
  extraction_notes:
    - The source clearly defines family, case, and tracking behavior but does not provide numeric sizes or numeric font-weight values.
    - Poppins is the repeated brand family across heading and CTA roles, while Avenir Next is reserved for body copy.
  governance_notes:
    - The shared raw bold token can be written into the global typography collection without creating a Breckenridge-specific weight token.
    - The body weight mapping remains a provisional normal-weight assumption because the source names only the family, not a specific weight.

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: family/heading_safe
      channels:
        - email
      rule: Use the safe semantic alias when Poppins cannot be relied on in the delivery channel.
      source_basis: Safe-family governance for constrained channels.
    - subject: family/body_safe
      channels:
        - email
      rule: Use the safe semantic alias when Avenir Next cannot be relied on in the delivery channel.
      source_basis: Safe-family governance for constrained channels.
    - subject: headline
      channels:
        - web
        - email
        - ads
      rule: Keep the headline in all caps with 0px tracking.
      source_basis: Breckenridge type hierarchy image.
    - subject: subhead
      channels:
        - web
        - email
        - ads
      rule: Keep the subhead in sentence case with -15px tracking.
      source_basis: Breckenridge type hierarchy image.
    - subject: cta
      channels:
        - web
        - email
        - ads
      rule: Keep CTA text in sentence case with -15px tracking.
      source_basis: Breckenridge type hierarchy image.

