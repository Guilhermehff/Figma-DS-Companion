artifacts:
  color:
    intake_artifact: figma/brands/breckenridge/color/intake.yml
    preview_artifact: figma/brands/breckenridge/color/preview.md
    decision_artifacts:
    - figma/decisions/2026-03-11-brand-manifest-and-generated-registry-governance.md
