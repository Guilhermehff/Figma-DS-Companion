      - figma/decisions/2026-03-11-role-scoped-semantic-typography-ladders.md
semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: neutral
        source_family: breckenridge/dark_gray
        targets:
          - surface/neutral/*
          - on_surface/neutral/*
          - foreground/default
          - foreground/subtle
          - border/default
          - border/subtle
      - scope: brand
        source_family: breckenridge/navy
        targets:
          - surface/brand/*
          - on_surface/brand/*
          - foreground/brand
          - border/brand
      - scope: brand_secondary
        source_family: breckenridge/red
        targets:
          - surface/brand_secondary/*
          - on_surface/brand_secondary/*
          - foreground/brand_secondary
          - border/brand_secondary
    inherited_from_base:
      - foreground/inverse
      - surface/positive/*
      - on_surface/positive/*
      - surface/warning/*
      - on_surface/warning/*
      - surface/critical/*
      - on_surface/critical/*
      - foreground/positive
      - foreground/warning
      - foreground/critical
      - border/positive
      - border/warning
      - border/critical
    notes:
      - White is reused from universal/white and does not require a brand-specific override.
      - Dark Gray now drives the neutral role set, while navy and red remain the two expressive semantic lanes.
      - No third expressive semantic lane survives the role-based migration; any additional approved family remains global-only.
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: breckenridge/family/primary
      - semantic_token: family/body
        alias_of: breckenridge/family/secondary
      - semantic_token: family/action
        alias_of: breckenridge/family/primary
      - semantic_token: weight/heading/base
        alias_of: universal/weight/bold
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: weight/action/base
        alias_of: universal/weight/bold
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - size/*
    notes:
      - Shared raw typography support now includes universal/weight/bold in the global typography collection.
      - The Breckenridge semantic typography extension is written and maps heading and action to bold while body remains on normal.
notes:
  - Breckenridge is now live in the Design System file with global color ladders and semantic typography and color extensions.
