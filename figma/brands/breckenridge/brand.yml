    - figma/decisions/2026-03-11-role-scoped-semantic-typography-ladders.md
semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: neutral
        source_family: breckenridge/dark_gray
        targets:
        - surface/neutral/*
        - surface/neutral/*_inverse
        - foreground/default
        - foreground/default_inverse
        - foreground/subtle
        - foreground/subtle_inverse
        - border/default
        - border/default_inverse
        - border/subtle
        - border/subtle_inverse
      - scope: brand
        source_family: breckenridge/navy
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: breckenridge/red
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Breckenridge
        targets:
        - assets/logo
      inherited_from_base:
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - White is reused from universal/white and does not require a brand-specific override.
      - Dark Gray now drives the neutral role set, while navy and red remain the two expressive semantic lanes.
      - "`assets/logo` is overridden to the string `Breckenridge` in the semantic theme extension."
      - No third expressive semantic lane survives the role-based migration; any additional approved family remains global-only.
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: breckenridge/family/01
      - semantic_token: family/body
        alias_of: breckenridge/family/02
      - semantic_token: family/action
        alias_of: breckenridge/family/01
      - semantic_token: weight/heading/base
        alias_of: universal/weight/bold
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: weight/action/base
        alias_of: universal/weight/bold
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      notes:
      - Shared raw typography support now includes universal/weight/bold in the global typography collection.
      - The Breckenridge semantic theme typography override set is written and maps heading and action to bold while body remains on normal.
notes:
- Breckenridge is now live in the Foundations file with global color ladders, a semantic theme logo-name override, and semantic theme extension.
