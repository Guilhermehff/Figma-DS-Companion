universal_reuse:
  reuse_universal:
    - source_name: Breckenridge White
      provided_value: "#ffffff"
      existing_token: universal/white
      reason: Exact match to the existing universal primitive.
  new_brand_families:
    - family: navy
      source_name: Breckenridge Navy
      provided_value: "#004c80"
      rationale: Primary brand blue used as the clearest Breckenridge brand anchor and materially distinct from the current universal palette.
      anchor_step: 800
      anchor_label: 800_source
    - family: red
      source_name: Breckenridge Red
      provided_value: "#d71920"
      rationale: Primary branded red that should stay separate from the shared universal feedback family because it carries brand identity rather than shared state meaning.
      anchor_step: 600
      anchor_label: 600_source
    - family: dark_gray
      source_name: Breckenridge Dark Gray
      provided_value: "#444339"
      rationale: Warm dark neutral included in the primary palette and distinct enough from the shared universal slate ladder to justify a brand family.
      anchor_step: 800
      anchor_label: 800_source
