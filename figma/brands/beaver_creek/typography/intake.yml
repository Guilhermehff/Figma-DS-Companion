date: '2026-04-01'
brand: beaver_creek
source_reference: User-provided image in chat showing the Beaver Creek typography guidance
source_type: image
figma_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Foundations?node-id=1-3
status: active
preview:
  required_before_write: true
  artifact: figma/brands/beaver_creek/typography/preview.md
  status: written_in_figma
source_roles:
- source_role: headline
  source_family_name: IvyPresto Display
  source_style_name: Thin
  source_weight_label: Thin
  source_usage_scope: primary_display_headline
  text_case: not specified in source
  tracking: 90
  leading: font_size_times_1_2
  size_rule: headline size not numerically specified
  punctuation_rule: not specified in source
  sample_copy: Headlines
  notes: Headlines are center justified unless a specific layout calls for left justification. Kerning
    is optical.
  source_safe_family_name: Playfair Display
  source_safe_reference_column: headline_font
- source_role: subhead_or_cta
  source_family_name: Vinila Condensed
  source_style_name: Bold
  source_weight_label: Bold
  source_usage_scope: supporting_headline_copy_or_cta
  text_case: not specified in source
  tracking: 80
  leading: font_size_times_1_2
  size_rule: CTA and subheadline size not numerically specified
  punctuation_rule: not specified in source
  sample_copy: CTA / Subheadlines
  notes: Sub-headlines and CTA are center justified unless a specific layout calls for left justification.
    Kerning is optical.
  source_safe_family_name: Playfair Display
  source_safe_reference_column: cta_font
- source_role: body
  source_family_name: Vinila
  source_style_name: Light
  source_weight_label: Light
  source_usage_scope: reading_copy
  text_case: not specified in source
  tracking: 10
  leading: font_size_times_1_7
  size_rule: body size not numerically specified
  punctuation_rule: not specified in source
  sample_copy: All body copy should be in Light.
  notes: Body copy is center justified unless a specific layout calls for left justification. Kerning
    is optical.
  source_safe_family_name: Open Sans
  source_safe_reference_column: body_font
- source_role: url
  source_family_name: Vinila Condensed
  source_style_name: Light
  source_weight_label: Light
  source_usage_scope: non_clickable_url
  text_case: mixed_case
  tracking: 120
  leading: not specified in source
  size_rule: URL size not numerically specified
  punctuation_rule: Always include BeaverCreek.com when relevant to media is not clickable.
  sample_copy: BeaverCreek.com
  notes: Kerning is optical. The source treats this as a distinct utility recipe rather than a general
    CTA rule.
  source_safe_family_name: Open Sans
  source_safe_reference_column: body_font
primitive_recommendations:
  reuse_existing:
    families: []
    weights:
    - source_weight_label: Bold
      existing_token: universal/weight/bold
      reason: Beaver Creek CTA and subheadline guidance explicitly calls for Bold.
    - source_weight_label: Light
      existing_token: universal/weight/light
      reason: Beaver Creek body and URL guidance explicitly calls for Light.
    sizes:
    - source_size_reference: headline default
      existing_token: universal/size/core/700
      assumption_status: assumed
      assumption_note: The source defines a display headline lane but does not provide a numeric size,
        so the first pass uses the current largest shared heading size.
      reason: Keeps the display lane on the governed ladder without creating a new raw size.
    - source_size_reference: subhead_or_cta default
      existing_token: universal/size/core/400
      assumption_status: assumed
      assumption_note: The source shows a supportive emphasis lane smaller than the display headline and
        larger than body copy.
      reason: Preserves hierarchy without creating a new raw size.
    - source_size_reference: body default
      existing_token: universal/size/core/200
      assumption_status: assumed
      assumption_note: The shared body base currently maps to 16 px and is the safest first-pass assumption.
      reason: Keeps body aligned to the current semantic body baseline.
    - source_size_reference: url default
      existing_token: universal/size/core/100
      assumption_status: assumed
      assumption_note: The source treats the URL as ancillary utility copy rather than a primary headline
        lane.
      reason: Stages the URL treatment on the smallest governed size step.
  proposed_primitives:
    families:
    - token_name: beaver_creek/family/01
      source_family_name: IvyPresto Display
      source_style_reference: Thin headline system
      rationale: Primary display family for Beaver Creek headline work.
      safe_family_token: beaver_creek/family_safe/02
      safe_family_note: Approved safe-family companion from Vail Resorts Guidelines.pdf.
    - token_name: beaver_creek/family/02
      source_family_name: Vinila
      source_style_reference: Light body system
      rationale: Reading family for Beaver Creek body copy.
      safe_family_token: beaver_creek/family_safe/01
      safe_family_note: Approved safe-family companion from Vail Resorts Guidelines.pdf.
    - token_name: beaver_creek/family/03
      source_family_name: Vinila Condensed
      source_style_reference: Bold CTA and subheadline system
      rationale: Condensed family for Beaver Creek action and supporting emphasis work.
      safe_family_token: ''
      safe_family_note: Multiple approved role-level safe-family mappings apply to this brand family;
        use the semantic safe aliases and role recipes below.
    weights:
    - token_name: universal/weight/thin
      source_weight_label: Thin
      proposed_value: '200'
      rationale: Beaver Creek introduces a repeated Thin display weight that should be preserved as a
        shared raw primitive rather than collapsed into Light.
    safe_families:
    - token_name: beaver_creek/family_safe/01
      source_family_name: Open Sans
      source_role_reference: eyebrow, body
      rationale: Approved web safe family from Vail Resorts Guidelines.pdf for the eyebrow, body lane.
    - token_name: beaver_creek/family_safe/02
      source_family_name: Playfair Display
      source_role_reference: headline, cta
      rationale: Approved web safe family from Vail Resorts Guidelines.pdf for the headline, cta lane.
  hold_for_review:
  - item: semantic URL lane
    reason: The current semantic theme typography schema exposes one action family and one action base
      weight, so the non-clickable URL treatment remains a documented raw recipe rather than a new semantic
      slot.
semantic_recommendations:
  family_aliases:
  - semantic_token: typography/family/heading
    global_token: beaver_creek/family/01
    safe_semantic_token: typography/family/heading_safe
    safe_global_token: beaver_creek/family_safe/02
    intended_channels:
    - web
    - email
    - ads
    notes: IvyPresto Display drives Beaver Creek headline work in brand-capable channels. Safe mapping
      is staged from Vail Resorts Guidelines.pdf.
  - semantic_token: typography/family/body
    global_token: beaver_creek/family/02
    safe_semantic_token: typography/family/body_safe
    safe_global_token: beaver_creek/family_safe/01
    intended_channels:
    - web
    - email
    - ads
    notes: Vinila remains the default reading family. Safe mapping is staged from Vail Resorts Guidelines.pdf.
  - semantic_token: typography/family/action
    global_token: beaver_creek/family/03
    safe_semantic_token: typography/family/action_safe
    safe_global_token: beaver_creek/family_safe/02
    intended_channels:
    - web
    - email
    - ads
    notes: Vinila Condensed stages as the semantic action family for CTA and subheadline work. Safe mapping
      is staged from Vail Resorts Guidelines.pdf.
  weight_aliases:
  - semantic_token: typography/weight/heading/base
    global_token: universal/weight/thin
    intended_channels:
    - web
    - email
    - ads
    notes: Beaver Creek headlines explicitly use Thin.
  - semantic_token: typography/weight/body/base
    global_token: universal/weight/light
    intended_channels:
    - web
    - email
    - ads
    notes: Body copy explicitly uses Light.
  - semantic_token: typography/weight/action/base
    global_token: universal/weight/bold
    intended_channels:
    - web
    - email
    - ads
    notes: CTA and subheadline work explicitly uses Bold.
  size_aliases: []
