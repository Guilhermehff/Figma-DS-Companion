validation:
  extraction_notes:
  - The source is explicit about the named family treatments, tracking, justification, and leading ratios,
    but it does not provide numeric sizes.
  - Beaver Creek uses one condensed family in both Bold and Light, so the URL treatment is preserved as
    a raw recipe rather than creating a new semantic family lane.
  governance_notes:
  - '`universal/weight/thin` is staged as the one new shared raw weight needed to preserve the Beaver
    Creek display system faithfully.'
  - The first Beaver Creek typography pass keeps semantic size aliases inherited from the shared baseline.
  - Brand-safe typography aliases now stage on `beaver_creek/family_safe/*` from Vail Resorts Guidelines.pdf.
review_readiness:
  intended_review_channels:
  - web
  - email
  - ads
  review_rules:
  - subject: Beaver Creek headline lane
    channels:
    - web
    - email
    - ads
    rule: Keep display headlines on IvyPresto Display Thin with tracking `90`, optical kerning, and a
      1 to 1.2 size-to-leading ratio.
    source_basis: Beaver Creek typography guidance image.
  - subject: Beaver Creek action lane
    channels:
    - web
    - email
    - ads
    rule: Keep CTA and subheadlines on Vinila Condensed Bold with tracking `80` and a 1 to 1.2 size-to-leading
      ratio.
    source_basis: Beaver Creek typography guidance image.
  - subject: Beaver Creek reading and utility copy
    channels:
    - web
    - email
    - ads
    rule: Keep body copy on Vinila Light with tracking `10` and the URL recipe on Vinila Condensed Light
      with tracking `120`.
    source_basis: Beaver Creek typography guidance image.
open_questions: []
