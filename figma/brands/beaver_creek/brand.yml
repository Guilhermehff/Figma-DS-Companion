semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: neutral
        source_family: beaver_creek/silver
        targets:
        - surface/neutral/*
        - surface/neutral/*_inverse
        - foreground/default
        - foreground/default_inverse
        - foreground/subtle
        - foreground/subtle_inverse
        - border/default
        - border/default_inverse
        - border/subtle
        - border/subtle_inverse
      - scope: brand
        source_family: beaver_creek/silver
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: beaver_creek/silver
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Beaver Creek
        targets:
        - assets/logo
      inherited_from_base:
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - Beaver Creek stages as a single silver system that absorbs the provided tint, light, medium, primary, and near-black swatches into one branded neutral ladder.
      - Approved exception: the same `beaver_creek/silver` family drives semantic `neutral/*`, `brand/*`, and `brand_secondary/*`.
      - "`assets/logo` is overridden to the string `Beaver Creek` in the semantic theme extension."
      - Exact white remains inherited through the shared universal primitive rather than duplicating `#ffffff` under the brand group.
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: beaver_creek/family/01
      - semantic_token: family/body
        alias_of: beaver_creek/family/02
      - semantic_token: family/action
        alias_of: beaver_creek/family/03
      - semantic_token: weight/heading/base
        alias_of: universal/weight/thin
      - semantic_token: weight/body/base
        alias_of: universal/weight/light
      - semantic_token: weight/action/base
        alias_of: universal/weight/bold
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/heading/strong
      - weight/body/strong
      notes:
      - IvyPresto Display drives the heading lane and requires the new shared raw thin weight to preserve the supplied display treatment.
      - Vinila remains the reading family, while Vinila Condensed drives subheads and CTA through the semantic action lane.
      - The non-clickable URL recipe stays documented as a raw Beaver Creek pattern using the condensed family with light weight and tracking `120`, not as a separate semantic lane.
notes:
- Beaver Creek is live in the Foundations file with one silver color ladder, three raw typography families, the shared thin raw weight, a semantic theme logo-name override, and Beaver Creek semantic theme extension.
