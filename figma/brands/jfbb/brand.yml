semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: neutral
        source_family: jfbb/snow_day
        targets:
          - surface/neutral/*
          - on_surface/neutral/*
          - foreground/default
          - foreground/subtle
          - border/default
          - border/subtle
      - scope: brand
        source_family: jfbb/early_sunrise
        targets:
          - surface/brand/*
          - on_surface/brand/*
          - foreground/brand
          - border/brand
      - scope: brand_secondary
        source_family: jfbb/bluebird
        targets:
          - surface/brand_secondary/*
          - on_surface/brand_secondary/*
          - foreground/brand_secondary
          - border/brand_secondary
      - scope: asset_logo
        source_value: JFBB
        targets:
          - assets/logo
    inherited_from_base:
      - surface/positive/*
      - on_surface/positive/*
      - surface/warning/*
      - on_surface/warning/*
      - surface/critical/*
      - on_surface/critical/*
      - foreground/positive
      - foreground/warning
      - foreground/critical
      - border/positive
      - border/warning
      - border/critical
    notes:
      - Snow Day drives the light neutral surface system, while Last Chair supplies the readable dark neutral roles so the brand keeps the supplied icy-background and navy-type pairing.
      - The reviewed expressive semantic lanes use Early Sunrise as `brand/*` and Bluebird as `brand_secondary/*`.
      - Frost and Night Ski remain governed global-only extra families after the first semantic pass.
      - "`assets/logo` is overridden to the string `JFBB` in the semantic color extension."
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: jfbb/family/primary
      - semantic_token: family/body
        alias_of: jfbb/family/primary
      - semantic_token: weight/heading/base
        alias_of: universal/weight/black
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: weight/body/strong
        alias_of: universal/weight/bold
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action
      - family/action_safe
      - weight/action/*
      - size/*
    notes:
      - JFBB uses one raw family, Vista Sans NAR OTCE, across headline, subheadline, and body roles, with weight carrying the hierarchy.
      - "`Book` stages on `universal/weight/normal` because the shared raw ladder has no separate book primitive."
      - "The source body-leading example is internally inconsistent (`100px difference` / `24px / 124px`), so live size semantics remain inherited."
notes:
  - JFBB is live in the Foundations file with six raw color families, one raw typography family, a semantic color logo-name override, and JFBB semantic color and typography extensions.
