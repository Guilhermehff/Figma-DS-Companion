color_proportion_guidance:
  status: active
  source_basis: User-provided JFBB usage page defines primary and secondary palette behavior in prose but does not publish numeric percentages.
  contexts:
  - name: brand_touchpoints
    intent: Snow Day, Last Chair, and Early Sunrise should carry most brand work. Frost, Bluebird, and Night Ski are accent-only support colors.
    dominant_palette:
    - source_color: Snow Day
      token: jfbb/snow_day/100
    - source_color: Last Chair
      token: jfbb/last_chair/900
    - source_color: Early Sunrise
      token: jfbb/early_sunrise/400
    supporting_palette:
    - source_color: Frost
      token: jfbb/frost/400
    - source_color: Bluebird
      token: jfbb/bluebird/600
    - source_color: Night Ski
      token: jfbb/night_ski/900
    notes:
    - The source says the primary palette should remain the default unless it becomes illegible.
    - Secondary colors are reserved for smaller moments such as CTAs and the crown or snowflake element of the logo.
    - Secondary colors should be used in moderation rather than as dominant campaign fields.
validation:
  perceptual_consistency_notes:
  - The orange, blue, and navy families preserve their hue identity across the central 300-700 range while the darkest steps intentionally compress chroma for white contrast.
  - Snow Day anchors at 100_source so the neutral surface system keeps the exact supplied icy background rather than drifting back to universal white.
  contrast_checks:
  - token: jfbb/early_sunrise/800
    foreground: "#ffffff"
    ratio: 10.74:1
    result: pass
  - token: jfbb/bluebird/800
    foreground: "#ffffff"
    ratio: 10.62:1
    result: pass
semantic_recommendations:
  role_sets:
  - scope: neutral
    source_family: jfbb/snow_day
    rationale: Snow Day is the explicit light background color across the supplied brand guidance and should drive the neutral surface stack.
    targets:
    - color/surface/neutral/*
    - color/border/default
    - color/border/subtle
  - scope: brand
    source_family: jfbb/early_sunrise
    rationale: Early Sunrise is the loudest primary expressive accent and the clearest first brand lane for the current semantic model.
    targets:
    - color/surface/brand/*
    - color/on_surface/brand/*
    - color/foreground/brand
    - color/border/brand
  - scope: brand_secondary
    source_family: jfbb/bluebird
    rationale: Bluebird is the cleanest supporting expressive lane and preserves a balanced warm/cool pairing with Early Sunrise.
    targets:
    - color/surface/brand_secondary/*
    - color/on_surface/brand_secondary/*
    - color/foreground/brand_secondary
    - color/border/brand_secondary
  global_only_families:
  - family: jfbb/frost
    rationale: Frost remains available as a governed cyan accent but does not displace Bluebird in the shared second expressive lane.
  - family: jfbb/night_ski
    rationale: Night Ski stays global-only so the first semantic pass does not promote a second dark navy lane beyond the readable Last Chair exception.
  role_exceptions:
  - target: color/on_surface/neutral/*
    source_token: jfbb/last_chair/900
    rationale: Readable neutral copy follows the supplied dark navy rather than the very light Snow Day surface ladder.
  - target: color/foreground/default
    source_token: jfbb/last_chair/900
    rationale: Default foreground needs the same brand navy used across the supplied hierarchy sheet.
  - target: color/foreground/subtle
    source_token: jfbb/last_chair/800
    rationale: Subtle neutral foreground keeps a softer navy tone without leaving the brand palette.
  - target: variables/assets/logo
    source_token: JFBB
    rationale: The semantic color extension overrides the shared logo string to the JFBB brand name.
review_readiness:
  intended_review_channels:
  - web
  - email
  - ads
  review_rules:
  - subject: JFBB expressive lane order
    channels:
    - web
    - email
    - ads
    rule: Use Early Sunrise as the first expressive semantic lane and Bluebird as the second.
    source_basis: The supplied palette presents Early Sunrise as a primary brand color and Bluebird as the strongest supporting blue.
  - subject: JFBB neutral system
    channels:
    - web
    - email
    - ads
    rule: Keep Snow Day on neutral surfaces and Last Chair on readable dark neutral copy roles.
    source_basis: The source imagery pairs an icy background with dark navy typography.
  - subject: JFBB extra families
    channels:
    - web
    - email
    - ads
    rule: Keep Frost and Night Ski global-only until another review promotes an additional semantic lane.
    source_basis: The current shared semantic model only admits two expressive brand lanes.
open_questions: []
