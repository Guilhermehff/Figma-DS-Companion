validation:
  perceptual_consistency_notes:
  - Exact black and white remain shared through the universal neutral primitives, so Crotched only adds the two branded expressive families supplied by the source.
  - "`rocket_fuel` stays bright at the source step and darkens quickly enough to support accessible branded surfaces."
  - "`snow_gun` remains a deep brown-charcoal family distinct from exact black while preserving the supplied source swatch as the stronger secondary step."
  contrast_checks:
  - token: crotched/rocket_fuel/700
    foreground: white
    ratio: 4.75:1
    result: pass
  - token: crotched/rocket_fuel/800
    foreground: white
    ratio: 7.52:1
    result: pass
  - token: crotched/snow_gun/800
    foreground: white
    ratio: 9.52:1
    result: pass
  - token: crotched/snow_gun/900
    foreground: white
    ratio: 10.90:1
    result: pass
semantic_recommendations:
  role_sets:
  - scope: neutral
    source_family: inherited_base
    rationale: Exact black and white are already governed by the shared universal primitives, so the first pass keeps the neutral role set inherited.
    targets:
    - surface/neutral/*
    - on_surface/neutral/*
    - foreground/default
    - foreground/subtle
    - border/default
    - border/subtle
  - scope: brand
    source_family: crotched/rocket_fuel
    rationale: Rocket Fuel is the signature bright brand color and should drive the primary expressive semantic lane.
    targets:
    - surface/brand/*
    - on_surface/brand/*
    - foreground/brand
    - border/brand
  - scope: brand_secondary
    source_family: crotched/snow_gun
    rationale: Snow Gun is the dark supporting brand color and should drive the secondary expressive lane.
    targets:
    - surface/brand_secondary/*
    - on_surface/brand_secondary/*
    - foreground/brand_secondary
    - border/brand_secondary
  global_only_families: []
  role_exceptions:
  - target: assets/logo
    source_token: Crotched
    rationale: The live semantic color schema stores the governed brand display label in `assets/logo`; the source image shows longer logo lockups, but the user requested the brand be added as Crotched.
review_readiness:
  intended_review_channels:
  - web
  - email
  - ads
  review_rules:
  - subject: Crotched expressive lane order
    channels:
    - web
    - email
    - ads
    rule: Use `rocket_fuel` as the primary expressive lane and `snow_gun` as the secondary expressive lane.
    source_basis: Source image names the supplied branded colors and distinguishes them from exact black and white.
  - subject: Crotched neutral reuse
    channels:
    - web
    - email
    - ads
    rule: Reuse `universal/black` and `universal/white` rather than duplicating exact neutral primitives.
    source_basis: Source image provides exact black and white values that match the shared universal tokens.
