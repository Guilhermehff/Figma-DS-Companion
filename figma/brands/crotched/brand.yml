semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: brand
        source_family: crotched/rocket_fuel
        targets:
          - surface/brand/*
          - surface/brand/*_inverse
          - on_surface/brand/*
          - on_surface/brand/*_inverse
          - foreground/brand
          - foreground/brand_inverse
          - border/brand
          - border/brand_inverse
      - scope: brand_secondary
        source_family: crotched/snow_gun
        targets:
          - surface/brand_secondary/*
          - surface/brand_secondary/*_inverse
          - on_surface/brand_secondary/*
          - on_surface/brand_secondary/*_inverse
          - foreground/brand_secondary
          - foreground/brand_secondary_inverse
          - border/brand_secondary
          - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Crotched
        targets:
          - assets/logo
    inherited_from_base:
      - surface/neutral/*
      - surface/neutral/*_inverse
      - foreground/default
      - foreground/default_inverse
      - foreground/subtle
      - foreground/subtle_inverse
      - border/default
      - border/default_inverse
      - border/subtle
      - border/subtle_inverse
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
    notes:
      - '`on_surface/*` tokens in the live semantic color extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted.'
      - Exact black and white remain inherited through the shared neutral role recipes because the supplied palette matches `universal/black` and `universal/white`.
      - "`rocket_fuel` drives the primary expressive semantic lane, while `snow_gun` drives the secondary expressive lane."
      - "`assets/logo` is overridden to the string `Crotched` in the semantic color extension even though the source logo guide also shows `Crotched Mountain` and `CrotchedMTN` lockups."
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: crotched/family/primary
      - semantic_token: family/body
        alias_of: crotched/family/primary
      - semantic_token: family/action
        alias_of: crotched/family/primary
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/*
      - size/*
    notes:
      - Crotched adds a governed raw family token, `crotched/family/primary`, with the same string value as `universal/family/primary`.
      - The source does not define a brand-specific typography system, and the user explicitly instructed the brand to use the universal baseline.
      - Weight, safe-family, and size semantics remain inherited from the live base collection because the requested values are unchanged from universal.
notes:
  - Crotched is live in the Foundations file with two raw color families, one mirrored raw typography family primitive, a semantic color logo-name override, and Crotched semantic color and typography extensions.
