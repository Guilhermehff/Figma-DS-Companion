version: 1
updated: '2026-04-01'
brand_id: crotched
display_name: Crotched
status: active
owners:
- design_system_governance
supported_channels:
- web
- email
- ads
figma:
  design_system_file_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Foundations?node-id=1-3
  global_collections:
    color_id: VariableCollectionId:23:2
    typography_id: VariableCollectionId:23:3
    dimensions_id: VariableCollectionId:23:4
  semantic_extensions:
    theme:
      collection_name: Crotched
      collection_id: VariableCollectionId:201:328
      parent_collection: 'Semantic: Theme'
      parent_collection_id: VariableCollectionId:41:135
artifacts:
  color:
    intake_artifact: figma/brands/crotched/color/intake.yml
    preview_artifact: figma/brands/crotched/color/preview.md
    decision_artifacts:
    - figma/decisions/2026-03-31-universal-100-900-color-ramp-normalization.md
  typography:
    intake_artifact: figma/brands/crotched/typography/intake.yml
    preview_artifact: figma/brands/crotched/typography/preview.md
    decision_artifacts:
    - figma/decisions/2026-04-01-safe-typography-lane-migration.md
semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: brand
        source_family: crotched/rocket_fuel
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: crotched/snow_gun
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Crotched
        targets:
        - assets/logo
      inherited_from_base:
      - surface/neutral/*
      - surface/neutral/*_inverse
      - foreground/default
      - foreground/default_inverse
      - foreground/subtle
      - foreground/subtle_inverse
      - border/default
      - border/default_inverse
      - border/subtle
      - border/subtle_inverse
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - '`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black`
        or `universal/white` and are not hue-tinted.'
      - Exact black and white remain inherited through the shared neutral role recipes because the supplied
        palette matches `universal/black` and `universal/white`.
      - '`rocket_fuel` drives the primary expressive semantic lane, while `snow_gun` drives the secondary
        expressive lane.'
      - '`assets/logo` is overridden to the string `Crotched` in the semantic theme extension even though
        the source logo guide also shows `Crotched Mountain` and `CrotchedMTN` lockups.'
    typography:
      override_scopes:
      - semantic_token: family/heading_safe
        alias_of: crotched/family_safe/01
      - semantic_token: family/body_safe
        alias_of: crotched/family_safe/02
      - semantic_token: family/action_safe
        alias_of: crotched/family_safe/01
      inherited_from_base:
      - family/*
      - weight/*
      notes:
      - The Vail Resorts Guidelines PDF does not list brand font guidance for Crotched, so the semantic
        theme extension continues to inherit the shared universal typography base without overrides.
      - 'Typography size continues to bind directly from published `Global: Typography`.'
      - Brand-safe typography aliases now stage on `crotched/family_safe/*` from Vail Resorts Guidelines.pdf.
notes:
- Crotched is live in the Foundations file with two raw color families, no brand-specific raw typography
  families, a semantic theme logo-name override, and Crotched semantic theme extension.
