semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: neutral
        source_family: liberty_mountain/warm_neutral
        targets:
        - surface/neutral/*
        - surface/neutral/*_inverse
        - foreground/default
        - foreground/default_inverse
        - foreground/subtle
        - foreground/subtle_inverse
        - border/default
        - border/default_inverse
        - border/subtle
        - border/subtle_inverse
      - scope: brand
        source_family: liberty_mountain/sunrise
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: liberty_mountain/spring
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Liberty Mountain
        targets:
        - assets/logo
      inherited_from_base:
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - Liberty Mountain is live in the Foundations file with `warm_neutral` as the structural neutral lane, `sunrise` as the primary expressive lane, and `spring` as the supporting expressive lane.
      - User-approved 2026-03-30 cleanup. `Limestone`, `Mineral`, and `Sand` stay documented as original palette swatches and now consolidate into the composite raw family `warm_neutral`.
      - User-approved 2026-03-30 cleanup. `Summit`, `Twilight`, and corrected `Tundra` stay documented as original palette swatches and now consolidate into the raw-only family `cool_neutral`.
      - 'User-approved 2026-03-30 cleanup. Remaining source swatches stay as raw global-only families in `_Global: Color`: `shale`, `stone`, `sunset`, `flora`, and `copper`.'
      - User-approved live write. `surface/brand/default`, `surface/brand/strong`, and `surface/brand/emphasis` stage on `liberty_mountain/sunrise/600`, `700`, and `800` because that is the lightest readable set that holds the shared white on-surface contract.
      - User-approved live write. `surface/brand_secondary/default`, `surface/brand_secondary/strong`, and `surface/brand_secondary/emphasis` stage on `liberty_mountain/spring/700`, `800`, and `900` because the brighter Spring hue needed a darker set to hold the shared white on-surface contract.
      - "`assets/logo` resolves to the string `Liberty Mountain` in the semantic theme extension."
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: liberty_mountain/family/01
      - semantic_token: family/body
        alias_of: liberty_mountain/family/01
      - semantic_token: family/action
        alias_of: liberty_mountain/family/01
      - semantic_token: weight/heading/base
        alias_of: universal/weight/normal
      - semantic_token: weight/heading/strong
        alias_of: universal/weight/normal
      - semantic_token: weight/body/base
        alias_of: universal/weight/light
      - semantic_token: weight/body/strong
        alias_of: universal/weight/normal
      - semantic_token: weight/action/base
        alias_of: universal/weight/normal
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      notes:
      - Liberty Mountain is live as a Brown-led typography system with `family/heading`, `family/body`, and `family/action` all mapped to `liberty_mountain/family/01`.
      - User-approved live write by source interpretation. The source says Brown is the primary Liberty Mountain font for print and web materials, so the first semantic pass also routes the action family through Brown rather than inheriting the shared default family.
      - "`Sentinel Book` is preserved as the raw primitive `liberty_mountain/family/02`, but it remains raw-only because the current shared semantic theme typography schema has no alternate serif lane."
      - "`weight/heading/strong` and `weight/action/base` both override to `universal/weight/normal` so Liberty Mountain does not inherit the shared black default that the source never specifies."
      - "`weight/body/base = universal/weight/light` and `weight/body/strong = universal/weight/normal` stage the Brown Light and Brown Regular reading hierarchy through the current semantic ladder."
notes:
- Liberty Mountain is live in the Foundations file with nine raw color families, two raw typography family primitives, a semantic theme logo-name override, and Liberty Mountain semantic theme extension.
