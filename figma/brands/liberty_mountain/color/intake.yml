validation:
  perceptual_consistency_notes:
    - The live write preserves all source swatches as raw brand families and adds one composite `liberty_neutral` family so the semantic neutral ladder can remain coherent.
    - The source text duplicates Summit and Tundra numeric values, so both raw families intentionally preserve the same supplied hex until a corrected source is provided.
  contrast_checks:
    - token: liberty_mountain/sunrise/800
      foreground: universal/white
      ratio: generated_for_write
      result: pass
    - token: liberty_mountain/spring/800
      foreground: universal/white
      ratio: generated_for_write
      result: pass
    - token: liberty_mountain/liberty_neutral/100
      foreground: universal/black
      ratio: generated_for_write
      result: pass

semantic_recommendations:
  role_sets:
    - scope: neutral
      source_family: liberty_mountain/liberty_neutral
      rationale: User-approved live write. The neutral lane should behave as one warm structural ramp rather than three disconnected raw swatches.
      targets:
        - surface/neutral/*
        - on_surface/neutral/*
        - foreground/default
        - foreground/subtle
        - border/default
        - border/subtle
    - scope: brand
      source_family: liberty_mountain/sunrise
      rationale: User-approved live write. Sunrise is the primary expressive lane.
      targets:
        - surface/brand/*
        - on_surface/brand/*
        - foreground/brand
        - border/brand
    - scope: brand_secondary
      source_family: liberty_mountain/spring
      rationale: User-approved live write. Spring is the supporting expressive lane.
      targets:
        - surface/brand_secondary/*
        - on_surface/brand_secondary/*
        - foreground/brand_secondary
        - border/brand_secondary
  global_only_families:
    - family: liberty_mountain/twilight
      rationale: Preserved as a raw source family only in the first pass.
    - family: liberty_mountain/summit
      rationale: Preserved as a raw source family only in the first pass.
    - family: liberty_mountain/tundra
      rationale: Preserved as a raw source family only in the first pass.
    - family: liberty_mountain/shale
      rationale: Preserved as a raw source family only in the first pass.
    - family: liberty_mountain/stone
      rationale: Preserved as a raw source family only in the first pass.
    - family: liberty_mountain/sand
      rationale: Preserved as a raw source family only in the first pass even though it also informs the composite neutral family.
    - family: liberty_mountain/mineral
      rationale: Preserved as a raw source family only in the first pass even though it also informs the composite neutral family.
    - family: liberty_mountain/limestone
      rationale: Preserved as a raw source family only in the first pass even though it also informs the composite neutral family.
    - family: liberty_mountain/sunset
      rationale: Preserved as a raw source family only in the first pass.
    - family: liberty_mountain/flora
      rationale: Preserved as a raw source family only in the first pass.
    - family: liberty_mountain/copper
      rationale: Preserved as a raw source family only in the first pass.
  role_exceptions:
    - target: assets/logo
      source_token: Liberty Mountain
      rationale: The live semantic color extension should resolve the logo-name string to the brand display name.

