validation:
  perceptual_consistency_notes:
  - "The live write preserves original palette swatches in documentation as alias anchors while consolidating them into two governed neutral ramps: `warm_neutral` and `cool_neutral`."
  - The 2026-03-30 cleanup removes duplicate standalone raw families for `Twilight`, `Summit`, `Tundra`, `Sand`, `Mineral`, and `Limestone` in favor of the grouped neutral ramps.
  contrast_checks:
  - token: liberty_mountain/sunrise/800
    foreground: universal/white
    ratio: generated_for_write
    result: pass
  - token: liberty_mountain/spring/800
    foreground: universal/white
    ratio: generated_for_write
    result: pass
  - token: liberty_mountain/warm_neutral/100
    foreground: universal/black
    ratio: generated_for_write
    result: pass
semantic_recommendations:
  role_sets:
  - scope: neutral
    source_family: liberty_mountain/warm_neutral
    rationale: User-approved live write. The neutral lane should behave as one warm structural ramp rather than three disconnected raw swatches.
    targets:
    - surface/neutral/*
    - on_surface/neutral/*
    - foreground/default
    - foreground/subtle
    - border/default
    - border/subtle
  - scope: brand
    source_family: liberty_mountain/sunrise
    rationale: User-approved live write. Sunrise is the primary expressive lane.
    targets:
    - surface/brand/*
    - on_surface/brand/*
    - foreground/brand
    - border/brand
  - scope: brand_secondary
    source_family: liberty_mountain/spring
    rationale: User-approved live write. Spring is the supporting expressive lane.
    targets:
    - surface/brand_secondary/*
    - on_surface/brand_secondary/*
    - foreground/brand_secondary
    - border/brand_secondary
  global_only_families:
  - family: liberty_mountain/cool_neutral
    rationale: Preserved as a grouped raw source family only. The original Twilight, Summit, and Tundra swatches stay visible in documentation as alias anchors.
  - family: liberty_mountain/shale
    rationale: Preserved as a raw source family only.
  - family: liberty_mountain/stone
    rationale: Preserved as a raw source family only.
  - family: liberty_mountain/sunset
    rationale: Preserved as a raw source family only.
  - family: liberty_mountain/flora
    rationale: Preserved as a raw source family only.
  - family: liberty_mountain/copper
    rationale: Preserved as a raw source family only.
  role_exceptions:
  - target: assets/logo
    source_token: Liberty Mountain
    rationale: The live semantic color extension should resolve the logo-name string to the brand display name.
review_readiness:
  intended_review_channels:
  - web
  - email
  - ads
  review_rules:
  - subject: Liberty Mountain expressive lane order
    channels:
    - web
    - email
    - ads
    rule: Sunrise must stage as the primary expressive semantic lane and Spring must stage as the secondary expressive semantic lane.
    source_basis: User instruction in chat
  - subject: Liberty Mountain neutral composition
    channels:
    - web
    - email
    - ads
    rule: Limestone, Mineral, and Sand should behave as one structural neutral ramp in the semantic layer, while Summit, Twilight, and corrected Tundra should stay documented as original swatches but consolidate into the raw-only `cool_neutral` ramp.
    source_basis: User instruction in chat
open_questions:
- The source page does not provide a CTA-specific color rule, so the live write keeps action color meaning in the shared channel layer rather than inventing a new semantic slot.
