        - ads
      rule: Sunrise must stage as the primary expressive semantic lane and Spring must stage as the secondary expressive semantic lane.
      source_basis: User instruction in chat
    - subject: Liberty Mountain neutral composition
      channels:
        - web
        - email
        - ads
      rule: Limestone, Mineral, and Sand should behave as one structural neutral ramp in the semantic layer.
      source_basis: User instruction in chat

