date: '2026-04-01'
brand: liberty_mountain
source_reference: User-provided image in chat showing Liberty Mountain typography guidance
source_type: image
figma_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Foundations?node-id=1-3
status: active
preview:
  required_before_write: true
  artifact: figma/brands/liberty_mountain/typography/preview.md
  status: written_in_figma
source_roles:
- source_role: headline
  source_family_name: Brown
  source_style_name: Brown Regular
  source_weight_label: Regular
  source_usage_scope: Headlines
  text_case: not specified in source
  tracking: '-40'
  leading: 90 percent minimum / 100 percent maximum
  size_rule: 36 to 72 pt and above
  punctuation_rule: not specified in source
  sample_copy: Duis non, commodo luctus!
  notes: The source also lists Brown Light in the Headlines section, so Brown Light remains documented
    as a raw alternate headline treatment.
  source_safe_family_name: Semplicitapro
  source_safe_reference_column: headline_font
- source_role: headline_alternate
  source_family_name: Brown
  source_style_name: Brown Light
  source_weight_label: Light
  source_usage_scope: Headlines
  text_case: not specified in source
  tracking: '-40'
  leading: 90 percent minimum / 100 percent maximum
  size_rule: 36 to 72 pt and above
  punctuation_rule: not specified in source
  sample_copy: Maecenas diam eget.
  notes: Preserved in documentation as a raw alternate headline treatment rather than a separate semantic
    lane.
  source_safe_family_name: Semplicitapro
  source_safe_reference_column: headline_font
- source_role: subheadline
  source_family_name: Brown
  source_style_name: Brown Light
  source_weight_label: Light
  source_usage_scope: Sub headline
  text_case: not specified in source
  tracking: '-40'
  leading: 110 percent minimum / 120 percent maximum
  size_rule: 14 to 36 pt
  punctuation_rule: not specified in source
  sample_copy: Donec ullamcorper nulla non metus auctor fringilla.
  notes: The source lists Sentinel Book as an alternate subheadline family.
  source_safe_family_name: Semplicitapro
  source_safe_reference_column: headline_font
- source_role: body
  source_family_name: Brown
  source_style_name: Brown Light
  source_weight_label: Light
  source_usage_scope: Body copy
  text_case: sentence case
  tracking: '0'
  leading: 110 percent minimum / 120 percent maximum
  size_rule: below 14 pt
  punctuation_rule: not specified in source
  sample_copy: Lorem ipsum dolor sit amet, consectetur adipiscing elit.
  notes: The source lists Sentinel Book as an alternate body family.
  source_safe_family_name: Open Sans
  source_safe_reference_column: body_font
- source_role: alternate
  source_family_name: Sentinel Book
  source_style_name: Sentinel Book
  source_weight_label: Book
  source_usage_scope: Alternate sub headline and body copy
  text_case: sentence case
  tracking: not specified in source
  leading: follows the paired role
  size_rule: follows the paired role
  punctuation_rule: not specified in source
  sample_copy: Nullam id dolor! Nibh ultricies ut id elit.
  notes: Preserved as a raw alternate family because the current semantic theme typography schema has
    no dedicated alternate serif lane.
  source_safe_family_name: Open Sans
  source_safe_reference_column: body_font
primitive_recommendations:
  reuse_existing:
    families: []
    weights:
    - source_weight_label: Regular
      existing_token: universal/weight/normal
      reason: Brown Regular maps cleanly to the shared regular weight primitive.
    - source_weight_label: Light
      existing_token: universal/weight/light
      reason: Brown Light maps cleanly to the shared light weight primitive.
    sizes: []
  proposed_primitives:
    families:
    - token_name: liberty_mountain/family/01
      source_family_name: Brown
      source_style_reference: Brown Regular / Brown Light
      rationale: Brown is the source-defined primary Liberty Mountain family for print and web materials.
      safe_family_token: ''
      safe_family_note: Multiple approved role-level safe-family mappings apply to this brand family;
        use the semantic safe aliases and role recipes below.
    - token_name: liberty_mountain/family/02
      source_family_name: Sentinel Book
      source_style_reference: Sentinel Book
      rationale: Sentinel Book is an explicit alternate reading and subhead family in the source.
      safe_family_token: liberty_mountain/family_safe/02
      safe_family_note: Approved safe-family companion from Vail Resorts Guidelines.pdf.
    weights: []
    safe_families:
    - token_name: liberty_mountain/family_safe/01
      source_family_name: Semplicitapro
      source_role_reference: eyebrow, headline, cta
      rationale: Approved web safe family from Vail Resorts Guidelines.pdf for the eyebrow, headline,
        cta lane.
    - token_name: liberty_mountain/family_safe/02
      source_family_name: Open Sans
      source_role_reference: body
      rationale: Approved web safe family from Vail Resorts Guidelines.pdf for the body lane.
  hold_for_review: []
semantic_recommendations:
  family_aliases:
  - semantic_token: family/heading
    global_token: liberty_mountain/family/01
    safe_semantic_token: family/heading_safe
    safe_global_token: liberty_mountain/family_safe/01
    intended_channels:
    - web
    - email
    - ads
    notes: Headings stage on Brown because the source defines Brown as the primary family. Safe mapping
      is staged from Vail Resorts Guidelines.pdf.
  - semantic_token: family/body
    global_token: liberty_mountain/family/01
    safe_semantic_token: family/body_safe
    safe_global_token: liberty_mountain/family_safe/02
    intended_channels:
    - web
    - email
    - ads
    notes: Body copy also stages on Brown in the first pass. Safe mapping is staged from Vail Resorts
      Guidelines.pdf.
  - semantic_token: family/action
    global_token: liberty_mountain/family/01
    safe_semantic_token: family/action_safe
    safe_global_token: liberty_mountain/family_safe/01
    intended_channels:
    - web
    - email
    - ads
    notes: The source says Brown is the primary font for print and web materials, so the action family
      also follows Brown in the first pass. Safe mapping is staged from Vail Resorts Guidelines.pdf.
  weight_aliases:
  - semantic_token: weight/heading/base
    global_token: universal/weight/normal
    intended_channels:
    - web
    - email
    - ads
    notes: Brown Regular is the clearest shared heading baseline in the source.
  - semantic_token: weight/heading/strong
    global_token: universal/weight/normal
    intended_channels:
    - web
    - email
    - ads
    notes: The source does not define a heavier-than-regular heading treatment, so the live pass avoids
      inheriting the shared black default.
  - semantic_token: weight/body/base
    global_token: universal/weight/light
    intended_channels:
    - web
    - email
    - ads
    notes: Brown Light drives the reading hierarchy in the source.
  - semantic_token: weight/body/strong
    global_token: universal/weight/normal
    intended_channels:
    - web
    - email
    - ads
    notes: Brown Regular provides the nearest stronger reading weight inside the existing shared ladder.
  - semantic_token: weight/action/base
    global_token: universal/weight/normal
    intended_channels:
    - web
    - email
    - ads
    notes: The source does not provide a separate CTA rule, so the first pass keeps action weight aligned
      to the regular Brown baseline instead of inheriting black.
  size_aliases: []
role_recipes:
- role_name: heading
  source_role: headline
  proposed_family_token: liberty_mountain/family/01
  proposed_weight_token: universal/weight/normal
  proposed_size_token: inherited
  size_assumption_status: inherited_from_base
  text_case: not specified in source
  tracking: '-40'
  leading_rule: 90 percent minimum / 100 percent maximum
  size_rule: 36 to 72 pt and above
  punctuation_rule: not specified in source
  sample_copy: Duis non, commodo luctus!
  notes: Brown Light remains documented as a raw alternate headline treatment.
  safe_family_token: liberty_mountain/family_safe/01
- role_name: subheadline
  source_role: subheadline
  proposed_family_token: liberty_mountain/family/01
  proposed_weight_token: universal/weight/light
  proposed_size_token: inherited
  size_assumption_status: inherited_from_base
  text_case: not specified in source
  tracking: '-40'
  leading_rule: 110 percent minimum / 120 percent maximum
  size_rule: 14 to 36 pt
  punctuation_rule: not specified in source
  sample_copy: Donec ullamcorper nulla non metus auctor fringilla.
  notes: Sentinel Book remains a raw alternate rather than a live semantic family override.
  safe_family_token: liberty_mountain/family_safe/01
- role_name: body
  source_role: body
  proposed_family_token: liberty_mountain/family/01
  proposed_weight_token: universal/weight/light
  proposed_size_token: inherited
  size_assumption_status: inherited_from_base
  text_case: sentence case
  tracking: '0'
  leading_rule: 110 percent minimum / 120 percent maximum
  size_rule: below 14 pt
  punctuation_rule: not specified in source
  sample_copy: Lorem ipsum dolor sit amet, consectetur adipiscing elit.
  notes: Sentinel Book remains a raw alternate rather than a live semantic family override.
  safe_family_token: liberty_mountain/family_safe/02
validation:
  extraction_notes:
  - The source defines Brown as the primary family and Sentinel Book as an alternate family for subheadline
    and body work.
  - The source provides tracking and leading guidance but the current shared semantic theme typography
    schema does not include tracking variables.
  governance_notes:
  - The live write preserves `liberty_mountain/family/02` as a raw-only family because there is no dedicated
    alternate serif semantic slot.
  - The live write overrides `weight/heading/strong` and `weight/action/base` away from the shared black
    default because the source never specifies a heavy or black Liberty Mountain treatment.
  - Brand-safe typography aliases now stage on `liberty_mountain/family_safe/*` from Vail Resorts Guidelines.pdf.
review_readiness:
  intended_review_channels:
  - web
  - email
  - ads
  review_rules:
  - subject: Liberty Mountain primary family
    channels:
    - web
    - email
    - ads
    rule: Brown should drive heading, body, and action families in the first semantic pass.
    source_basis: Source typography page states Brown is the primary font for all print and web materials.
  - subject: Liberty Mountain alternate family containment
    channels:
    - web
    - email
    - ads
    rule: Sentinel Book remains a raw alternate family until the semantic theme typography schema gains
      a dedicated alternate lane.
    source_basis: Source typography page lists Sentinel Book as an alternate family only.
open_questions:
- The source does not define a CTA-specific role recipe, so the first pass stages action on Brown Regular
  instead of inventing a separate CTA treatment.
safe_source_reference: Vail Resorts Guidelines.pdf
safe_source_type: pdf
