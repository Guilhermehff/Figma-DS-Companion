color_proportion_guidance:
  status: active
  source_basis: Approximate ratios inferred from the relative field widths in the user-provided Stowe guide image. The source says the page shows the recommended ratios for color usage across touchpoints but does not publish exact percentages.
  contexts:
    - name: brand_touchpoints
      intent: Powder White is the dominant canvas. Stowe Red is the primary expressive lane. Ice Blue and Winter Blue share the supporting structural blue-gray system, with Ice Blue carrying more area than Winter Blue.
      proportions:
        - source_color: Powder White
          token: universal/white
          percentage: 50
          rationale: Largest field in the composition and the main whitespace carrier.
        - source_color: Stowe Red
          token: stowe/stowe_red/600
          percentage: 20
          rationale: Largest non-white block and the clearest brand-identifying color.
        - source_color: Ice Blue
          token: stowe/stowe_blue/500
          percentage: 18
          rationale: Wider of the two blue-gray support blocks in the recommended ratio strip.
        - source_color: Winter Blue
          token: stowe/stowe_blue/800
          percentage: 12
          rationale: Narrowest support block and the darkest contrast lane in the source strip.
      notes:
        - These percentages are approximate documentation guidance inferred from the displayed ratio fields rather than exact published source values.
        - Ice Blue and Winter Blue are governed inside one raw family even though the usage page shows them as separate visual shares.

validation:
  perceptual_consistency_notes:
    - Stowe Red lands cleanly at `600`, keeping the supplied red in the expected mid-dark expressive band while preserving usable lighter and darker extensions.
    - Ice Blue and Winter Blue sit naturally at `500` and `800`, which supports a single blue-gray system spanning cool surfaces, readable default text, and darker emphasis.
    - Exact white remains shared through `universal/white` instead of creating a duplicate Stowe white family.
    - User-approved live write. The supporting expressive lane uses `stowe_blue`, but its semantic `default/strong/emphasis` steps stage on `600/700/800` because the raw `500` source anchor does not support the shared white on-surface contract.
  contrast_checks:
    - token: stowe/stowe_red/800
      foreground: white
      ratio: "12.17:1"
      result: pass
    - token: stowe/stowe_red/900
      foreground: white
      ratio: "16.34:1"
      result: pass
    - token: stowe/stowe_red/950
      foreground: white
      ratio: "18.19:1"
      result: pass
    - token: stowe/stowe_red/50
      foreground: black
      ratio: "19.75:1"
      result: pass
    - token: stowe/stowe_red/100
      foreground: black
      ratio: "17.56:1"
      result: pass
    - token: stowe/stowe_red/200
      foreground: black
      ratio: "13.48:1"
      result: pass
    - token: stowe/stowe_blue/800
      foreground: white
      ratio: "9.49:1"
      result: pass
    - token: stowe/stowe_blue/900
      foreground: white
      ratio: "15.18:1"
      result: pass
    - token: stowe/stowe_blue/950
      foreground: white
      ratio: "17.90:1"
      result: pass
    - token: stowe/stowe_blue/50
      foreground: black
