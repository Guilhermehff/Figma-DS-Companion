semantic_recommendations:
  role_sets:
    - scope: neutral
      source_family: stowe/stowe_blue
      rationale: Stowe's supplied blues are already doing structural work in the brand specimen pages, so the first governed recommendation is to let the blue-gray family drive neutral surfaces, borders, and readable default foregrounds.
      targets:
        - surface/neutral/*
        - on_surface/neutral/*
        - foreground/default
        - foreground/subtle
        - border/default
        - border/subtle
    - scope: brand
      source_family: stowe/stowe_red
      rationale: Stowe Red is the dominant expressive brand identifier and should drive the primary expressive semantic lane.
      targets:
        - surface/brand/*
        - on_surface/brand/*
        - foreground/brand
        - border/brand
    - scope: brand_secondary
      source_family: stowe/stowe_blue
      rationale: Approved live write. `stowe_blue` is the only supporting non-red hue in the supplied palette, so it stages as the supporting expressive lane, with the semantic default/strong/emphasis steps landing at `600/700/800` for readable white foreground use.
      targets:
        - surface/brand_secondary/*
        - on_surface/brand_secondary/*
        - foreground/brand_secondary
        - border/brand_secondary
  global_only_families: []
  role_exceptions:
    - target: surface/neutral/canvas
      source_token: universal/white
      rationale: Powder White is an exact shared white and the specimen pages use it as the dominant page canvas.

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Stowe blue-gray neutral system
      channels:
        - web
        - email
        - ads
      rule: Keep Ice Blue and Winter Blue in one governed structural lane so cool surfaces and readable default text stay visually related.
      source_basis: The supplied palette and typography specimen both use the darker blue-gray as the default readable text color and the lighter blue-gray as a supporting brand color.
    - subject: Stowe expressive lane order
      channels:
        - web
        - email
        - ads
      rule: Use Stowe Red as the primary expressive lane and treat the blue-gray family as the supporting system lane.
      source_basis: The supplied palette page positions Stowe Red as the dominant visual brand identifier.

