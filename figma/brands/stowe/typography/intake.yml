    source_family_name: Athena
    source_style_name: Regular
    source_weight_label: Regular
    source_usage_scope: primary_display_headline
    text_case: uppercase
    tracking: 0px
    leading: font_size_times_1
    size_rule: source defines case, weight language, and relational leading but no governed numeric size
    punctuation_rule: not specified in source
    sample_copy: STEP INTO THE ALLURE
    notes: The source explicitly labels the headline family as Athena Regular, and the user approved the live write to treat the supporting prose word `bold` as a copy mistake.
  - source_role: subhead
    source_family_name: Raleway
    source_style_name: Bold
    source_weight_label: Bold
    source_usage_scope: supporting_headline_copy
    text_case: title_case
    tracking: 0px
    leading: font_size_times_1_5
    size_rule: source defines relational leading but no governed numeric size
    punctuation_rule: not specified in source
    sample_copy: Experience The Luxury of Stowe In The Heart of Vermont.
    notes: The source explicitly labels subheads as Raleway Bold and says they remain left justified unless a layout calls for centering.
  - source_role: body
    source_family_name: Raleway
    source_style_name: Regular
    source_weight_label: Regular
    source_usage_scope: reading_copy
    text_case: sentence_case
    tracking: 0px
    leading: font_size_times_1_8
    size_rule: source defines relational leading but no governed numeric size
    punctuation_rule: not specified in source
    sample_copy: Nam velliqui beatur alit la volorpo rionsedi consecus ent quam sumquiam, occatur?
    notes: Body copy is explicitly labeled Raleway Regular and should be left justified unless a layout calls for centering.
  - source_role: body_contrasting
    source_family_name: Raleway
    source_style_name: Light
    source_weight_label: Light
    source_usage_scope: contrast_body_or_supporting_copy
    text_case: sentence_case
    tracking: 0px
    leading: font_size_times_1_8
    size_rule: source defines relational leading but no governed numeric size
    punctuation_rule: not specified in source
    sample_copy: This font should be used sparingly due to legibility and only when large enough to be read.
    notes: The source explicitly labels body and contrasting type as Raleway Light and says it should be used sparingly.

primitive_recommendations:
  reuse_existing:
    families: []
    weights:
      - source_weight_label: Regular
        existing_token: universal/weight/normal
        reason: Direct match for Athena Regular and the default Raleway body baseline.
      - source_weight_label: Bold
        existing_token: universal/weight/bold
        reason: Direct match for Raleway Bold in the subhead role.
      - source_weight_label: Light
        existing_token: universal/weight/light
        reason: Direct match for the contrasting Raleway Light role.
    sizes:
      - source_size_reference: headline default
        existing_token: inherited current heading ladder
        assumption_status: deferred_no_new_size
        assumption_note: The source provides relational leading only and no governed numeric size.
        reason: Live semantic size aliases can remain inherited in the first pass.
      - source_size_reference: subhead default
        existing_token: inherited current body and heading ladders
        assumption_status: deferred_no_new_size
        assumption_note: The source provides relational leading only and no governed numeric size.
        reason: No new raw size values are justified yet.
      - source_size_reference: body default
        existing_token: inherited current body ladder
        assumption_status: deferred_no_new_size
        assumption_note: The source provides relational leading only and no governed numeric size.
        reason: Live semantic size aliases can remain inherited in the first pass.
  proposed_primitives:
    families:
      - token_name: stowe/family/01
        source_family_name: Athena
        source_style_reference: Athena Regular headline system
        rationale: Stowe uses Athena only in the display headline lane, so it should stage as a dedicated display family primitive.
        fallback_token: universal/family/fallback
        fallback_note: The source does not define a fallback stack.
      - token_name: stowe/family/02
        source_family_name: Raleway
        source_style_reference: Raleway Bold, Regular, and Light across subhead, body, and contrasting body roles
        rationale: Raleway carries the reading and supporting hierarchy, so one primary family primitive is enough for the first pass.
        fallback_token: universal/family/fallback
        fallback_note: The source does not define a fallback stack.
    weights: []
  hold_for_review: []

semantic_recommendations:
  family_aliases:
    - semantic_token: family/heading
      global_token: stowe/family/01
      safe_semantic_token: family/heading_safe
      safe_global_token: universal/family/fallback
      intended_channels:
        - web
        - email
        - ads
      notes: Athena is the proposed display family for Stowe headlines.
    - semantic_token: family/body
      global_token: stowe/family/02
      safe_semantic_token: family/body_safe
      safe_global_token: universal/family/fallback
      intended_channels:
        - web
        - email
        - ads
      notes: Raleway is the proposed body and supporting-copy family.
    - semantic_token: family/action
      global_token: stowe/family/01
      safe_semantic_token: family/action_safe
      safe_global_token: universal/family/fallback
      intended_channels:
        - web
        - email
        - ads
      notes: User-approved live write. Action follows the same family as heading.
  weight_aliases:
    - semantic_token: weight/heading/base
      global_token: universal/weight/normal
      intended_channels:
        - web
        - email
        - ads
      notes: User-approved live write. The semantic heading baseline follows the explicit `Athena Regular` label rather than the contradictory prose word `bold`.
    - semantic_token: weight/body/base
      global_token: universal/weight/normal
      intended_channels:
        - web
        - email
        - ads
      notes: Body copy explicitly uses Raleway Regular.
    - semantic_token: weight/body/strong
      global_token: universal/weight/bold
      intended_channels:
        - web
        - email
        - ads
      notes: User-approved live write. The stronger body emphasis lane stages the explicit Raleway Bold subhead treatment.
    - semantic_token: weight/action/base
      global_token: universal/weight/normal
      intended_channels:
        - web
        - email
        - ads
      notes: User-approved live write. Action follows the same weight as heading.
  size_aliases: []

