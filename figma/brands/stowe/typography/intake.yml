validation:
  extraction_notes:
    - The source explicitly names Athena Regular for headlines and Raleway Bold, Regular, and Light for the supporting hierarchy.
    - The source provides case, tracking, kerning, and leading ratios but no governed numeric sizes and no CTA recipe.
  governance_notes:
    - Stowe stages cleanly as a two-family system with Athena in the display lane and Raleway across the reading hierarchy.
    - User-approved exception. The live write treats the headline prose word `bold` as a source copy mistake and follows the explicit Athena Regular label.
    - User-approved mapping. Action follows the same family and weight as heading.
    - "`weight/body/strong` stages on `universal/weight/bold` so the explicit Raleway Bold subhead treatment remains available through the current semantic theme typography ladder."

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Stowe display-family split
      channels:
        - web
        - email
        - ads
      rule: Keep Athena isolated to the headline display lane and keep Raleway on subhead and reading work.
      source_basis: The source explicitly names Athena only for headlines and Raleway for the supporting hierarchy.
    - subject: Stowe headline weight contradiction
      channels:
        - web
        - email
        - ads
      rule: Follow the explicit `Athena Regular` label and treat the contradictory prose word `bold` as a source copy mistake.
      source_basis: User-approved live write decision in chat.

