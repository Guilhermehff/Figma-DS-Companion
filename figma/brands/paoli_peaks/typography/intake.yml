date: 2026-03-30
brand: paoli_peaks
source_reference: Vail Resorts Guidelines - Google Sheets.pdf
source_type: pdf
figma_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Foundations?node-id=277-998
status: active
preview:
  required_before_write: true
  artifact: figma/brands/paoli_peaks/typography/preview.md
  status: written_in_figma

source_roles:
  - source_role: headline
    source_family_name: Rockwell Nova
    source_style_name: Extra Bold
    source_weight_label: Extra Bold
    source_usage_scope: headline
    text_case: source dependent
    tracking: not specified in source
    leading: not specified in source
    size_rule: source names roles and weights but does not define governed numeric sizes
    punctuation_rule: not specified in source
    sample_copy: Paoli Peaks
  - source_role: subheadline
    source_family_name: Rockwell Nova
    source_style_name: not specified
    source_weight_label: Regular
    source_usage_scope: supporting headline
    text_case: source dependent
    tracking: not specified in source
    leading: not specified in source
    size_rule: source names roles and weights but does not define governed numeric sizes
    punctuation_rule: not specified in source
    sample_copy: Current conditions

primitive_recommendations:
  reuse_existing:
    families: []
    weights:
      - source_weight_label: Extra Bold
        existing_token: universal/weight/black
        reason: Extra Bold maps to the closest governed heavy weight in the shared ladder.
      - source_weight_label: Regular
        existing_token: universal/weight/normal
        reason: Regular maps directly to the shared normal weight token.
    sizes:
      - source_size_reference: inherited
        existing_token: universal/size/*
        assumption_status: deferred_no_new_size
        assumption_note: The PDF names roles and weights but does not govern numeric sizes.
        reason: "Typography size continues to publish from the shared Global: Typography ladder."
  proposed_primitives:
    families:
      - token_name: paoli_peaks/family/01
        source_family_name: Rockwell Nova
        source_style_reference: headline and subheadline family
        rationale: One-family system for the first governed pass.
        fallback_token: universal/family/fallback
        fallback_note: Safe-family behavior remains inherited from the semantic base.
    weights: []
  hold_for_review:
    - source_item: body lane
      reason: The PDF does not list a body family, so body remains on the same raw family with the shared normal weight in the first pass.

semantic_recommendations:
  family_aliases:
    - semantic_token: family/heading
      global_token: paoli_peaks/family/01
      safe_semantic_token: family/heading_safe
      safe_global_token: universal/family/fallback
      intended_channels:
        - web
        - email
        - ads
    - semantic_token: family/body
      global_token: paoli_peaks/family/01
      safe_semantic_token: family/body_safe
      safe_global_token: universal/family/fallback
      intended_channels:
        - web
        - email
        - ads
    - semantic_token: family/action
      global_token: paoli_peaks/family/01
      safe_semantic_token: family/action_safe
      safe_global_token: universal/family/fallback
      intended_channels:
        - web
        - email
        - ads
  weight_aliases:
    - semantic_token: weight/heading/base
      global_token: universal/weight/black
    - semantic_token: weight/heading/strong
      global_token: universal/weight/black
    - semantic_token: weight/body/base
      global_token: universal/weight/normal
    - semantic_token: weight/body/strong
      global_token: universal/weight/normal
    - semantic_token: weight/action/base
      global_token: universal/weight/black
  size_aliases: []

role_recipes:
  - role_name: heading
    source_role: Rockwell Nova Extra Bold
    proposed_family_token: paoli_peaks/family/01
    proposed_weight_token: universal/weight/black
    proposed_size_token: inherited current heading ladder
  - role_name: body
    source_role: derived from the shared Rockwell Nova family because the PDF does not define a body lane
    proposed_family_token: paoli_peaks/family/01
    proposed_weight_token: universal/weight/normal
    proposed_size_token: inherited current body ladder
  - role_name: action
    source_role: derived from the headline family because the PDF does not define a separate CTA lane
    proposed_family_token: paoli_peaks/family/01
    proposed_weight_token: universal/weight/black
    proposed_size_token: inherited current action ladder

validation:
  extraction_notes:
    - The PDF explicitly names Rockwell Nova Extra Bold for headline and Rockwell Nova for subheadline.
    - The PDF does not define a body or CTA lane, so body remains normal and action follows the headline family in the first pass.
  governance_notes:
    - Paoli Peaks is live as a one-family typography system with Rockwell Nova across heading, body, and action work.
    - "Typography size continues to bind directly from published Global: Typography."

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Paoli Peaks Rockwell Nova system
      channels:
        - web
        - email
        - ads
      rule: Keep Rockwell Nova on the governed family lanes, map headline and action to black, and keep body on normal until a separate body lane is supplied.
      source_basis: Vail Resorts Guidelines - Google Sheets PDF.

open_questions: []
