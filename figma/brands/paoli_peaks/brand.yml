semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: brand
        source_family: paoli_peaks/paoli_blue
        targets:
          - surface/brand/*
          - on_surface/brand/*
          - foreground/brand
          - border/brand
      - scope: brand_secondary
        source_family: paoli_peaks/peaks_valley
        targets:
          - surface/brand_secondary/*
          - on_surface/brand_secondary/*
          - foreground/brand_secondary
          - border/brand_secondary
      - scope: asset_logo
        source_value: Paoli Peaks
        targets:
          - assets/logo
    inherited_from_base:
      - surface/neutral/*
      - on_surface/neutral/*
      - foreground/default
      - foreground/subtle
      - border/default
      - border/subtle
      - surface/positive/*
      - on_surface/positive/*
      - surface/warning/*
      - on_surface/warning/*
      - surface/critical/*
      - on_surface/critical/*
      - foreground/positive
      - foreground/warning
      - foreground/critical
      - border/positive
      - border/warning
      - border/critical
    notes:
      - "`paoli_blue` drives the primary expressive lane and `peaks_valley` drives the supporting expressive lane."
      - "`peaks_peak` remains a governed raw-only family in the first pass."
      - The documented gradient remains outside the current solid-color variable model.
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: paoli_peaks/family/primary
      - semantic_token: family/body
        alias_of: paoli_peaks/family/primary
      - semantic_token: family/action
        alias_of: paoli_peaks/family/primary
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/*
      - size/*
    notes:
      - Paoli Peaks adds a governed raw family token with the same string value as `universal/family/primary`.
notes:
  - Paoli Peaks is live in the Foundations file with three raw color families, one mirrored raw typography family primitive, and Paoli Peaks semantic color and typography extensions.
