semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: brand
        source_family: paoli_peaks/paoli_blue
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: paoli_peaks/peaks_valley
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Paoli Peaks
        targets:
        - assets/logo
      inherited_from_base:
      - surface/neutral/*
      - surface/neutral/*_inverse
      - foreground/default
      - foreground/default_inverse
      - foreground/subtle
      - foreground/subtle_inverse
      - border/default
      - border/default_inverse
      - border/subtle
      - border/subtle_inverse
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - "`paoli_blue` drives the primary expressive lane and `peaks_valley` drives the supporting expressive lane."
      - "`peaks_peak` remains a governed raw-only family in the first pass."
      - The documented gradient remains outside the current solid-color variable model.
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: paoli_peaks/family/primary
      - semantic_token: family/body
        alias_of: paoli_peaks/family/primary
      - semantic_token: family/action
        alias_of: paoli_peaks/family/primary
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/*
      notes:
      - Paoli Peaks adds a governed raw family token with the same string value as `universal/family/primary`.
notes:
- Paoli Peaks is live in the Foundations file with three raw color families, one mirrored raw typography family primitive, and Paoli Peaks semantic theme extension.
