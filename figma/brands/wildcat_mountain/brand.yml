    decision_artifacts: []
semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: brand
        source_family: wildcat_mountain/wildcat_green
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: wildcat_mountain/wildcat_teal
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Wildcat Mountain
        targets:
        - assets/logo
      inherited_from_base:
      - surface/neutral/*
      - surface/neutral/*_inverse
      - foreground/default
      - foreground/default_inverse
      - foreground/subtle
      - foreground/subtle_inverse
      - border/default
      - border/default_inverse
      - border/subtle
      - border/subtle_inverse
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - Exact black and white remain inherited through the shared neutral role recipes.
      - "`wildcat_green` drives the primary expressive lane and `wildcat_teal` drives the secondary expressive lane."
      - "`wildcat_tan` and `wedding_blue` are governed raw-only families in the first pass."
    typography:
      override_scopes: []
      inherited_from_base:
      - family/*
      - weight/*
      notes:
      - The Vail Resorts Guidelines PDF does not list brand font guidance for Wildcat Mountain, so the semantic theme extension continues to inherit the shared universal typography base without overrides.
      - 'Typography size continues to bind directly from published `Global: Typography`.'
notes:
- Wildcat Mountain is live in the Foundations file with four raw color families, no brand-specific raw typography families, and Wildcat Mountain semantic theme extension.
