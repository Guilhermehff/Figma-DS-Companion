semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: neutral
        source_family: crested_butte/beyond_black
        targets:
          - surface/neutral/*
          - surface/neutral/*_inverse
          - foreground/default
          - foreground/default_inverse
          - foreground/subtle
          - foreground/subtle_inverse
          - border/default
          - border/default_inverse
          - border/subtle
          - border/subtle_inverse
      - scope: brand
        source_family: crested_butte/wild_red
        targets:
          - surface/brand/*
          - surface/brand/*_inverse
          - on_surface/brand/*
          - on_surface/brand/*_inverse
          - foreground/brand
          - foreground/brand_inverse
          - border/brand
          - border/brand_inverse
      - scope: brand_secondary
        source_family: crested_butte/wild_red
        targets:
          - surface/brand_secondary/*
          - surface/brand_secondary/*_inverse
          - on_surface/brand_secondary/*
          - on_surface/brand_secondary/*_inverse
          - foreground/brand_secondary
          - foreground/brand_secondary_inverse
          - border/brand_secondary
          - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Crested Butte
        targets:
          - assets/logo
    inherited_from_base:
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
    notes:
      - '`on_surface/*` tokens in the live semantic color extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted.'
      - Wild Red now feeds both expressive role sets in the role-based migration.
      - Beyond Black drives the neutral role set, and no third expressive semantic lane survives this migration.
      - "`assets/logo` is overridden to the string `Crested Butte` in the semantic color extension."
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: crested_butte/family/primary
      - semantic_token: family/body
        alias_of: crested_butte/family/primary
      - semantic_token: family/action
        alias_of: crested_butte/family/primary
      - semantic_token: weight/heading/base
        alias_of: universal/weight/semibold
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: weight/action/base
        alias_of: universal/weight/semibold
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - size/*
    notes:
      - The supplied typography source uses Gibson across all reviewed roles, so a single brand family primitive is sufficient.
      - "`universal/weight/semibold` is now written in `_Global: Typography` and used by the Crested Butte semantic typography extension."
notes:
  - Crested Butte is live in the Foundations file with global color ladders, a global typography family, the shared semibold raw weight, a semantic color logo-name override, and semantic color and typography extensions.
