      foreground: white
      ratio: "15.27:1"
      result: pass
    - token: crested_butte/wild_red/950
      foreground: white
      ratio: "18.46:1"
      result: pass
    - token: crested_butte/beyond_black/100
      foreground: black
      ratio: "18.43:1"
      result: pass
    - token: crested_butte/beyond_black/200
      foreground: black
      ratio: "16.06:1"
      result: pass
    - token: crested_butte/beyond_black/800
      foreground: white
      ratio: "10.37:1"
      result: pass
    - token: crested_butte/beyond_black/900
      foreground: white
      ratio: "14.55:1"
      result: pass
    - token: crested_butte/beyond_black/950
      foreground: white
      ratio: "17.40:1"
      result: pass

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Crested Butte Powder White
      channels:
        - web
        - email
        - ads
      rule: Reuse `universal/white` instead of creating a duplicate brand white.
      source_basis: The source swatch is an exact `#ffffff` match.
    - subject: Crested Butte Wild Red
      channels:
        - web
        - email
        - ads
      rule: Treat `wild_red/*` as the source for `brand/*` and `brand_secondary/*` while keeping any extra reuse global-only and separate from shared feedback semantics.
      source_basis: The source presents Wild Red as part of the core brand palette, not as a state color.
    - subject: Crested Butte Beyond Black
      channels:
        - web
        - email
        - ads
      rule: Feed `beyond_black/*` into the semantic neutral ladder and use it for dark-on-light or light-on-dark brand surfaces.
      source_basis: The source names Beyond Black as a primary palette color alongside Wild Red and Powder White.

