  hold_for_review: []

semantic_recommendations:
  role_sets:
    - scope: neutral
      source_family: hidden_valley_pa/hidden_valley_pa_neutral
      targets:
        - surface/neutral/*
        - on_surface/neutral/*
        - foreground/default
        - foreground/subtle
        - border/default
        - border/subtle
    - scope: brand
      source_family: hidden_valley_pa/laurel_blue
      targets:
        - surface/brand/*
        - on_surface/brand/*
        - foreground/brand
        - border/brand
    - scope: brand_secondary
      source_family: hidden_valley_pa/dark_beige
      targets:
        - surface/brand_secondary/*
        - on_surface/brand_secondary/*
        - foreground/brand_secondary
        - border/brand_secondary
  global_only_families:
    - hidden_valley_pa/light_beige/*
  role_exceptions:
    - target: assets/logo
      source_token: Hidden Valley PA
      rationale: The semantic color extension stores the governed display label.

live_figma_write:
  semantic_extension_id: VariableCollectionId:221:1532
  raw_color_families:
    - hidden_valley_pa/laurel_blue/*
    - hidden_valley_pa/dark_beige/*
    - hidden_valley_pa/light_beige/*
    - hidden_valley_pa/hidden_valley_pa_neutral/*
  notes:
    - The Pennsylvania suffix is a governance distinguisher so this brand stays separate from Hidden Valley MO.
    - '`light_beige` remains raw-only while the composite neutral family handles structural roles.'

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Hidden Valley PA neutral split
      channels:
        - web
        - email
        - ads
      rule: 'Keep `light_beige` available raw-only while the composite neutral family owns structural roles.'
      source_basis: The source sheet presents beige as a family, not as a separate expressive accent lane.

