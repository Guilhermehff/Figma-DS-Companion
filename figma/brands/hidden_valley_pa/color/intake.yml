      provided_value: "#000000"
      existing_token: universal/black
      rationale: Exact shared black.
    - source_name: White
      provided_value: "#ffffff"
      existing_token: universal/white
      rationale: Exact shared white.
  new_brand_families:
    - family: laurel_blue
      source_name: Laurel Blue
      provided_value: "#00447c"
      rationale: Primary expressive brand lane.
    - family: dark_beige
      source_name: Dark Beige
      provided_value: "#8a724e"
      rationale: Supporting expressive brand lane.
    - family: light_beige
      source_name: Light Beige
      provided_value: "#e3d4b8"
