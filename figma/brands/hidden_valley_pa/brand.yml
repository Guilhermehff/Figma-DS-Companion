semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: brand
        source_family: hidden_valley_pa/laurel_blue
        targets:
        - color/surface/brand/*
        - color/surface/brand/*_inverse
        - color/foreground/brand
        - color/foreground/brand_inverse
        - color/border/brand
        - color/border/brand_inverse
      - scope: brand_secondary
        source_family: hidden_valley_pa/beige
        targets:
        - color/surface/brand_secondary/*
        - color/surface/brand_secondary/*_inverse
        - color/foreground/brand_secondary
        - color/foreground/brand_secondary_inverse
        - color/border/brand_secondary
        - color/border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Hidden Valley PA
        targets:
        - variables/assets/logo
      inherited_from_base:
      - color/surface/neutral/*
      - color/surface/neutral/*_inverse
      - color/foreground/default
      - color/foreground/default_inverse
      - color/foreground/subtle
      - color/foreground/subtle_inverse
      - color/border/default
      - color/border/default_inverse
      - color/border/subtle
      - color/border/subtle_inverse
      - color/on_surface/brand/*
      - color/on_surface/brand/*_inverse
      - color/on_surface/brand_secondary/*
      - color/on_surface/brand_secondary/*_inverse
      - color/surface/positive/*
      - color/surface/positive/*_inverse
      - color/on_surface/positive/*
      - color/on_surface/positive/*_inverse
      - color/surface/warning/*
      - color/surface/warning/*_inverse
      - color/on_surface/warning/*
      - color/on_surface/warning/*_inverse
      - color/surface/critical/*
      - color/surface/critical/*_inverse
      - color/on_surface/critical/*
      - color/on_surface/critical/*_inverse
      - color/foreground/positive
      - color/foreground/positive_inverse
      - color/foreground/warning
      - color/foreground/warning_inverse
      - color/foreground/critical
      - color/foreground/critical_inverse
      - color/border/positive
      - color/border/positive_inverse
      - color/border/warning
      - color/border/warning_inverse
      - color/border/critical
      - color/border/critical_inverse
      notes:
      - '`color/on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted.'
      - Hidden Valley PA is live in the Foundations file as a Pennsylvania-distinguished brand record separate from Hidden Valley MO.
      - The current semantic pass uses `beige` for both structural neutral and supporting brand-secondary roles, with `laurel_blue` on the primary expressive lane.
      - The beige ladder was redesigned after consolidation so the source swatches stay exact inside a smoother single-ramp progression.
      - '`beige/300` preserves the Light Beige source swatch and `beige/500` preserves the Dark Beige source swatch.'
      - '`beige/100` is a derived very light beige so white remains governed through universal reuse instead of the brand ramp.'
      - '`variables/assets/logo` resolves to the string `Hidden Valley PA` in the semantic theme extension.'
    typography:
      override_scopes:
      - semantic_token: typography/family/heading
        alias_of: hidden_valley_pa/family/01
      - semantic_token: typography/family/body
        alias_of: hidden_valley_pa/family/01
      - semantic_token: typography/family/action
        alias_of: hidden_valley_pa/family/01
      - semantic_token: typography/weight/heading/base
        alias_of: universal/weight/black
      - semantic_token: typography/weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: typography/weight/body/strong
        alias_of: universal/weight/black
      - semantic_token: typography/family/heading_safe
        alias_of: hidden_valley_pa/family_safe/01
      - semantic_token: typography/family/body_safe
        alias_of: hidden_valley_pa/family_safe/02
      - semantic_token: typography/family/action_safe
        alias_of: hidden_valley_pa/family_safe/01
      inherited_from_base:
      - typography/weight/heading/strong
      - typography/weight/action/base
      notes:
      - Hidden Valley PA is live as a Roboto-led semantic system, with `Mrs Eaves XL` preserved as the raw display family used for logo and design applications.
      - The first semantic pass keeps heading, body, and action on `hidden_valley_pa/family/01` because the current shared typography ladder does not have a dedicated ornamental display role.
      - Brand-safe typography aliases now stage on `hidden_valley_pa/family_safe/*` from Vail Resorts Guidelines.pdf.
notes:
- Hidden Valley PA is live in the Foundations file with two raw color families, two raw typography family primitives, a semantic theme logo-name override, and Hidden Valley PA semantic theme extension.
