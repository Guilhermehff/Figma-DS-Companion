      parent_collection_id: VariableCollectionId:41:135
artifacts:
  color:
    intake_artifact: figma/brands/hidden_valley_pa/color/intake.yml
    preview_artifact: figma/brands/hidden_valley_pa/color/preview.md
    decision_artifacts: []
  typography:
    intake_artifact: figma/brands/hidden_valley_pa/typography/intake.yml
    preview_artifact: figma/brands/hidden_valley_pa/typography/preview.md
    decision_artifacts: []
semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: neutral
        source_family: hidden_valley_pa/hidden_valley_pa_neutral
        targets:
        - surface/neutral/*
        - surface/neutral/*_inverse
        - foreground/default
        - foreground/default_inverse
        - foreground/subtle
        - foreground/subtle_inverse
        - border/default
        - border/default_inverse
        - border/subtle
        - border/subtle_inverse
      - scope: brand
        source_family: hidden_valley_pa/laurel_blue
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: hidden_valley_pa/dark_beige
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Hidden Valley PA
        targets:
        - assets/logo
      inherited_from_base:
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - Hidden Valley PA is live in the Foundations file as a Pennsylvania-distinguished brand record separate from Hidden Valley MO.
      - The first semantic pass uses the composite `hidden_valley_pa_neutral` family for structure, `laurel_blue` for the primary expressive lane, and `dark_beige` for the supporting expressive lane.
      - "`light_beige` remains a governed raw global-only family in the first pass."
      - "`assets/logo` resolves to the string `Hidden Valley PA` in the semantic theme extension."
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: hidden_valley_pa/family/primary
      - semantic_token: family/body
        alias_of: hidden_valley_pa/family/primary
      - semantic_token: family/action
        alias_of: hidden_valley_pa/family/primary
      - semantic_token: weight/heading/base
        alias_of: universal/weight/black
      - semantic_token: weight/heading/strong
        alias_of: universal/weight/black
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: weight/body/strong
        alias_of: universal/weight/black
      - semantic_token: weight/action/base
        alias_of: universal/weight/black
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      notes:
      - Hidden Valley PA is live as a Roboto-led semantic system, with `Mrs Eaves XL Regular` preserved as the raw display family used for logo and design applications.
      - The first semantic pass keeps heading, body, and action on `hidden_valley_pa/family/primary` because the current shared typography ladder does not have a dedicated ornamental display role.
notes:
- Hidden Valley PA is live in the Foundations file with four raw color families, two raw typography family primitives, a semantic theme logo-name override, and Hidden Valley PA semantic theme extension.
