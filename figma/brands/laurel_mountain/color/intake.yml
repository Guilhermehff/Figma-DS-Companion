semantic_recommendations:
  role_sets:
    - scope: neutral
      source_family: laurel_mountain/dark_blue
      targets:
        - surface/neutral/*
        - on_surface/neutral/*
        - foreground/default
        - foreground/subtle
        - border/default
        - border/subtle
    - scope: brand
      source_family: laurel_mountain/red
      targets:
        - surface/brand/*
        - on_surface/brand/*
        - foreground/brand
        - border/brand
    - scope: brand_secondary
      source_family: laurel_mountain/light_blue
      targets:
        - surface/brand_secondary/*
        - on_surface/brand_secondary/*
        - foreground/brand_secondary
        - border/brand_secondary
  global_only_families: []
  role_exceptions:
    - target: assets/logo
      source_token: Laurel Mountain
      rationale: The semantic color extension stores the governed display label.

live_figma_write:
  semantic_extension_id: VariableCollectionId:221:1616
  raw_color_families:
    - laurel_mountain/red/*
    - laurel_mountain/dark_blue/*
    - laurel_mountain/light_blue/*
  notes:
    - 'The first semantic pass treats `dark_blue` as structural because it is the only source swatch that cleanly supports neutral text and border work.'

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Laurel Mountain blue split
      channels:
        - web
        - email
        - ads
      rule: 'Keep `dark_blue` structural and `light_blue` expressive in the first pass.'
      source_basis: The darker blue is the most stable structural candidate while red remains the clearest primary brand accent.

