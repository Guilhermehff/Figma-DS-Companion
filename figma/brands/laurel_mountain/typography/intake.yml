    proposed_size_token: inherited current action ladder

validation:
  extraction_notes:
    - The source distinguishes Niagara as the logotype and design-headline treatment and Roboto as the digital functional system.
  governance_notes:
    - The semantic heading lane stays on Roboto in the first pass so the live semantic mapping aligns with the explicit digital headline alternative from the source.

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Laurel Mountain display-family handling
      channels:
        - web
        - email
        - ads
      rule: Keep Niagara raw-only while Roboto carries the semantic functional hierarchy.
      source_basis: Source sheet treats Niagara as the display and logo family and Roboto as the digital alternative.

