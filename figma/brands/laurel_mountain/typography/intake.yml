primitive_recommendations:
  reuse_existing:
    families: []
    weights:
      - source_weight_label: Black
        existing_token: universal/weight/black
        reason: Direct match for Roboto Black.
      - source_weight_label: Regular
        existing_token: universal/weight/normal
        reason: Direct match for Roboto Regular.
    sizes: []
  proposed_primitives:
    families:
      - token_name: laurel_mountain/family/primary
        source_family_name: Roboto
        source_style_reference: Digital headline alt, subhead, CTA, and body
        rationale: Roboto carries the live semantic hierarchy.
        fallback_token: universal/family/web_safe
        fallback_note: Safe-family behavior remains inherited.
      - token_name: laurel_mountain/family/display
        source_family_name: Niagara
        source_style_reference: Logo and design headline treatment
        rationale: Preserved as the raw display family.
        fallback_token: universal/family/web_safe
        fallback_note: Safe-family behavior remains inherited.
    weights: []
  hold_for_review: []

semantic_recommendations:
  family_aliases:
    - semantic_token: family/heading
      global_token: laurel_mountain/family/primary
      safe_semantic_token: family/heading_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
    - semantic_token: family/body
      global_token: laurel_mountain/family/primary
      safe_semantic_token: family/body_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
    - semantic_token: family/action
      global_token: laurel_mountain/family/primary
      safe_semantic_token: family/action_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
  weight_aliases:
    - semantic_token: weight/heading/base
      global_token: universal/weight/black
    - semantic_token: weight/heading/strong
      global_token: universal/weight/black
    - semantic_token: weight/body/base
      global_token: universal/weight/normal
    - semantic_token: weight/body/strong
      global_token: universal/weight/black
    - semantic_token: weight/action/base
      global_token: universal/weight/black
  size_aliases: []

role_recipes:
  - role_name: heading
    source_role: Roboto Black digital headline alt
    proposed_family_token: laurel_mountain/family/primary
    proposed_weight_token: universal/weight/black
    proposed_size_token: inherited current heading ladder
  - role_name: body
    source_role: Roboto Regular
