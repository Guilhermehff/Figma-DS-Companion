semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: neutral
        source_family: laurel_mountain/dark_blue
        targets:
          - surface/neutral/*
          - surface/neutral/*_inverse
          - foreground/default
          - foreground/default_inverse
          - foreground/subtle
          - foreground/subtle_inverse
          - border/default
          - border/default_inverse
          - border/subtle
          - border/subtle_inverse
      - scope: brand
        source_family: laurel_mountain/red
        targets:
          - surface/brand/*
          - surface/brand/*_inverse
          - on_surface/brand/*
          - on_surface/brand/*_inverse
          - foreground/brand
          - foreground/brand_inverse
          - border/brand
          - border/brand_inverse
      - scope: brand_secondary
        source_family: laurel_mountain/light_blue
        targets:
          - surface/brand_secondary/*
          - surface/brand_secondary/*_inverse
          - on_surface/brand_secondary/*
          - on_surface/brand_secondary/*_inverse
          - foreground/brand_secondary
          - foreground/brand_secondary_inverse
          - border/brand_secondary
          - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Laurel Mountain
        targets:
          - assets/logo
    inherited_from_base:
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
    notes:
      - '`on_surface/*` tokens in the live semantic color extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted.'
      - 'Laurel Mountain is live in the Foundations file with `dark_blue` as the structural lane, `red` as the primary expressive lane, and `light_blue` as the supporting expressive lane.'
      - 'The first semantic pass treats the darker blue brand swatch as structural because it is the only source hue that can carry readable neutral text and border work without collapsing into shared black.'
      - "`assets/logo` resolves to the string `Laurel Mountain` in the semantic color extension."
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: laurel_mountain/family/primary
      - semantic_token: family/body
        alias_of: laurel_mountain/family/primary
      - semantic_token: family/action
        alias_of: laurel_mountain/family/primary
      - semantic_token: weight/heading/base
        alias_of: universal/weight/black
      - semantic_token: weight/heading/strong
        alias_of: universal/weight/black
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: weight/body/strong
        alias_of: universal/weight/black
      - semantic_token: weight/action/base
        alias_of: universal/weight/black
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - size/*
    notes:
      - 'Laurel Mountain is live as a Roboto-led semantic system, with `Niagara` preserved as the raw display family used in the logotype and design-headline source guidance.'
      - 'The semantic heading lane stays on Roboto in the first pass because the source explicitly marks Niagara as the logo and display treatment while also providing a digital Roboto headline alternative.'
notes:
  - Laurel Mountain is live in the Foundations file with three raw color families, two raw typography family primitives, a semantic color logo-name override, and Laurel Mountain semantic color and typography extensions.
