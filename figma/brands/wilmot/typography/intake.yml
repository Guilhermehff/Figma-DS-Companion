validation:
  extraction_notes:
  - The source uses Museo Slab for headline and CTA work, Museo Sans for subhead and body work, and Prompt
    only for the digital system.
  governance_notes:
  - Prompt is preserved as `wilmot/family/03` and remains raw-only in the first pass.
  - User-corrected naming pass. The governed brand name is `Wilmot`, not `Wilmot Mountain`.
  - Brand-safe typography aliases now stage on `wilmot/family_safe/*` from Vail Resorts Guidelines.pdf.
review_readiness:
  intended_review_channels:
  - web
  - email
  - ads
  review_rules:
  - subject: Wilmot utility family handling
    channels:
    - web
    - email
    - ads
    rule: Keep Prompt documented as a raw utility family while Museo Slab and Museo Sans carry the live
      semantic lanes.
    source_basis: Source sheet separates Prompt into explicitly digital-only usage.
open_questions: []
safe_source_reference: Vail Resorts Guidelines.pdf
safe_source_type: pdf
