  text_case: uppercase_or_sentence_case
  tracking: 10px_or_0px
  leading: source_dependent
  size_rule: source_dependent
  punctuation_rule: source_dependent
  sample_copy: Digital headline or body
  source_safe_family_name: Prompt
  source_safe_reference_column: cta_font
primitive_recommendations:
  reuse_existing:
    families: []
    weights:
    - source_weight_label: Bold
      existing_token: universal/weight/bold
      reason: Direct match for Museo Slab 700 and Museo Sans 700.
    - source_weight_label: Medium
      existing_token: universal/weight/medium
      reason: Direct match for Museo Sans 500.
    sizes: []
  proposed_primitives:
    families:
    - token_name: wilmot/family/01
      source_family_name: Museo Slab
      source_style_reference: 700 headline and CTA
      rationale: Display and CTA family.
      safe_family_token: wilmot/family_safe/01
      safe_family_note: Approved safe-family companion from Vail Resorts Guidelines.pdf.
    - token_name: wilmot/family/02
      source_family_name: Museo Sans
      source_style_reference: 700 subhead and 500 body
      rationale: Reading and supporting family.
      safe_family_token: ''
      safe_family_note: Multiple approved role-level safe-family mappings apply to this brand family;
        use the semantic safe aliases and role recipes below.
    - token_name: wilmot/family/03
      source_family_name: Prompt
      source_style_reference: digital-only headline, body, and CTA family
      rationale: Preserved as a raw utility family.
      safe_family_token: wilmot/family_safe/01
      safe_family_note: Approved safe-family companion from Vail Resorts Guidelines.pdf.
    weights: []
    safe_families:
    - token_name: wilmot/family_safe/01
      source_family_name: Prompt
      source_role_reference: eyebrow, headline, cta
      rationale: Approved web safe family from Vail Resorts Guidelines.pdf for the eyebrow, headline,
        cta lane.
    - token_name: wilmot/family_safe/02
      source_family_name: Open Sans
      source_role_reference: body
      rationale: Approved web safe family from Vail Resorts Guidelines.pdf for the body lane.
  hold_for_review: []
semantic_recommendations:
  family_aliases:
  - semantic_token: family/heading
    global_token: wilmot/family/01
    safe_semantic_token: family/heading_safe
    safe_global_token: wilmot/family_safe/01
    intended_channels:
    - web
    - email
    - ads
    notes: Safe mapping is staged from Vail Resorts Guidelines.pdf.
  - semantic_token: family/body
    global_token: wilmot/family/02
    safe_semantic_token: family/body_safe
    safe_global_token: wilmot/family_safe/02
    intended_channels:
    - web
    - email
    - ads
    notes: Safe mapping is staged from Vail Resorts Guidelines.pdf.
  - semantic_token: family/action
    global_token: wilmot/family/01
    safe_semantic_token: family/action_safe
    safe_global_token: wilmot/family_safe/01
    intended_channels:
    - web
    - email
    - ads
    notes: Safe mapping is staged from Vail Resorts Guidelines.pdf.
  weight_aliases:
  - semantic_token: weight/heading/base
    global_token: universal/weight/bold
  - semantic_token: weight/heading/strong
    global_token: universal/weight/bold
  - semantic_token: weight/body/base
    global_token: universal/weight/medium
  - semantic_token: weight/body/strong
    global_token: universal/weight/bold
  - semantic_token: weight/action/base
    global_token: universal/weight/bold
  size_aliases: []
role_recipes:
- role_name: heading
  source_role: Museo Slab 700
  proposed_family_token: wilmot/family/01
  proposed_weight_token: universal/weight/bold
  proposed_size_token: inherited current heading ladder
  safe_family_token: wilmot/family_safe/01
- role_name: body
  source_role: Museo Sans 500
  proposed_family_token: wilmot/family/02
  proposed_weight_token: universal/weight/medium
  proposed_size_token: inherited current body ladder
  safe_family_token: wilmot/family_safe/02
- role_name: action
  source_role: Museo Slab 700
  proposed_family_token: wilmot/family/01
  proposed_weight_token: universal/weight/bold
  proposed_size_token: inherited current action ladder
