date: 2026-03-19
brand: wilmot
source_reference: User-provided exported Wilmot brand sheet image in chat
source_type: image
figma_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Foundations?node-id=1-3
status: active
preview:
  required_before_write: true
  artifact: figma/brands/wilmot/typography/preview.md
  status: written_in_figma

source_roles:
  - source_role: headline
    source_family_name: Museo Slab
    source_style_name: 700
    source_weight_label: Bold
    source_usage_scope: headline
    text_case: uppercase_without_punctuation
    tracking: 10px
    leading: not_specified
    size_rule: not_specified
    punctuation_rule: no_punctuation
    sample_copy: Wilmot
  - source_role: action
    source_family_name: Museo Slab
    source_style_name: 700
    source_weight_label: Bold
    source_usage_scope: cta
    text_case: uppercase_without_punctuation
    tracking: 10px
    leading: not_specified
    size_rule: not_specified
    punctuation_rule: no_punctuation
    sample_copy: Winter at Wilmot
  - source_role: subhead
    source_family_name: Museo Sans
    source_style_name: 700
    source_weight_label: Bold
    source_usage_scope: subhead
    text_case: uppercase_without_punctuation
    tracking: 10px
    leading: not_specified
    size_rule: not_specified
    punctuation_rule: no_punctuation
    sample_copy: Heartland
  - source_role: body
    source_family_name: Museo Sans
    source_style_name: 500
    source_weight_label: Medium
    source_usage_scope: body_copy
    text_case: sentence_case
    tracking: 0px
    leading: not_specified
    size_rule: not_specified
    punctuation_rule: standard
    sample_copy: Fill up on family fun in the heartland of winter
  - source_role: utility
    source_family_name: Prompt
    source_style_name: Bold / Regular
    source_weight_label: Utility
    source_usage_scope: digital_system
    text_case: uppercase_or_sentence_case
    tracking: 10px_or_0px
    leading: source_dependent
    size_rule: source_dependent
    punctuation_rule: source_dependent
    sample_copy: Digital headline or body

primitive_recommendations:
  reuse_existing:
    families: []
    weights:
      - source_weight_label: Bold
        existing_token: universal/weight/bold
        reason: Direct match for Museo Slab 700 and Museo Sans 700.
      - source_weight_label: Medium
        existing_token: universal/weight/medium
        reason: Direct match for Museo Sans 500.
    sizes: []
  proposed_primitives:
    families:
      - token_name: wilmot/family/01
        source_family_name: Museo Slab
        source_style_reference: 700 headline and CTA
        rationale: Display and CTA family.
        fallback_token: universal/family/fallback
        fallback_note: Safe-family behavior remains inherited.
      - token_name: wilmot/family/02
        source_family_name: Museo Sans
        source_style_reference: 700 subhead and 500 body
        rationale: Reading and supporting family.
        fallback_token: universal/family/fallback
        fallback_note: Safe-family behavior remains inherited.
      - token_name: wilmot/family/03
        source_family_name: Prompt
        source_style_reference: digital-only headline, body, and CTA family
        rationale: Preserved as a raw utility family.
        fallback_token: universal/family/fallback
        fallback_note: Safe-family behavior remains inherited.
    weights: []
  hold_for_review: []

semantic_recommendations:
  family_aliases:
    - semantic_token: family/heading
      global_token: wilmot/family/01
      safe_semantic_token: family/heading_safe
      safe_global_token: universal/family/fallback
      intended_channels:
        - web
        - email
        - ads
    - semantic_token: family/body
      global_token: wilmot/family/02
      safe_semantic_token: family/body_safe
      safe_global_token: universal/family/fallback
      intended_channels:
        - web
        - email
        - ads
    - semantic_token: family/action
      global_token: wilmot/family/01
      safe_semantic_token: family/action_safe
      safe_global_token: universal/family/fallback
      intended_channels:
        - web
        - email
        - ads
  weight_aliases:
    - semantic_token: weight/heading/base
      global_token: universal/weight/bold
    - semantic_token: weight/heading/strong
      global_token: universal/weight/bold
    - semantic_token: weight/body/base
      global_token: universal/weight/medium
    - semantic_token: weight/body/strong
      global_token: universal/weight/bold
    - semantic_token: weight/action/base
      global_token: universal/weight/bold
  size_aliases: []

role_recipes:
  - role_name: heading
    source_role: Museo Slab 700
    proposed_family_token: wilmot/family/01
    proposed_weight_token: universal/weight/bold
    proposed_size_token: inherited current heading ladder
  - role_name: body
    source_role: Museo Sans 500
    proposed_family_token: wilmot/family/02
    proposed_weight_token: universal/weight/medium
    proposed_size_token: inherited current body ladder
  - role_name: action
    source_role: Museo Slab 700
    proposed_family_token: wilmot/family/01
    proposed_weight_token: universal/weight/bold
    proposed_size_token: inherited current action ladder

validation:
  extraction_notes:
    - The source uses Museo Slab for headline and CTA work, Museo Sans for subhead and body work, and Prompt only for the digital system.
  governance_notes:
    - 'Prompt is preserved as `wilmot/family/03` and remains raw-only in the first pass.'
    - 'User-corrected naming pass. The governed brand name is `Wilmot`, not `Wilmot Mountain`.'

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Wilmot utility family handling
      channels:
        - web
        - email
        - ads
      rule: Keep Prompt documented as a raw utility family while Museo Slab and Museo Sans carry the live semantic lanes.
      source_basis: Source sheet separates Prompt into explicitly digital-only usage.

open_questions: []
