semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: neutral
        source_family: wilmot/wilmot_grey
        targets:
        - surface/neutral/*
        - surface/neutral/*_inverse
        - foreground/default
        - foreground/default_inverse
        - foreground/subtle
        - foreground/subtle_inverse
        - border/default
        - border/default_inverse
        - border/subtle
        - border/subtle_inverse
      - scope: brand
        source_family: wilmot/wilmot_red
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: wilmot/wilmot_rose
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Wilmot
        targets:
        - assets/logo
      inherited_from_base:
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - Wilmot is live in the Foundations file with `wilmot_grey` as the structural lane, `wilmot_red` as the primary expressive lane, and `wilmot_rose` as the supporting expressive lane.
      - User-corrected naming pass. The live color and typography extension collection names, the semantic logo string, and the raw global namespace were renamed from `Wilmot Mountain` to `Wilmot`.
      - "`assets/logo` resolves to the string `Wilmot` in the semantic theme extension."
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: wilmot/family/01
      - semantic_token: family/body
        alias_of: wilmot/family/02
      - semantic_token: family/action
        alias_of: wilmot/family/01
      - semantic_token: weight/heading/base
        alias_of: universal/weight/bold
      - semantic_token: weight/heading/strong
        alias_of: universal/weight/bold
      - semantic_token: weight/body/base
        alias_of: universal/weight/medium
      - semantic_token: weight/body/strong
        alias_of: universal/weight/bold
      - semantic_token: weight/action/base
        alias_of: universal/weight/bold
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      notes:
      - Wilmot is live as a Museo-led semantic system, with `Museo Slab` on heading and action work, `Museo Sans` on the reading lane, and `Prompt` preserved as the raw utility family for the digital-only source treatments.
notes:
- Wilmot is live in the Foundations file with three raw color families, three raw typography family primitives, a semantic theme logo-name override, and Wilmot semantic theme extension.
