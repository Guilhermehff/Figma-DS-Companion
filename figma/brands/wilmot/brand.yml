semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: neutral
        source_family: wilmot/wilmot_grey
        targets:
          - surface/neutral/*
          - on_surface/neutral/*
          - foreground/default
          - foreground/subtle
          - border/default
          - border/subtle
      - scope: brand
        source_family: wilmot/wilmot_red
        targets:
          - surface/brand/*
          - on_surface/brand/*
          - foreground/brand
          - border/brand
      - scope: brand_secondary
        source_family: wilmot/wilmot_rose
        targets:
          - surface/brand_secondary/*
          - on_surface/brand_secondary/*
          - foreground/brand_secondary
          - border/brand_secondary
      - scope: asset_logo
        source_value: Wilmot
        targets:
          - assets/logo
    inherited_from_base:
      - surface/positive/*
      - on_surface/positive/*
      - surface/warning/*
      - on_surface/warning/*
      - surface/critical/*
      - on_surface/critical/*
      - foreground/positive
      - foreground/warning
      - foreground/critical
      - border/positive
      - border/warning
      - border/critical
    notes:
      - 'Wilmot is live in the Foundations file with `wilmot_grey` as the structural lane, `wilmot_red` as the primary expressive lane, and `wilmot_rose` as the supporting expressive lane.'
      - 'User-corrected naming pass. The live color and typography extension collection names, the semantic logo string, and the raw global namespace were renamed from `Wilmot Mountain` to `Wilmot`.'
      - "`assets/logo` resolves to the string `Wilmot` in the semantic color extension."
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: wilmot/family/display
      - semantic_token: family/body
        alias_of: wilmot/family/primary
      - semantic_token: family/action
        alias_of: wilmot/family/display
      - semantic_token: weight/heading/base
        alias_of: universal/weight/bold
      - semantic_token: weight/heading/strong
        alias_of: universal/weight/bold
      - semantic_token: weight/body/base
        alias_of: universal/weight/medium
      - semantic_token: weight/body/strong
        alias_of: universal/weight/bold
      - semantic_token: weight/action/base
        alias_of: universal/weight/bold
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - size/*
    notes:
      - 'Wilmot is live as a Museo-led semantic system, with `Museo Slab` on heading and action work, `Museo Sans` on the reading lane, and `Prompt` preserved as the raw utility family for the digital-only source treatments.'
notes:
  - Wilmot is live in the Foundations file with three raw color families, three raw typography family primitives, a semantic color logo-name override, and Wilmot semantic color and typography extensions.
