date: 2026-03-19
brand: mt_brighton
source_reference: User-provided exported Mt. Brighton brand sheet image in chat
source_type: image
figma_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Foundations?node-id=1-3
status: active
preview:
  required_before_write: true
  artifact: figma/brands/mt_brighton/typography/preview.md
  status: written_in_figma

source_roles:
  - source_role: headline
    source_family_name: Museo Slab
    source_style_name: 900
    source_weight_label: Black
    source_usage_scope: headline
    text_case: uppercase_without_punctuation
    tracking: 0px
    leading: not_specified
    size_rule: not_specified
    punctuation_rule: no_punctuation
    sample_copy: Mt. Brighton
  - source_role: action
    source_family_name: Museo Slab
    source_style_name: 900
    source_weight_label: Black
    source_usage_scope: cta
    text_case: uppercase_without_punctuation
    tracking: 0px
    leading: not_specified
    size_rule: not_specified
    punctuation_rule: no_punctuation
    sample_copy: Ski or Ride
  - source_role: subhead
    source_family_name: Museo Sans
    source_style_name: 700
    source_weight_label: Bold
    source_usage_scope: subhead
    text_case: uppercase_without_punctuation
    tracking: 0px
    leading: not_specified
    size_rule: not_specified
    punctuation_rule: no_punctuation
    sample_copy: Pass prices go up
  - source_role: utility
    source_family_name: Prompt
    source_style_name: fallback
    source_weight_label: Utility
    source_usage_scope: digital_fallback
    text_case: source_dependent
    tracking: source_dependent
    leading: source_dependent
    size_rule: source_dependent
    punctuation_rule: source_dependent
    sample_copy: Epic Local Pass

primitive_recommendations:
  reuse_existing:
    families: []
    weights:
      - source_weight_label: Black
        existing_token: universal/weight/black
        reason: Direct match for Museo Slab 900.
      - source_weight_label: Bold
        existing_token: universal/weight/bold
        reason: Direct match for Museo Sans 700.
    sizes: []
  proposed_primitives:
    families:
      - token_name: mt_brighton/family/display
        source_family_name: Museo Slab
        source_style_reference: 900 headline and CTA
        rationale: Display and CTA family.
        fallback_token: universal/family/web_safe
        fallback_note: Safe-family behavior remains inherited.
      - token_name: mt_brighton/family/primary
        source_family_name: Museo Sans
        source_style_reference: 700 subhead family
        rationale: Reading and supporting family.
        fallback_token: universal/family/web_safe
        fallback_note: Safe-family behavior remains inherited.
      - token_name: mt_brighton/family/utility
        source_family_name: Prompt
        source_style_reference: digital fallback when Museo fonts are unavailable
        rationale: Preserved as a raw utility family.
        fallback_token: universal/family/web_safe
        fallback_note: Safe-family behavior remains inherited.
    weights: []
  hold_for_review: []

semantic_recommendations:
  family_aliases:
    - semantic_token: family/heading
      global_token: mt_brighton/family/display
      safe_semantic_token: family/heading_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
    - semantic_token: family/body
      global_token: mt_brighton/family/primary
      safe_semantic_token: family/body_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
    - semantic_token: family/action
      global_token: mt_brighton/family/display
      safe_semantic_token: family/action_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
  weight_aliases:
    - semantic_token: weight/heading/base
      global_token: universal/weight/black
    - semantic_token: weight/heading/strong
      global_token: universal/weight/black
    - semantic_token: weight/body/base
      global_token: universal/weight/bold
    - semantic_token: weight/body/strong
      global_token: universal/weight/bold
    - semantic_token: weight/action/base
      global_token: universal/weight/black
  size_aliases: []

role_recipes:
  - role_name: heading
    source_role: Museo Slab 900
    proposed_family_token: mt_brighton/family/display
    proposed_weight_token: universal/weight/black
    proposed_size_token: inherited current heading ladder
  - role_name: body
    source_role: Museo Sans 700
    proposed_family_token: mt_brighton/family/primary
    proposed_weight_token: universal/weight/bold
    proposed_size_token: inherited current body ladder
  - role_name: action
    source_role: Museo Slab 900
    proposed_family_token: mt_brighton/family/display
    proposed_weight_token: universal/weight/black
    proposed_size_token: inherited current action ladder

validation:
  extraction_notes:
    - The source explicitly uses Museo Slab for heading and CTA work, Museo Sans for subhead work, and Prompt only as a digital fallback.
  governance_notes:
    - 'Prompt is preserved as `mt_brighton/family/utility` and remains raw-only in the first pass.'

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Mt. Brighton utility family handling
      channels:
        - web
        - email
        - ads
      rule: Keep Prompt documented as a raw utility family and keep Museo Slab and Museo Sans on the live semantic lanes.
      source_basis: Source sheet only uses Prompt when the Museo families are unavailable.

open_questions: []
