figma:
  design_system_file_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Foundations?node-id=1-3
  global_collections:
    color_id: VariableCollectionId:23:2
    typography_id: VariableCollectionId:23:3
    dimensions_id: VariableCollectionId:23:4
  semantic_extensions:
    theme:
      collection_name: Mt. Brighton
      collection_id: VariableCollectionId:221:1701
      parent_collection: 'Semantic: Theme'
      parent_collection_id: VariableCollectionId:41:135
artifacts:
  color:
    intake_artifact: figma/brands/mt_brighton/color/intake.yml
    preview_artifact: figma/brands/mt_brighton/color/preview.md
    decision_artifacts:
    - figma/decisions/2026-03-31-universal-100-900-color-ramp-normalization.md
  typography:
    intake_artifact: figma/brands/mt_brighton/typography/intake.yml
    preview_artifact: figma/brands/mt_brighton/typography/preview.md
    decision_artifacts:
    - figma/decisions/2026-04-01-safe-typography-lane-migration.md
semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: brand
        source_family: mt_brighton/brighton_purple
        targets:
        - color/surface/brand/*
        - color/surface/brand/*_inverse
        - color/foreground/brand
        - color/foreground/brand_inverse
        - color/border/brand
        - color/border/brand_inverse
      - scope: brand_secondary
        source_family: mt_brighton/brighton_purple_alt
        targets:
        - color/surface/brand_secondary/*
        - color/surface/brand_secondary/*_inverse
        - color/foreground/brand_secondary
        - color/foreground/brand_secondary_inverse
        - color/border/brand_secondary
        - color/border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Mt. Brighton
        targets:
        - variables/assets/logo
      inherited_from_base:
      - color/surface/neutral/*
      - color/surface/neutral/*_inverse
      - color/foreground/default
      - color/foreground/default_inverse
      - color/foreground/subtle
      - color/foreground/subtle_inverse
      - color/border/default
      - color/border/default_inverse
      - color/border/subtle
      - color/border/subtle_inverse
      - color/on_surface/brand/*
      - color/on_surface/brand/*_inverse
      - color/on_surface/brand_secondary/*
      - color/on_surface/brand_secondary/*_inverse
      - color/surface/positive/*
      - color/surface/positive/*_inverse
      - color/on_surface/positive/*
      - color/on_surface/positive/*_inverse
      - color/surface/warning/*
      - color/surface/warning/*_inverse
      - color/on_surface/warning/*
      - color/on_surface/warning/*_inverse
      - color/surface/critical/*
      - color/surface/critical/*_inverse
      - color/on_surface/critical/*
      - color/on_surface/critical/*_inverse
      - color/foreground/positive
      - color/foreground/positive_inverse
      - color/foreground/warning
      - color/foreground/warning_inverse
      - color/foreground/critical
      - color/foreground/critical_inverse
      - color/border/positive
      - color/border/positive_inverse
      - color/border/warning
      - color/border/warning_inverse
      - color/border/critical
      - color/border/critical_inverse
      notes:
      - '`color/on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted.'
      - Mt. Brighton is live in the Foundations file with `brighton_grey` as the structural lane, `brighton_purple` as the primary expressive lane, and `brighton_purple_alt` as the supporting expressive lane.
      - '`variables/assets/logo` resolves to the string `Mt. Brighton` in the semantic theme extension.'
    typography:
      override_scopes:
      - semantic_token: typography/family/heading
        alias_of: mt_brighton/family/01
      - semantic_token: typography/family/body
        alias_of: mt_brighton/family/02
      - semantic_token: typography/family/action
        alias_of: mt_brighton/family/01
      - semantic_token: typography/weight/heading/base
        alias_of: universal/weight/black
      - semantic_token: typography/weight/body/base
        alias_of: universal/weight/bold
      - semantic_token: typography/weight/body/strong
        alias_of: universal/weight/bold
      - semantic_token: typography/family/heading_safe
        alias_of: mt_brighton/family_safe/02
      - semantic_token: typography/family/body_safe
        alias_of: mt_brighton/family_safe/01
      - semantic_token: typography/family/action_safe
        alias_of: mt_brighton/family_safe/02
      inherited_from_base:
      - typography/weight/heading/strong
      - typography/weight/action/base
      notes:
      - Mt. Brighton is live as a Museo-led semantic system, with `Museo Slab` on display and action work, `Museo Sans` on the reading lane, and `Prompt` preserved as the raw utility family for digital safe family contexts.
      - Brand-safe typography aliases now stage on `mt_brighton/family_safe/*` from Vail Resorts Guidelines.pdf.
notes:
- Mt. Brighton is live in the Foundations file with three raw color families, three raw typography family primitives, a semantic theme logo-name override, and Mt. Brighton semantic theme extension.
