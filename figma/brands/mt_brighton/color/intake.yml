        - foreground/default
        - foreground/subtle
        - border/default
        - border/subtle
    - scope: brand
      source_family: mt_brighton/brighton_purple
      targets:
        - surface/brand/*
        - on_surface/brand/*
        - foreground/brand
        - border/brand
    - scope: brand_secondary
      source_family: mt_brighton/brighton_purple_alt
      targets:
        - surface/brand_secondary/*
        - on_surface/brand_secondary/*
        - foreground/brand_secondary
        - border/brand_secondary
  global_only_families: []
  role_exceptions:
    - target: assets/logo
      source_token: Mt. Brighton
      rationale: The semantic color extension stores the governed display label.

live_figma_write:
  semantic_extension_id: VariableCollectionId:221:1701
  raw_color_families:
