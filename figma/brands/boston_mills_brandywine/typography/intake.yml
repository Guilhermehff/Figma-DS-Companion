    proposed_family_token: boston_mills_brandywine/family/01
    proposed_weight_token: universal/weight/black
    proposed_size_token: inherited current action ladder

validation:
  extraction_notes:
    - The PDF explicitly names Interstate Black for H1 and Interstate Medium for body copy.
    - The PDF's Interstate H2 naming remains documentation-only because the current semantic typography model does not expose a dedicated H2 style slot.
  governance_notes:
    - Boston Mills / Brandywine is live as a one-family typography system with Interstate across heading, body, and action work.
    - "Typography size continues to bind directly from published Global: Typography."

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Boston Mills / Brandywine Interstate system
      channels:
        - web
        - email
        - ads
      rule: Keep Interstate on the governed family lanes, map heading and action to black, and keep body on medium while the H2 style remains documentation-only.
      source_basis: Vail Resorts Guidelines - Google Sheets PDF.

