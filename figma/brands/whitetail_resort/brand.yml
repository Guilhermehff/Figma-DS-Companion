artifacts:
  color:
    intake_artifact: figma/brands/whitetail_resort/color/intake.yml
    preview_artifact: figma/brands/whitetail_resort/color/preview.md
    decision_artifacts: []
  typography:
    intake_artifact: figma/brands/whitetail_resort/typography/intake.yml
    preview_artifact: figma/brands/whitetail_resort/typography/preview.md
    decision_artifacts: []
semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: brand
        source_family: whitetail_resort/two_top_green
        targets:
          - surface/brand/*
          - on_surface/brand/*
          - foreground/brand
          - border/brand
      - scope: brand_secondary
        source_family: whitetail_resort/two_top_green
        targets:
          - surface/brand_secondary/*
          - on_surface/brand_secondary/*
          - foreground/brand_secondary
          - border/brand_secondary
      - scope: asset_logo
        source_value: Whitetail Resort
        targets:
          - assets/logo
    inherited_from_base:
      - surface/neutral/*
      - on_surface/neutral/*
      - foreground/default
      - foreground/subtle
      - border/default
      - border/subtle
      - surface/positive/*
      - on_surface/positive/*
      - surface/warning/*
      - on_surface/warning/*
      - surface/critical/*
      - on_surface/critical/*
      - foreground/positive
      - foreground/warning
      - foreground/critical
      - border/positive
      - border/warning
      - border/critical
    notes:
      - Exact black and white remain inherited through the shared neutral role recipes.
      - `two_top_green` drives both expressive semantic lanes because the source provides one non-neutral hue.
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: whitetail_resort/family/primary
      - semantic_token: family/body
        alias_of: whitetail_resort/family/primary
      - semantic_token: family/action
        alias_of: whitetail_resort/family/primary
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/*
      - size/*
    notes:
      - Whitetail Resort adds a governed raw family token with the same string value as `universal/family/primary`.
notes:
  - Whitetail Resort is live in the Foundations file with one raw color family, one mirrored raw typography family primitive, and Whitetail Resort semantic color and typography extensions.
