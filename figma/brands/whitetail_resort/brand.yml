- ads
figma:
  design_system_file_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Foundations?node-id=1-3
  global_collections:
    color_id: VariableCollectionId:23:2
    typography_id: VariableCollectionId:23:3
    dimensions_id: VariableCollectionId:23:4
  semantic_extensions:
    theme:
      collection_name: Whitetail Resort
      collection_id: VariableCollectionId:205:657
      parent_collection: 'Semantic: Theme'
      parent_collection_id: VariableCollectionId:41:135
artifacts:
  color:
    intake_artifact: figma/brands/whitetail_resort/color/intake.yml
    preview_artifact: figma/brands/whitetail_resort/color/preview.md
    decision_artifacts: []
  typography:
    intake_artifact: figma/brands/whitetail_resort/typography/intake.yml
    preview_artifact: figma/brands/whitetail_resort/typography/preview.md
    decision_artifacts: []
semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: brand
        source_family: whitetail_resort/two_top_green
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: whitetail_resort/two_top_green
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Whitetail Resort
        targets:
        - assets/logo
      inherited_from_base:
      - surface/neutral/*
      - surface/neutral/*_inverse
      - foreground/default
      - foreground/default_inverse
      - foreground/subtle
      - foreground/subtle_inverse
      - border/default
      - border/default_inverse
      - border/subtle
      - border/subtle_inverse
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - Exact black and white remain inherited through the shared neutral role recipes.
      - "`two_top_green` drives both expressive semantic lanes because the source provides one non-neutral hue."
    typography:
      override_scopes: []
      inherited_from_base:
      - family/*
      - weight/*
      notes:
      - No brand-specific typography guidance is established for Whitetail Resort, so the semantic theme extension inherits the shared universal typography base without overrides.
      - Typography size continues to bind directly from published `Global: Typography`.
notes:
- Whitetail Resort is live in the Foundations file with two raw color families (`two_top_green` plus a raw-only `neutral` support ramp), no brand-specific raw typography families, and Whitetail Resort semantic theme extension.
