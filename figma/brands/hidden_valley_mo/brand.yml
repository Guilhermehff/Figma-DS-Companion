semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: brand
        source_family: hidden_valley_mo/hv_blue
        targets:
          - surface/brand/*
          - on_surface/brand/*
          - foreground/brand
          - border/brand
      - scope: brand_secondary
        source_family: hidden_valley_mo/tagline_grey
        targets:
          - surface/brand_secondary/*
          - on_surface/brand_secondary/*
          - foreground/brand_secondary
          - border/brand_secondary
      - scope: asset_logo
        source_value: Hidden Valley MO
        targets:
          - assets/logo
    inherited_from_base:
      - surface/neutral/*
      - on_surface/neutral/*
      - foreground/default
      - foreground/subtle
      - border/default
      - border/subtle
      - surface/positive/*
      - on_surface/positive/*
      - surface/warning/*
      - on_surface/warning/*
      - surface/critical/*
      - on_surface/critical/*
      - foreground/positive
      - foreground/warning
      - foreground/critical
      - border/positive
      - border/warning
      - border/critical
    notes:
      - Exact black and white remain inherited through the shared neutral role recipes because the supplied logo variants match `universal/black` and `universal/white`.
      - "`hv_blue` drives the primary expressive semantic lane, while `tagline_grey` drives the secondary expressive lane."
      - "`assets/logo` is overridden to the string `Hidden Valley MO` in the semantic color extension."
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: hidden_valley_mo/family/primary
      - semantic_token: family/body
        alias_of: hidden_valley_mo/family/primary
      - semantic_token: family/action
        alias_of: hidden_valley_mo/family/primary
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/*
      - size/*
    notes:
      - Hidden Valley MO adds a governed raw family token, `hidden_valley_mo/family/primary`, with the same string value as `universal/family/primary`.
      - The source does not define a brand-specific typography system, and the user explicitly instructed the brand to use the universal baseline.
      - Weight, safe-family, and size semantics remain inherited from the live base collection because the requested values are unchanged from universal.
notes:
  - Hidden Valley MO is live in the Foundations file with two raw color families, one mirrored raw typography family primitive, a semantic color logo-name override, and Hidden Valley MO semantic color and typography extensions.
