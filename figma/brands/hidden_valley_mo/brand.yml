figma:
  design_system_file_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Foundations?node-id=1-3
  global_collections:
    color_id: VariableCollectionId:23:2
    typography_id: VariableCollectionId:23:3
    dimensions_id: VariableCollectionId:23:4
  semantic_extensions:
    theme:
      collection_name: Hidden Valley MO
      collection_id: VariableCollectionId:203:381
      parent_collection: 'Semantic: Theme'
      parent_collection_id: VariableCollectionId:41:135
artifacts:
  color:
    intake_artifact: figma/brands/hidden_valley_mo/color/intake.yml
    preview_artifact: figma/brands/hidden_valley_mo/color/preview.md
    decision_artifacts: []
  typography:
    intake_artifact: figma/brands/hidden_valley_mo/typography/intake.yml
    preview_artifact: figma/brands/hidden_valley_mo/typography/preview.md
    decision_artifacts: []
semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: brand
        source_family: hidden_valley_mo/hv_blue
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: hidden_valley_mo/tagline_grey
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Hidden Valley MO
        targets:
        - assets/logo
      inherited_from_base:
      - surface/neutral/*
      - surface/neutral/*_inverse
      - foreground/default
      - foreground/default_inverse
      - foreground/subtle
      - foreground/subtle_inverse
      - border/default
      - border/default_inverse
      - border/subtle
      - border/subtle_inverse
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - Exact black and white remain inherited through the shared neutral role recipes because the supplied logo variants match `universal/black` and `universal/white`.
      - "`hv_blue` drives the primary expressive semantic lane, while `tagline_grey` drives the secondary expressive lane."
      - "`assets/logo` is overridden to the string `Hidden Valley MO` in the semantic theme extension."
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: hidden_valley_mo/family/01
      - semantic_token: family/body
        alias_of: hidden_valley_mo/family/02
      - semantic_token: family/action
        alias_of: hidden_valley_mo/family/01
      - semantic_token: weight/heading/base
        alias_of: universal/weight/normal
      - semantic_token: weight/heading/strong
        alias_of: universal/weight/normal
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: weight/body/strong
        alias_of: universal/weight/normal
      - semantic_token: weight/action/base
        alias_of: universal/weight/normal
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      notes:
      - Hidden Valley MO is live as a two-family typography system, with `Altero` on heading and action work and `Prompt` on the reading lane.
      - The PDF's `Altero Outline` subheadline remains documentation-only because the current semantic typography model has no dedicated outline or style slot.
      - "Typography size continues to bind directly from published `Global: Typography`."
notes:
- Hidden Valley MO is live in the Foundations file with two raw color families, two raw typography family primitives, a semantic theme logo-name override, and Hidden Valley MO semantic theme extension.
