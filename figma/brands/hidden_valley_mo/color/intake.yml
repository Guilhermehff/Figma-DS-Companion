universal_reuse:
  reuse_universal:
    - source_name: Black
      provided_value: "#000000"
      existing_token: universal/black
      rationale: Exact match to the shared universal black primitive, so no duplicate Hidden Valley MO black token should be created.
    - source_name: White
      provided_value: "#ffffff"
      existing_token: universal/white
      rationale: Exact match to the shared universal white primitive, so no duplicate Hidden Valley MO white token should be created.
  new_brand_families:
    - family: hv_blue
      source_name: HV Blue
      provided_value: "#0e9fb4"
      rationale: Signature Hidden Valley MO blue that should anchor the primary expressive lane.
      anchor_step: 500
      anchor_label: 500_source
    - family: tagline_grey
      source_name: Tagline Grey
      provided_value: "#51544a"
      rationale: Dark supporting brand color that should drive the secondary expressive lane without collapsing into exact shared black.
      anchor_step: 800
      anchor_label: 800_source
  hold_for_review: []

