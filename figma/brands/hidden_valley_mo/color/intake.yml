validation:
  perceptual_consistency_notes:
    - Exact black and white remain shared through the universal neutral primitives, so Hidden Valley MO only adds the two branded expressive families supplied by the source.
    - "`hv_blue` preserves the supplied source value as the mid expressive step and darkens enough to support accessible branded surfaces."
    - "`tagline_grey` preserves the source value as the readable secondary default step while remaining distinct from exact black."
  contrast_checks:
    - token: hidden_valley_mo/hv_blue/700
      foreground: white
      ratio: "6.29:1"
      result: pass
    - token: hidden_valley_mo/hv_blue/800
      foreground: white
      ratio: "8.85:1"
      result: pass
    - token: hidden_valley_mo/hv_blue/900
      foreground: white
      ratio: "12.08:1"
      result: pass
    - token: hidden_valley_mo/tagline_grey/800
      foreground: white
      ratio: "7.73:1"
      result: pass
    - token: hidden_valley_mo/tagline_grey/900
      foreground: white
      ratio: "10.52:1"
      result: pass
    - token: hidden_valley_mo/hv_blue/100
      foreground: black
      ratio: "18.08:1"
      result: pass
    - token: hidden_valley_mo/tagline_grey/100
      foreground: black
      ratio: "17.86:1"
      result: pass

semantic_recommendations:
  role_sets:
    - scope: neutral
      source_family: inherited_base
      rationale: Exact black and white are already governed by the shared universal primitives, so the first pass keeps the neutral role set inherited.
      targets:
        - surface/neutral/*
        - on_surface/neutral/*
        - foreground/default
        - foreground/subtle
        - border/default
        - border/subtle
    - scope: brand
      source_family: hidden_valley_mo/hv_blue
      rationale: HV Blue is the signature Hidden Valley MO color and should drive the primary expressive semantic lane.
      targets:
        - surface/brand/*
        - on_surface/brand/*
        - foreground/brand
        - border/brand
    - scope: brand_secondary
      source_family: hidden_valley_mo/tagline_grey
      rationale: Tagline Grey is the dark supporting brand color and should drive the secondary expressive lane.
      targets:
        - surface/brand_secondary/*
        - on_surface/brand_secondary/*
        - foreground/brand_secondary
        - border/brand_secondary
  global_only_families: []
  role_exceptions:
    - target: assets/logo
      source_token: Hidden Valley MO
      rationale: The live semantic color schema stores the governed brand display label in `assets/logo`.

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Hidden Valley MO expressive lane order
      channels:
        - web
        - email
        - ads
      rule: Use `hv_blue` as the primary expressive lane and `tagline_grey` as the secondary expressive lane.
      source_basis: Source image names the supplied branded colors and distinguishes them from exact black and white logo variants.
    - subject: Hidden Valley MO neutral reuse
      channels:
        - web
        - email
        - ads
      rule: Reuse `universal/black` and `universal/white` rather than duplicating exact neutral primitives.
      source_basis: Source image provides black and white logo variants that match the shared universal tokens.

open_questions: []
