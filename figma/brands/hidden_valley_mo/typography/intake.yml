primitive_recommendations:
  reuse_existing:
    families: []
    weights:
    - source_weight_label: Regular
      existing_token: universal/weight/normal
      reason: Direct match for Altero Regular and Prompt Regular.
    sizes:
    - source_size_reference: inherited
      existing_token: universal/size/*
      assumption_status: deferred_no_new_size
      assumption_note: The PDF names families and styles but does not govern numeric sizes.
      reason: 'Typography size continues to publish from the shared Global: Typography ladder.'
  proposed_primitives:
    families:
    - token_name: hidden_valley_mo/family/01
      source_family_name: Altero
      source_style_reference: headline family
      rationale: Display and action family.
      safe_family_token: hidden_valley_mo/family_safe/01
      safe_family_note: Approved safe-family companion from Vail Resorts Guidelines.pdf.
    - token_name: hidden_valley_mo/family/02
      source_family_name: Prompt
      source_style_reference: body family
      rationale: Reading family.
      safe_family_token: hidden_valley_mo/family_safe/02
      safe_family_note: Approved safe-family companion from Vail Resorts Guidelines.pdf.
    weights: []
    safe_families:
    - token_name: hidden_valley_mo/family_safe/01
      source_family_name: Prompt
      source_role_reference: eyebrow, headline, cta
      rationale: Approved web safe family from Vail Resorts Guidelines.pdf for the eyebrow, headline,
        cta lane.
    - token_name: hidden_valley_mo/family_safe/02
      source_family_name: Open Sans
      source_role_reference: body
      rationale: Approved web safe family from Vail Resorts Guidelines.pdf for the body lane.
  hold_for_review:
  - source_item: Altero Outline
    reason: The current semantic typography model has no dedicated outline or style slot, so the treatment
      remains documentation-only.
