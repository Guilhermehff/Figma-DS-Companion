validation:
  extraction_notes:
  - The PDF explicitly names Altero for headline, Altero Outline for subheadline, and Prompt Regular for
    body copy.
  - Altero Outline remains documentation-only because the current semantic typography model does not expose
    a dedicated outline slot.
  governance_notes:
  - Hidden Valley MO is live as a two-family typography system with Altero on heading and action work
    and Prompt on the reading lane.
  - 'Typography size continues to bind directly from published Global: Typography.'
  - Brand-safe typography aliases now stage on `hidden_valley_mo/family_safe/*` from Vail Resorts Guidelines.pdf.
