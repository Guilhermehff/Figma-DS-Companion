semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: neutral
        source_family: inherited_base
        targets:
          - surface/neutral/*
          - on_surface/neutral/*
          - foreground/default
          - foreground/subtle
          - border/default
          - border/subtle
      - scope: brand
        source_family: alpine_valley/alpine
        targets:
          - surface/brand/*
          - on_surface/brand/*
          - foreground/brand
          - border/brand
      - scope: brand_secondary
        source_family: alpine_valley/alpine
        targets:
          - surface/brand_secondary/*
          - on_surface/brand_secondary/*
          - foreground/brand_secondary
          - border/brand_secondary
      - scope: asset_logo
        source_value: Alpine Valley
        targets:
          - assets/logo
    inherited_from_base:
      - surface/positive/*
      - on_surface/positive/*
      - surface/warning/*
      - on_surface/warning/*
      - surface/critical/*
      - on_surface/critical/*
      - foreground/positive
      - foreground/warning
      - foreground/critical
      - border/positive
      - border/warning
      - border/critical
    notes:
      - Exact `Valley Black` remains shared through `universal/black` rather than becoming a duplicate Alpine Valley raw family.
      - The supplied palette has one expressive non-neutral family, so `alpine` drives both expressive semantic lanes in the current live schema.
      - "`assets/logo` is overridden to the string `Alpine Valley` in the semantic color extension."
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: alpine_valley/family/primary
      - semantic_token: family/body
        alias_of: alpine_valley/family/primary
      - semantic_token: family/action
        alias_of: alpine_valley/family/primary
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: weight/body/strong
        alias_of: universal/weight/bold
      - semantic_token: weight/action/base
        alias_of: universal/weight/bold
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/heading/base
      - weight/heading/strong
      - size/*
    notes:
      - Alpine Valley stages on one raw family, `Prompt`, across heading, body, and CTA work.
      - The source explicitly defines H1, H2, and body treatments; CTA on Prompt Bold is a user-approved live extension of that same-family system.
      - Live size semantics remain inherited because the supplied hierarchy defines role intent but not governed numeric size tokens.
notes:
  - Alpine Valley is live in the Foundations file with one raw color family, one raw typography family primitive, a semantic color logo-name override, and Alpine Valley semantic color and typography extensions.
