    decision_artifacts:
    - figma/decisions/2026-03-18-alpine-valley-foundations-written-to-figma.md
semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: neutral
        source_family: inherited_base
        targets:
        - surface/neutral/*
        - surface/neutral/*_inverse
        - foreground/default
        - foreground/default_inverse
        - foreground/subtle
        - foreground/subtle_inverse
        - border/default
        - border/default_inverse
        - border/subtle
        - border/subtle_inverse
      - scope: brand
        source_family: alpine_valley/alpine
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: alpine_valley/alpine
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Alpine Valley
        targets:
        - assets/logo
      inherited_from_base:
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - Exact `Valley Black` remains shared through `universal/black` rather than becoming a duplicate Alpine Valley raw family.
      - The supplied palette has one expressive non-neutral family, so `alpine` drives both expressive semantic lanes in the current live schema.
      - "`assets/logo` is overridden to the string `Alpine Valley` in the semantic theme extension."
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: alpine_valley/family/01
      - semantic_token: family/body
        alias_of: alpine_valley/family/01
      - semantic_token: family/action
        alias_of: alpine_valley/family/01
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: weight/body/strong
        alias_of: universal/weight/bold
      - semantic_token: weight/action/base
        alias_of: universal/weight/bold
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/heading/base
      - weight/heading/strong
      notes:
      - Alpine Valley stages on one raw family, `Prompt`, across heading, body, and CTA work.
      - The source explicitly defines H1, H2, and body treatments; CTA on Prompt Bold is a user-approved live extension of that same-family system.
      - 'Typography size now binds directly from published `Global: Typography`; the supplied hierarchy defines role intent but not new governed numeric size tokens.'
notes:
- Alpine Valley is live in the Foundations file with one raw color family, one raw typography family primitive, a semantic theme logo-name override, and Alpine Valley semantic theme extension.
