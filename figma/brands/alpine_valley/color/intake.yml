  new_brand_families:
    - family: alpine
      source_name: Alpine
      provided_value: "#b0c6ce"
      rationale: The only non-neutral supplied Alpine Valley hue and the clearest candidate for a governed expressive brand family.
      anchor_step: 300
      anchor_label: 300_source
