validation:
  perceptual_consistency_notes:
    - Alpine lands at `300` because the supplied swatch sits in the bright, pale blue lightness band.
    - Exact black should remain shared through `universal/black` rather than duplicated under the Alpine Valley group.
    - The generated `alpine` ladder darkens into a blue-gray family that can support readable dark expressive surfaces while keeping the source swatch intact as the light anchor.
  contrast_checks:
    - token: alpine_valley/alpine/100
      foreground: black
      ratio: "18.44:1"
      result: pass
    - token: alpine_valley/alpine/200
      foreground: black
      ratio: "16.11:1"
      result: pass
    - token: alpine_valley/alpine/800
      foreground: white
      ratio: "10.21:1"
      result: pass
    - token: alpine_valley/alpine/900
      foreground: white
      ratio: "14.54:1"
      result: pass
    - token: alpine_valley/alpine/950
      foreground: white
      ratio: "18.02:1"
      result: pass

semantic_recommendations:
  role_sets:
    - scope: neutral
      source_family: inherited_base
      rationale: Exact black is reused as the universal primitive and no Alpine Valley light neutral or white swatch was supplied, so the shared neutral role set remains inherited in the first pass.
      targets:
        - surface/neutral/*
        - on_surface/neutral/*
        - foreground/default
        - foreground/subtle
        - border/default
        - border/subtle
    - scope: brand
      source_family: alpine_valley/alpine
      rationale: Recommended first pass. `alpine/*` is the only non-neutral supplied family, so it is the most stable expressive lane under the current semantic model.
      targets:
        - surface/brand/*
        - on_surface/brand/*
        - foreground/brand
        - border/brand
    - scope: brand_secondary
      source_family: alpine_valley/alpine
      rationale: Recommended first pass. The source does not provide a second expressive hue, so the accepted semantic color model allows `brand_secondary/*` to reuse the same raw family as `brand/*`.
      targets:
        - surface/brand_secondary/*
        - on_surface/brand_secondary/*
        - foreground/brand_secondary
        - border/brand_secondary
  global_only_families: []
  role_exceptions:
    - target: assets/logo
      source_token: Alpine Valley
      rationale: "The live `Semantic: Theme` schema includes `assets/logo`, and each brand extension overrides it to the brand display name string."

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Alpine Valley exact black reuse
      channels:
        - web
        - email
        - ads
      rule: Reuse `universal/black` for Valley Black rather than creating a duplicate raw token.
      source_basis: Source image explicitly provides exact black as #000000.
    - subject: Alpine Valley expressive semantic promotion
      channels:
        - web
        - email
        - ads
      rule: Recommended first pass promotes `alpine/*` into both expressive semantic lanes because it is the only non-neutral supplied family.
      source_basis: Source image provides exact black plus one supporting Alpine color.

open_questions:
