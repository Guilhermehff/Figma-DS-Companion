date: 2026-03-19
brand: attitash
source_reference: User-provided exported Attitash brand sheet image in chat
source_type: image
figma_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Foundations?node-id=1-3
status: active
preview:
  required_before_write: true
  artifact: figma/brands/attitash/typography/preview.md
  status: written_in_figma

source_roles:
  - source_role: headline
    source_family_name: Buenos Aires
    source_style_name: Bold
    source_weight_label: Bold
    source_usage_scope: headline
    text_case: title_case_without_punctuation
    tracking: 5px
    leading: not_specified
    size_rule: not_specified
    punctuation_rule: no_punctuation
    sample_copy: Heart of the White Mountains
  - source_role: body
    source_family_name: Buenos Aires
    source_style_name: Light
    source_weight_label: Light
    source_usage_scope: body_copy
    text_case: sentence_case
    tracking: 5px
    leading: not_specified
    size_rule: not_specified
    punctuation_rule: standard
    sample_copy: Classic New England
  - source_role: action
    source_family_name: Buenos Aires
    source_style_name: Bold
    source_weight_label: Bold
    source_usage_scope: cta
    text_case: uppercase_without_punctuation
    tracking: 5px
    leading: not_specified
    size_rule: not_specified
    punctuation_rule: no_punctuation
    sample_copy: Summit Triple
  - source_role: subhead
    source_family_name: Coordinates
    source_style_name: Medium
    source_weight_label: Medium
    source_usage_scope: subhead
    text_case: uppercase_without_punctuation
    tracking: 100px
    leading: not_specified
    size_rule: not_specified
    punctuation_rule: no_punctuation
    sample_copy: Example

primitive_recommendations:
  reuse_existing:
    families: []
    weights:
      - source_weight_label: Bold
        existing_token: universal/weight/bold
        reason: Direct match for Buenos Aires Bold.
      - source_weight_label: Light
        existing_token: universal/weight/light
        reason: Direct match for Buenos Aires Light.
      - source_weight_label: Medium
        existing_token: universal/weight/medium
        reason: Direct match for Coordinates Medium.
    sizes: []
  proposed_primitives:
    families:
      - token_name: attitash/family/primary
        source_family_name: Buenos Aires
        source_style_reference: Bold and Light across heading, body, and CTA
        rationale: Buenos Aires carries the live semantic hierarchy.
        fallback_token: universal/family/web_safe
        fallback_note: Safe-family behavior remains inherited.
      - token_name: attitash/family/alternate
        source_family_name: Coordinates
        source_style_reference: Medium subhead treatment
        rationale: Coordinates is preserved as a raw alternate family.
        fallback_token: universal/family/web_safe
        fallback_note: Safe-family behavior remains inherited.
    weights: []
  hold_for_review: []

semantic_recommendations:
  family_aliases:
    - semantic_token: family/heading
      global_token: attitash/family/primary
      safe_semantic_token: family/heading_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
    - semantic_token: family/body
      global_token: attitash/family/primary
      safe_semantic_token: family/body_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
    - semantic_token: family/action
      global_token: attitash/family/primary
      safe_semantic_token: family/action_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
  weight_aliases:
    - semantic_token: weight/heading/base
      global_token: universal/weight/bold
    - semantic_token: weight/heading/strong
      global_token: universal/weight/bold
    - semantic_token: weight/body/base
      global_token: universal/weight/light
    - semantic_token: weight/body/strong
      global_token: universal/weight/medium
    - semantic_token: weight/action/base
      global_token: universal/weight/bold
  size_aliases: []

role_recipes:
  - role_name: headline
    source_role: Buenos Aires Bold
    proposed_family_token: attitash/family/primary
    proposed_weight_token: universal/weight/bold
    proposed_size_token: inherited current heading ladder
  - role_name: body
    source_role: Buenos Aires Light
    proposed_family_token: attitash/family/primary
    proposed_weight_token: universal/weight/light
    proposed_size_token: inherited current body ladder
  - role_name: action
    source_role: Buenos Aires Bold
    proposed_family_token: attitash/family/primary
    proposed_weight_token: universal/weight/bold
    proposed_size_token: inherited current action ladder
  - role_name: subhead
    source_role: Coordinates Medium
    proposed_family_token: attitash/family/alternate
    proposed_weight_token: universal/weight/medium
    proposed_size_token: raw_only

validation:
  extraction_notes:
    - The source defines Buenos Aires for headline, body, and CTA work and uses Coordinates only for subhead treatment.
  governance_notes:
    - The current shared semantic typography model has no dedicated alternate subhead family lane, so Coordinates remains raw-only in the first pass.

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Attitash alternate subhead family
      channels:
        - web
        - email
        - ads
      rule: Keep Coordinates documented as a raw alternate family until the shared semantic schema grows a dedicated slot.
      source_basis: Source image isolates Coordinates to subhead usage.

open_questions: []
