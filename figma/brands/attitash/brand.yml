- email
- ads
figma:
  design_system_file_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Foundations?node-id=1-3
  global_collections:
    color_id: VariableCollectionId:23:2
    typography_id: VariableCollectionId:23:3
    dimensions_id: VariableCollectionId:23:4
  semantic_extensions:
    theme:
      collection_name: Attitash
      collection_id: VariableCollectionId:221:1437
      parent_collection: 'Semantic: Theme'
      parent_collection_id: VariableCollectionId:41:135
artifacts:
  color:
    intake_artifact: figma/brands/attitash/color/intake.yml
    preview_artifact: figma/brands/attitash/color/preview.md
    decision_artifacts:
    - figma/decisions/2026-03-31-attitash-neutral-consolidation.md
    - figma/decisions/2026-03-31-universal-100-900-color-ramp-normalization.md
  typography:
    intake_artifact: figma/brands/attitash/typography/intake.yml
    preview_artifact: figma/brands/attitash/typography/preview.md
    decision_artifacts: []
semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: neutral
        source_family: attitash/attitash_neutral
        targets:
        - surface/neutral/*
        - surface/neutral/*_inverse
        - foreground/default
        - foreground/default_inverse
        - foreground/subtle
        - foreground/subtle_inverse
        - border/default
        - border/default_inverse
        - border/subtle
        - border/subtle_inverse
      - scope: brand
        source_family: attitash/attitash_blue
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: attitash/daybreak
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Attitash
        targets:
        - assets/logo
      inherited_from_base:
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - Attitash is live in the Foundations file with `attitash_neutral` as the structural lane, `attitash_blue` as the primary expressive lane, and `daybreak` as the supporting expressive lane.
      - "`attitash_neutral` preserves the `Mogul Shadow 20%`, `Mogul Shadow`, and `Sharp Edge Grey` source anchors directly."
      - The duplicate raw-only grey ramps were removed because they introduced no additional governed values beyond `attitash_neutral`.
      - "`assets/logo` resolves to the string `Attitash` in the semantic theme extension."
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: attitash/family/01
      - semantic_token: family/body
        alias_of: attitash/family/01
      - semantic_token: family/action
        alias_of: attitash/family/01
      - semantic_token: weight/heading/base
        alias_of: universal/weight/bold
      - semantic_token: weight/heading/strong
        alias_of: universal/weight/bold
      - semantic_token: weight/body/base
        alias_of: universal/weight/light
      - semantic_token: weight/body/strong
        alias_of: universal/weight/medium
      - semantic_token: weight/action/base
        alias_of: universal/weight/bold
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      notes:
      - Attitash is live as a Buenos Aires-led semantic system, with `Coordinates` preserved as the raw alternate family for subhead-style work that does not yet have its own semantic lane.
      - The first semantic pass keeps heading, body, and action on `attitash/family/01` because the current shared typography schema has no dedicated alternate subhead family slot.
notes:
- Attitash is live in the Foundations file with three raw color families, two raw typography family primitives, a semantic theme logo-name override, and Attitash semantic theme extension.
