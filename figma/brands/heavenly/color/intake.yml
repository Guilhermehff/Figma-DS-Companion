universal_reuse:
  reuse_universal:
    - source_name: Fresh Powder White
      existing_token: universal/white
      reason: Exact match to the existing universal white primitive.
    - source_name: Mountain Shadow Black
      existing_token: universal/black
      reason: Exact match to the existing universal black primitive.
  new_brand_families:
    - family: snow_flower_red
      source_name: Snow Flower Red
      provided_value: "#cb1f30"
      rationale: The red swatch is the strongest brand-signature accent in both the palette image and the supplied typography examples.
      anchor_step: 600
      anchor_label: 600_source
    - family: deep_water_blue
      source_name: Deep Water Blue
      provided_value: "#1e5eb9"
      rationale: The darker blue is a distinct brand support ladder that can carry secondary emphasis without colliding with shared feedback blues.
      anchor_step: 700
      anchor_label: 700_source
    - family: shore_blue
      source_name: Shore Blue
      provided_value: "#54c3f2"
      rationale: The lighter cyan-blue is materially distinct from the darker blue and reads as a tertiary accent family rather than a neutral.
      anchor_step: 300
      anchor_label: 300_source
  hold_for_review: []

