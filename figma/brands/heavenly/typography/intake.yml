validation:
  extraction_notes:
    - The source is explicit about family, weight labels, case, tracking, and role boundaries, but it does not provide numeric font sizes.
    - Heavenly uses a split-family system: Din Condensed for display work and Brandon Grotesque for supportive and body copy.
    - The source explicitly says titles and headlines keep tracking at 0 while CTAs move to tracking 50.
  governance_notes:
    - `universal/weight/light` is staged as a proposed shared raw weight because Heavenly's headline system depends on a Light weight that is materially different from Normal.
    - CTA family and size remain open rather than guessed because the supplied image does not name them.
    - The digital note about URW Din Condensed Regular is preserved as guidance, not yet as a semantic override, until channel delivery rules are explicitly approved.

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Heavenly display typography
      channels:
        - web
        - email
        - ads
      rule: Keep titles and headlines on Din Condensed in all caps with 0 tracking, using Light for default headlines and Bold for titles or explicitly emphasized display lines.
      source_basis: Heavenly typography guidance image.
    - subject: Heavenly support and body copy
      channels:
        - web
        - email
        - ads
      rule: Keep subheads on Brandon Grotesque Medium in all caps and body copy on Brandon Grotesque Regular in sentence case.
      source_basis: Heavenly typography-in-use image.
    - subject: Heavenly CTA tracking
      channels:
        - web
        - email
        - ads
      rule: Preserve CTA tracking of 50 once the CTA family and size are explicitly approved.
      source_basis: Heavenly typography note stating that CTA's have a tracking of 50.

open_questions: []
