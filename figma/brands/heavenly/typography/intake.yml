date: 2026-03-11
brand: heavenly
source_reference: User-provided image in chat showing the Heavenly typography guidance
source_type: image
figma_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Design-System?node-id=1-3&t=jagoUKe5gyKCbAbG-1
status: active
preview:
  required_before_write: true
  artifact: figma/brands/heavenly/typography/preview.md
  status: written_in_figma

source_roles:
  - source_role: title
    source_family_name: Din Condensed
    source_style_name: Din Condensed Bold
    source_weight_label: Bold
    source_usage_scope: section_title_or_emphasized_copy
    text_case: all_caps
    tracking: 0
    leading: not specified in source
    size_rule: title size not numerically specified
    punctuation_rule: not specified in source
    sample_copy: SKI HEAVENLY
    notes: Use Din Condensed Bold in all caps for titles and specific emphasized copy lines such as manifestos or headlines that are hard to read.
  - source_role: headline
    source_family_name: Din Condensed
    source_style_name: Din Condensed Light
    source_weight_label: Light
    source_usage_scope: primary_display_headline
    text_case: all_caps
    tracking: 0
    leading: not specified in source
    size_rule: headline size not numerically specified
    punctuation_rule: punctuation only when paired with the campaign logo lockup
    sample_copy: IT'S A MOUNTAIN, AND A BEACH
    notes: Headlines should use Din Condensed Light in all caps except for specific instances where bold is needed, such as manifestos or social headlines.
  - source_role: subhead
    source_family_name: Brandon Grotesque
    source_style_name: Brandon Grotesque Medium
    source_weight_label: Medium
    source_usage_scope: supporting_headline_copy
    text_case: all_caps
    tracking: 0
    leading: not specified in source
    size_rule: subhead size not numerically specified
    punctuation_rule: not specified in source
    sample_copy: YOUR PHONE WON'T DO IT JUSTICE
    notes: Subheads should use Brandon Grotesque Medium in all caps.
  - source_role: body
    source_family_name: Brandon Grotesque
    source_style_name: Brandon Grotesque Regular
    source_weight_label: Regular
    source_usage_scope: reading_copy
    text_case: sentence_case
    tracking: 0
    leading: not specified in source
    size_rule: body size not numerically specified
    punctuation_rule: sentence punctuation allowed
    sample_copy: Nam velliqui beatur alit la volorpo rionsedi consecus ent quam sumquiam, occatur?
    notes: Body copy should use Brandon Grotesque Regular in sentence case.

primitive_recommendations:
  reuse_existing:
    families: []
    weights:
      - source_weight_label: Bold
        existing_token: universal/weight/bold
        reason: The source explicitly names Din Condensed Bold for titles and emphasized copy.
      - source_weight_label: Medium
        existing_token: universal/weight/medium
        reason: The source explicitly names Brandon Grotesque Medium for subheads.
      - source_weight_label: Regular
        existing_token: universal/weight/normal
        reason: The source explicitly names Brandon Grotesque Regular for body copy.
    sizes:
      - source_size_reference: title default
        existing_token: universal/size/400
        assumption_status: assumed
        assumption_note: The source image shows a compact uppercase title line that sits below the main display headline in hierarchy.
        reason: Keeps the title role inside the shared size ladder without inventing a new raw size.
      - source_size_reference: headline default
        existing_token: universal/size/800
        assumption_status: assumed
        assumption_note: The source image shows a dominant display headline but does not provide a numeric size.
        reason: Uses the largest current shared heading size for the first staged pass.
      - source_size_reference: subhead default
        existing_token: universal/size/500
        assumption_status: assumed
        assumption_note: The source image shows a prominent supporting line clearly smaller than the main headline.
        reason: Keeps the subhead on the governed size ladder while preserving the hierarchy.
      - source_size_reference: body default
        existing_token: universal/size/300
        assumption_status: assumed
        assumption_note: The source provides no numeric body size, so body defaults to the current shared reading size.
        reason: Keeps body on the shared raw ladder until a later comp or guide specifies a numeric size.
  proposed_primitives:
    families:
      - token_name: heavenly/family/primary
        source_family_name: Din Condensed
        source_style_reference: Din Condensed Bold and Din Condensed Light across title and headline roles
        rationale: A single condensed display family drives Heavenly titles and headlines, with weight carrying the distinction.
        fallback_token: universal/family/web_safe
        fallback_note: The source names the family but does not provide a governed fallback stack.
      - token_name: heavenly/family/secondary
        source_family_name: Brandon Grotesque
        source_style_reference: Brandon Grotesque Medium and Brandon Grotesque Regular across subhead and body roles
        rationale: A separate text family supports subhead and body copy.
        fallback_token: universal/family/web_safe
        fallback_note: The source names the family but does not provide a governed fallback stack.
    weights:
      - token_name: universal/weight/light
        source_weight_label: Light
        proposed_value: "300"
        rationale: Heavenly introduces a repeated Light label for display headlines, and approximating it to Normal would collapse an intentional contrast in the source system.
  hold_for_review:
    - item: action typography family
      reason: The source specifies CTA tracking of 50 but does not explicitly name the CTA family, size, or weight.
    - item: digital fallback for Din Condensed
      reason: The source notes that URW Din Condensed Regular may be used digitally to avoid additional fees, but the supplied image does not define whether that exception should affect semantic family mapping.

semantic_recommendations:
  family_aliases:
    - semantic_token: family/heading
      global_token: heavenly/family/primary
      safe_semantic_token: family/heading_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
      notes: Heavenly titles and headlines share the Din Condensed family in brand-capable channels, with the safe alias reserved for constrained delivery.
    - semantic_token: family/body
      global_token: heavenly/family/secondary
      safe_semantic_token: family/body_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
      notes: Brandon Grotesque supports both the supportive uppercase subhead role and the reading-copy body role.
  weight_aliases:
    - semantic_token: weight/heading/base
      global_token: universal/weight/light
      intended_channels:
        - web
        - email
        - ads
      notes: The default Heavenly headline treatment uses Din Condensed Light.
    - semantic_token: weight/heading/strong
      global_token: universal/weight/bold
      intended_channels:
        - web
        - email
        - ads
      notes: Title lines and emphasized copy use Din Condensed Bold.
    - semantic_token: weight/body/base
      global_token: universal/weight/normal
      intended_channels:
        - web
        - email
        - ads
      notes: Body copy uses Brandon Grotesque Regular.
    - semantic_token: weight/body/strong
      global_token: universal/weight/medium
      intended_channels:
        - web
        - email
        - ads
      notes: Subheads use Brandon Grotesque Medium and can stage as the strong body-family emphasis.
  size_aliases:
    - semantic_token: size/heading/base
      global_token: universal/size/400
      intended_channels:
        - web
        - email
        - ads
      notes: Assumed compact title size for the uppercase identifier line.
    - semantic_token: size/heading/xl
      global_token: universal/size/800
      intended_channels:
        - web
        - email
        - ads
      notes: Assumed display size for the primary Heavenly headline treatment.
    - semantic_token: size/body/lg
      global_token: universal/size/500
      intended_channels:
        - web
        - email
        - ads
      notes: Assumed supporting size for the all-caps Brandon Grotesque subhead.
    - semantic_token: size/body/base
      global_token: universal/size/300
      intended_channels:
        - web
        - email
        - ads
      notes: Assumed body size pending numeric source guidance.

