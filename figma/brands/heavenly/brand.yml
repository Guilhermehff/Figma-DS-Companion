semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: brand
        source_family: heavenly/snow_flower_red
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: heavenly/deep_water_blue
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Heavenly
        targets:
        - assets/logo
      inherited_from_base:
      - surface/neutral/*
      - surface/neutral/*_inverse
      - foreground/default
      - foreground/default_inverse
      - foreground/subtle
      - foreground/subtle_inverse
      - border/default
      - border/default_inverse
      - border/subtle
      - border/subtle_inverse
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - Exact white and black remain inherited through the shared neutral and status role recipes.
      - The role-based migration keeps `snow_flower_red` and `deep_water_blue` as the only expressive semantic lanes.
      - "`assets/logo` is overridden to the string `Heavenly` in the semantic theme extension."
      - "`shore_blue` remains a governed global family but is no longer promoted into semantic."
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: heavenly/family/01
      - semantic_token: family/body
        alias_of: heavenly/family/02
      - semantic_token: weight/heading/base
        alias_of: universal/weight/light
      - semantic_token: weight/heading/strong
        alias_of: universal/weight/bold
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: weight/body/strong
        alias_of: universal/weight/medium
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action
      - family/action_safe
      - weight/action/*
      notes:
      - Heavenly stages on a two-family system: Din Condensed for titles and headlines, and Brandon Grotesque for subheads and body copy.
      - CTA typography remains intentionally inherited because the supplied image specifies CTA tracking but does not explicitly name a CTA family or weight.
      - The shared semantic theme base now also includes `weight/heading/strong`, `weight/body/strong`, and `size/body/lg` so the Heavenly extension can override against governed base variables rather than a parallel schema.
notes:
- Heavenly is live in the Foundations file with global color ladders, two global typography families, the shared raw light weight, a semantic theme logo-name override, and semantic theme extension.
