semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: brand
        source_family: heavenly/snow_flower_red
        targets:
          - surface/brand/*
          - on_surface/brand/*
          - foreground/brand
          - border/brand
      - scope: brand_secondary
        source_family: heavenly/deep_water_blue
        targets:
          - surface/brand_secondary/*
          - on_surface/brand_secondary/*
          - foreground/brand_secondary
          - border/brand_secondary
      - scope: asset_logo
        source_value: Heavenly
        targets:
          - assets/logo
    inherited_from_base:
      - surface/neutral/*
      - on_surface/neutral/*
      - foreground/default
      - foreground/subtle
      - border/default
      - border/subtle
      - surface/positive/*
      - on_surface/positive/*
      - surface/warning/*
      - on_surface/warning/*
      - surface/critical/*
      - on_surface/critical/*
      - foreground/positive
      - foreground/warning
      - foreground/critical
      - border/positive
      - border/warning
      - border/critical
    notes:
      - Exact white and black remain inherited through the shared neutral and status role recipes.
      - The role-based migration keeps `snow_flower_red` and `deep_water_blue` as the only expressive semantic lanes.
      - "`assets/logo` is overridden to the string `Heavenly` in the semantic color extension."
      - "`shore_blue` remains a governed global family but is no longer promoted into semantic."
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: heavenly/family/primary
      - semantic_token: family/body
        alias_of: heavenly/family/secondary
      - semantic_token: weight/heading/base
        alias_of: universal/weight/light
      - semantic_token: weight/heading/strong
        alias_of: universal/weight/bold
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: weight/body/strong
        alias_of: universal/weight/medium
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action
      - family/action_safe
      - weight/action/*
      - size/*
    notes:
      - Heavenly stages on a two-family system: Din Condensed for titles and headlines, and Brandon Grotesque for subheads and body copy.
      - CTA typography remains intentionally inherited because the supplied image specifies CTA tracking but does not explicitly name a CTA family or weight.
      - The shared semantic typography base now also includes `weight/heading/strong`, `weight/body/strong`, and `size/body/lg` so the Heavenly extension can override against governed base variables rather than a parallel schema.
notes:
  - Heavenly is live in the Foundations file with global color ladders, two global typography families, the shared raw light weight, a semantic color logo-name override, and semantic color and typography extensions.
