primitive_recommendations:
  reuse_existing:
    families: []
    weights:
      - source_weight_label: Bold
        existing_token: universal/weight/bold
        reason: Headline, emphasized body copy, and CTA use Futura Bold.
      - source_weight_label: Medium
        existing_token: universal/weight/medium
        reason: Subheadline and body copy use Avenir Medium.
    sizes:
      - source_size_reference: body default
        existing_token: universal/size/300
        assumption_status: explicit
        assumption_note: The source explicitly gives a 16px body example, matching the current shared `300` size.
        reason: No new raw size step is needed for the body lane.
      - source_size_reference: cta default
        existing_token: universal/size/500
        assumption_status: explicit
        assumption_note: The CTA example explicitly shows 20px.
        reason: Matches the current shared `500` size.
  proposed_primitives:
    families:
      - token_name: keystone/family/primary
        source_family_name: Futura
        source_style_reference: Futura Bold across headline, emphasized body copy, and CTA
        rationale: Futura is the primary Keystone display and emphasis family.
        fallback_token: universal/family/web_safe
        fallback_note: The source does not define a fallback stack.
      - token_name: keystone/family/secondary
        source_family_name: Avenir
        source_style_reference: Avenir Medium across subheadline and body copy
        rationale: Avenir is the secondary reading family in the supplied Keystone guidance.
        fallback_token: universal/family/web_safe
        fallback_note: The source does not define a fallback stack.
  hold_for_review: []

semantic_recommendations:
  family_aliases:
    - semantic_token: family/heading
      global_token: keystone/family/primary
      safe_semantic_token: family/heading_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
      notes: Futura is the approved display family in the Keystone system.
    - semantic_token: family/body
      global_token: keystone/family/secondary
      safe_semantic_token: family/body_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
      notes: Avenir remains the approved body and subheadline family.
    - semantic_token: family/action
      global_token: keystone/family/primary
      safe_semantic_token: family/action_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
      notes: CTA is approved to use the Futura family rather than Avenir.
  weight_aliases:
    - semantic_token: weight/heading/base
      global_token: universal/weight/bold
      intended_channels:
        - web
        - email
        - ads
      notes: The headline lane is explicitly bold.
    - semantic_token: weight/body/base
      global_token: universal/weight/medium
      intended_channels:
        - web
        - email
        - ads
      notes: Keystone body copy explicitly uses Avenir Medium rather than a normal reading weight.
    - semantic_token: weight/action/base
      global_token: universal/weight/bold
      intended_channels:
        - web
        - email
        - ads
      notes: CTA is approved to use Futura Bold.
  size_aliases:
    - semantic_token: size/action/base
      global_token: universal/size/500
      intended_channels:
        - web
        - email
        - ads
      notes: The CTA example is explicitly 20px and can stage on the existing shared size ladder.

