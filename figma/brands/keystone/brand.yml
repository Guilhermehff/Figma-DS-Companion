semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: neutral
        source_family: keystone/cool_grey
        targets:
          - surface/neutral/*
          - on_surface/neutral/*
          - foreground/default
          - foreground/subtle
          - border/default
          - border/subtle
      - scope: brand
        source_family: keystone/valencia
        targets:
          - surface/brand/*
          - on_surface/brand/*
          - foreground/brand
          - border/brand
      - scope: brand_secondary
        source_family: keystone/curious_blue
        targets:
          - surface/brand_secondary/*
          - on_surface/brand_secondary/*
          - foreground/brand_secondary
          - border/brand_secondary
    inherited_from_base:
      - foreground/inverse
      - surface/positive/*
      - on_surface/positive/*
      - surface/warning/*
      - on_surface/warning/*
      - surface/critical/*
      - on_surface/critical/*
      - foreground/positive
      - foreground/warning
      - foreground/critical
      - border/positive
      - border/warning
      - border/critical
    notes:
      - Cool Grey continues to map to the neutral role set only.
      - The reviewed role-based migration uses `valencia` and `curious_blue` as the only expressive semantic lanes.
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: keystone/family/primary
      - semantic_token: family/body
        alias_of: keystone/family/secondary
      - semantic_token: family/action
        alias_of: keystone/family/primary
      - semantic_token: weight/heading/base
        alias_of: universal/weight/bold
      - semantic_token: weight/body/base
        alias_of: universal/weight/medium
      - semantic_token: weight/action/base
        alias_of: universal/weight/bold
      - semantic_token: size/action/base
        alias_of: universal/size/500
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/heading/strong
      - weight/body/strong
      - size/heading/*
      - size/body/*
    notes:
      - CTA is approved to use Futura Bold, so the semantic action family now aliases the Keystone primary family.
      - No new raw size step was introduced in this pass; the explicit 48px headline recipe remains documented for a future ladder decision.
notes:
  - Keystone is live in the Design System file with three raw color families, two raw typography family primitives, and semantic color and typography extensions.
  - The live write intentionally defers any shared size-ladder expansion beyond the current governed steps.
