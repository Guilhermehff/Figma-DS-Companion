semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: neutral
        source_family: keystone/cool_grey
        targets:
        - surface/neutral/*
        - surface/neutral/*_inverse
        - foreground/default
        - foreground/default_inverse
        - foreground/subtle
        - foreground/subtle_inverse
        - border/default
        - border/default_inverse
        - border/subtle
        - border/subtle_inverse
      - scope: brand
        source_family: keystone/valencia
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: keystone/curious_blue
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Keystone
        targets:
        - assets/logo
      inherited_from_base:
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - Cool Grey continues to map to the neutral role set only.
      - The reviewed role-based migration uses `valencia` and `curious_blue` as the only expressive semantic lanes.
      - "`assets/logo` is overridden to the string `Keystone` in the semantic theme extension."
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: keystone/family/primary
      - semantic_token: family/body
        alias_of: keystone/family/secondary
      - semantic_token: family/action
        alias_of: keystone/family/primary
      - semantic_token: weight/heading/base
        alias_of: universal/weight/bold
      - semantic_token: weight/body/base
        alias_of: universal/weight/medium
      - semantic_token: weight/action/base
        alias_of: universal/weight/bold
      - semantic_token: size/action/base
        alias_of: universal/size/500
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/heading/strong
      - weight/body/strong
      - size/heading/*
      - size/body/*
      notes:
      - CTA is approved to use Futura Bold, so the semantic action family now aliases the Keystone primary family.
      - 'No new raw size step was introduced in this pass; typography size continues to bind the published shared `Global: Typography` ladder while the explicit 48px headline recipe remains documented for a future ladder decision.'
notes:
- Keystone is live in the Foundations file with three raw color families, two raw typography family primitives, a semantic theme logo-name override, and semantic theme extension.
- The live write intentionally defers any shared size-ladder expansion beyond the current governed steps.
