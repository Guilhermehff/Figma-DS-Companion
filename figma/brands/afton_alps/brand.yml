semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: brand
        source_family: afton_alps/blue
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: afton_alps/yellow
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Afton Alps
        targets:
        - assets/logo
      inherited_from_base:
      - surface/neutral/*
      - surface/neutral/*_inverse
      - foreground/default
      - foreground/default_inverse
      - foreground/subtle
      - foreground/subtle_inverse
      - border/default
      - border/default_inverse
      - border/subtle
      - border/subtle_inverse
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - No Afton Alps neutral swatch was supplied, so neutral roles remain inherited from the shared semantic base.
      - The exact source blue anchors the raw ladder at `900`, while the live primary default surface stages on `blue/800` so the source `blue/900` remains the stronger branded text and dark-surface step.
      - The bright yellow secondary lane uses black on lighter surfaces and reserves white for the darker emphasis step.
      - "`assets/logo` is overridden to the string `Afton Alps` in the semantic theme extension."
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: afton_alps/family/primary
      - semantic_token: family/body
        alias_of: afton_alps/family/primary
      - semantic_token: family/action
        alias_of: afton_alps/family/primary
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/*
      notes:
      - Afton Alps adds a governed raw family token, `afton_alps/family/primary`, with the same string value as `universal/family/primary`.
      - 'Weight and safe-family semantics remain inherited from the live semantic theme base collection because the requested values are unchanged from universal. Typography size now binds directly from published `Global: Typography`.'
notes:
- Afton Alps is live in the Foundations file with two raw color families, one mirrored raw typography family primitive, a semantic theme logo-name override, and Afton Alps semantic theme extension.
