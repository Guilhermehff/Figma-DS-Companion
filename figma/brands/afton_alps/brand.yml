semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: brand
        source_family: afton_alps/blue
        targets:
          - surface/brand/*
          - on_surface/brand/*
          - foreground/brand
          - border/brand
      - scope: brand_secondary
        source_family: afton_alps/yellow
        targets:
          - surface/brand_secondary/*
          - on_surface/brand_secondary/*
          - foreground/brand_secondary
          - border/brand_secondary
      - scope: asset_logo
        source_value: Afton Alps
        targets:
          - assets/logo
    inherited_from_base:
      - surface/neutral/*
      - on_surface/neutral/*
      - foreground/default
      - foreground/subtle
      - border/default
      - border/subtle
      - surface/positive/*
      - on_surface/positive/*
      - surface/warning/*
      - on_surface/warning/*
      - surface/critical/*
      - on_surface/critical/*
      - foreground/positive
      - foreground/warning
      - foreground/critical
      - border/positive
      - border/warning
      - border/critical
    notes:
      - No Afton Alps neutral swatch was supplied, so neutral roles remain inherited from the shared semantic base.
      - The exact source blue anchors the raw ladder at `900`, while the live primary default surface stages on `blue/800` so the source `blue/900` remains the stronger branded text and dark-surface step.
      - The bright yellow secondary lane uses black on lighter surfaces and reserves white for the darker emphasis step.
      - "`assets/logo` is overridden to the string `Afton Alps` in the semantic color extension."
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: afton_alps/family/primary
      - semantic_token: family/body
        alias_of: afton_alps/family/primary
      - semantic_token: family/action
        alias_of: afton_alps/family/primary
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/*
      - size/*
    notes:
      - Afton Alps adds a governed raw family token, `afton_alps/family/primary`, with the same string value as `universal/family/primary`.
      - Weight, safe-family, and size semantics remain inherited from the live base collection because the user requested the same effective values as universal.
notes:
  - Afton Alps is live in the Foundations file with two raw color families, one mirrored raw typography family primitive, a semantic color logo-name override, and Afton Alps semantic color and typography extensions.
