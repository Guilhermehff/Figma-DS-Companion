validation:
  perceptual_consistency_notes:
    - Afton Alps Blue lands at `900` because the supplied swatch sits in the dark-navy lightness band and is materially darker than the existing `800` blue anchors used by other brands.
    - Afton Alps Yellow lands at `300` because the supplied swatch behaves as a bright accent rather than a midtone.
    - The first semantic pass inherits the shared neutral role set because no branded neutral swatch was supplied.
    - The primary blue semantic lane uses `blue/800` for default surfaces so the exact source `blue/900` can remain the stronger branded text and emphasis step.
  contrast_checks:
    - token: afton_alps/blue/900
      foreground: white
      ratio: "13.55:1"
      result: pass
    - token: afton_alps/blue/950
      foreground: white
      ratio: "17.40:1"
      result: pass
    - token: afton_alps/blue/100
      foreground: black
      ratio: "18.54:1"
      result: pass
    - token: afton_alps/yellow/700
      foreground: white
      ratio: "7.08:1"
      result: pass
    - token: afton_alps/yellow/300
      foreground: black
      ratio: "11.40:1"
      result: pass

semantic_recommendations:
  role_sets:
    - scope: neutral
      source_family: inherited_base
      rationale: No Afton Alps neutral swatches were supplied, so the shared neutral role set remains inherited from the semantic base collection.
      targets:
        - surface/neutral/*
        - on_surface/neutral/*
        - foreground/default
        - foreground/subtle
        - border/default
        - border/subtle
    - scope: brand
      source_family: afton_alps/blue
      rationale: Blue is the user-approved primary expressive lane and behaves as a dark brand family.
      targets:
        - surface/brand/*
        - on_surface/brand/*
        - foreground/brand
        - border/brand
    - scope: brand_secondary
      source_family: afton_alps/yellow
      rationale: Yellow is the user-approved secondary expressive lane and behaves as a bright accent family.
      targets:
        - surface/brand_secondary/*
        - on_surface/brand_secondary/*
        - foreground/brand_secondary
        - border/brand_secondary
  global_only_families: []
  role_exceptions:
    - target: assets/logo
      source_token: Afton Alps
      rationale: "The live `Semantic: Theme` schema includes `assets/logo`, and each brand extension overrides it to the brand display name string."

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Afton Alps lane order
      channels:
        - web
        - email
        - ads
      rule: Use `blue` as the primary expressive lane and `yellow` as the secondary expressive lane.
      source_basis: User-approved lane order in chat.
    - subject: Afton Alps neutral inheritance
      channels:
        - web
        - email
        - ads
      rule: Keep neutral roles inherited from the shared base because no branded neutral swatch was supplied.
      source_basis: Source image provides only blue and yellow.

