semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: neutral
        source_family: northstar/graphite
        targets:
          - surface/neutral/*
          - on_surface/neutral/*
          - foreground/default
          - foreground/subtle
          - border/default
          - border/subtle
      - scope: brand
        source_family: northstar/burgundy
        targets:
          - surface/brand/*
          - on_surface/brand/*
          - foreground/brand
          - border/brand
      - scope: brand_secondary
        source_family: northstar/copper
        targets:
          - surface/brand_secondary/*
          - on_surface/brand_secondary/*
          - foreground/brand_secondary
          - border/brand_secondary
    inherited_from_base:
      - foreground/inverse
      - surface/positive/*
      - on_surface/positive/*
      - surface/warning/*
      - on_surface/warning/*
      - surface/critical/*
      - on_surface/critical/*
      - foreground/positive
      - foreground/warning
      - foreground/critical
      - border/positive
      - border/warning
      - border/critical
    notes:
      - The role-based migration keeps burgundy and copper as the expressive semantic lanes.
      - Graphite drives the neutral role set.
      - The former tertiary burgundy reuse is removed from semantic and remains only as a global family.
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: northstar/family/primary
      - semantic_token: family/body
        alias_of: northstar/family/primary
      - semantic_token: weight/heading/base
        alias_of: universal/weight/medium
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action
      - family/action_safe
      - weight/action/*
      - size/*
    notes:
      - The supplied guidance shows one brand family, `New Order`, with Medium used for headlines and Regular used for sub-headlines and body copy.
      - Action typography remains intentionally inherited because the approved source did not define a CTA or button-specific rule.
notes:
  - Northstar is live in the Design System file with global color ladders, a global typography family, and semantic color and typography extensions.
