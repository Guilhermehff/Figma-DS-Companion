semantic_overrides:
  color:
    status: active
    override_scopes:
      - semantic_slot: brand
        raw_family: northstar/burgundy
      - semantic_slot: brand_secondary
        raw_family: northstar/copper
      - semantic_slot: brand_tertiary
        raw_family: northstar/burgundy
      - semantic_slot: neutral
        raw_family: northstar/graphite
    inherited_from_base:
      - positive/*
      - warning/*
      - negative/*
    notes:
      - The source clearly supports primary burgundy, secondary copper, and a branded neutral ladder built from snow white, gray, and near-black.
      - brand_tertiary/* is approved and written to reuse the burgundy ladder rather than remaining inherited from the semantic base.
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: northstar/family/primary
      - semantic_token: family/body
        alias_of: northstar/family/primary
      - semantic_token: weight/heading/base
        alias_of: universal/weight/medium
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action
      - family/action_safe
      - weight/action/*
      - size/*
    notes:
      - The supplied guidance shows one brand family, `New Order`, with Medium used for headlines and Regular used for sub-headlines and body copy.
      - Action typography remains intentionally inherited because the approved source did not define a CTA or button-specific rule.
notes:
  - Northstar is live in the Design System file with global color ladders, a global typography family, and semantic color and typography extensions.
