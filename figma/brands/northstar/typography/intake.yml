date: 2026-03-11
brand: northstar
source_reference: User-provided images in chat showing the Northstar typography guidance
source_type: image
figma_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Design-System?node-id=1-3&t=jagoUKe5gyKCbAbG-1
status: active
preview:
  required_before_write: true
  artifact: figma/brands/northstar/typography/preview.md
  status: written_in_figma

source_roles:
  - source_role: headline
    source_family_name: New Order
    source_style_name: New Order Medium
    source_weight_label: Medium
    source_usage_scope: primary_display_headline
    text_case: sentence_case
    tracking: 0px
    leading: not specified in source
    size_rule: headline size not numerically specified
    punctuation_rule: punctuation required
    sample_copy: Headlines will be in New Order Medium in sentence case, left justified.
    notes: The source explicitly says headlines use New Order Medium, sentence case, left justified, and 0px tracking.
  - source_role: subhead
    source_family_name: New Order
    source_style_name: New Order Regular
    source_weight_label: Regular
    source_usage_scope: supporting_headline_copy
    text_case: sentence_case
    tracking: 0px
    leading: equal_to_font_size
    size_rule: sub-headline size not numerically specified
    punctuation_rule: punctuation required
    sample_copy: Sub-Headlines will be in New Order Regular in sentence case, left justified.
    notes: The source explicitly says sub-headlines use New Order Regular and leading equal to type size.
  - source_role: body
    source_family_name: New Order
    source_style_name: New Order Regular
    source_weight_label: Regular
    source_usage_scope: reading_copy
    text_case: sentence_case
    tracking: 0px
    leading: 1.8x type size
    size_rule: body size not numerically specified
    punctuation_rule: punctuation required
    sample_copy: Body Copy will be in New Order Regular in sentence case, left justified.
    notes: The source explicitly says body copy uses New Order Regular with leading set to 1.8 type size.

primitive_recommendations:
  reuse_existing:
    families: []
    weights:
      - source_weight_label: Medium
        existing_token: universal/weight/medium
        reason: The source explicitly names Medium, and the shared raw typography ladder already contains `universal/weight/medium`.
      - source_weight_label: Regular
        existing_token: universal/weight/normal
        reason: The source explicitly names Regular, which maps to the existing normal raw weight.
    sizes:
      - source_size_reference: headline default
        existing_token: universal/size/800
        assumption_status: assumed
        assumption_note: The source provides hierarchy and behavior but no numeric headline size, so the first pass uses the largest governed display step.
        reason: Preserves a strong headline role while keeping the sizing ladder shared.
      - source_size_reference: sub-headline default
        existing_token: universal/size/500
        assumption_status: assumed
        assumption_note: The source shows a clearly subordinate but still prominent role, so the first pass uses the mid-large heading step.
        reason: Keeps the sub-headline within the current shared size ladder.
      - source_size_reference: body default
        existing_token: universal/size/300
        assumption_status: assumed
        assumption_note: The source does not provide a numeric body size, so the initial review uses the shared reading size.
        reason: Keeps body on the governed raw ladder until a numeric spec or Figma comp is available.
  proposed_primitives:
    families:
      - token_name: northstar/family/primary
        source_family_name: New Order
        source_style_reference: New Order Medium and New Order Regular across headline, sub-headline, and body
        rationale: A single family spans all reviewed Northstar typography roles, with weight carrying the distinction.
        fallback_token: universal/family/web_safe
        fallback_note: The source names the family but does not provide a fallback stack, so the staged recommendation uses the standard safe family.
    weights: []
  hold_for_review:
    - item: Adobe Fonts delivery link
      reason: The source references an Adobe Fonts link, but the actual URL is not present in the provided image.
    - item: action typography
      reason: The source does not define CTA, button, or action-specific typography behavior.

semantic_recommendations:
  family_aliases:
    - semantic_token: family/heading
      global_token: northstar/family/primary
      safe_semantic_token: family/heading_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
      notes: Northstar uses the same family for all staged roles, with safe-family fallbacks reserved for constrained channels.
    - semantic_token: family/body
      global_token: northstar/family/primary
      safe_semantic_token: family/body_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
      notes: Body copy stays on the same family because the source uses New Order across the reviewed system.
  weight_aliases:
    - semantic_token: weight/heading/base
      global_token: universal/weight/medium
      intended_channels:
        - web
        - email
        - ads
      notes: Headlines explicitly use New Order Medium.
    - semantic_token: weight/body/base
      global_token: universal/weight/normal
      intended_channels:
        - web
        - email
        - ads
      notes: Sub-headline and body copy explicitly use New Order Regular, which stages cleanly on the shared normal weight.
  size_aliases:
    - semantic_token: size/heading/xl
      global_token: universal/size/800
      intended_channels:
        - web
        - email
        - ads
      notes: Assumed headline size pending numeric source guidance.
    - semantic_token: size/heading/base
      global_token: universal/size/500
      intended_channels:
        - web
        - email
        - ads
      notes: Assumed sub-headline size pending numeric source guidance.
    - semantic_token: size/body/base
      global_token: universal/size/300
      intended_channels:
        - web
        - email
        - ads
      notes: Assumed body size pending numeric source guidance.

role_recipes:
  - role_name: headline
    source_role: Headline | New Order Medium
    proposed_family_token: northstar/family/primary
    fallback_token: universal/family/web_safe
    proposed_weight_token: universal/weight/medium
    proposed_size_token: universal/size/800
    size_assumption_status: assumed
    text_case: sentence_case
    tracking: 0px
    leading_rule: not specified in source
    size_rule: headline size not numerically specified
    punctuation_rule: punctuation required
    sample_copy: Headlines will be in New Order Medium in sentence case.
    notes: Left justified. The source explicitly requires punctuation on all reviewed copy types.
  - role_name: subhead
    source_role: Sub-Headline | New Order Regular
    proposed_family_token: northstar/family/primary
    fallback_token: universal/family/web_safe
    proposed_weight_token: universal/weight/normal
    proposed_size_token: universal/size/500
    size_assumption_status: assumed
    text_case: sentence_case
    tracking: 0px
    leading_rule: line-height equals font size
    size_rule: sub-headline size not numerically specified
    punctuation_rule: punctuation required
    sample_copy: Sub-Headlines will be in New Order Regular in sentence case.
    notes: Left justified, with leading set to the same value as the font size.
  - role_name: body
    source_role: Body Copy | New Order Regular
    proposed_family_token: northstar/family/primary
    fallback_token: universal/family/web_safe
    proposed_weight_token: universal/weight/normal
    proposed_size_token: universal/size/300
    size_assumption_status: assumed
    text_case: sentence_case
    tracking: 0px
    leading_rule: 1.8x type size
    size_rule: body size not numerically specified
    punctuation_rule: punctuation required
    sample_copy: Body Copy will be in New Order Regular in sentence case.
    notes: Left justified, with generous leading defined relative to the type size.

validation:
  extraction_notes:
    - The source is explicit about family, weight labels, case, punctuation, and leading rules, but it does not provide numeric font sizes.
    - The source uses one family, `New Order`, and differentiates roles primarily through weight and line-height behavior.
  governance_notes:
    - Northstar can stage on a single brand family primitive without introducing extra family tokens.
    - The lack of CTA or action guidance means `family/action` and `weight/action/*` should remain inherited until the brand publishes a stronger rule.

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: headline
      channels:
        - web
        - email
        - ads
      rule: Keep headlines in New Order Medium, sentence case, left justified, with 0px tracking and punctuation.
      source_basis: Northstar typography guidance image.
    - subject: sub-headline
      channels:
        - web
        - email
        - ads
      rule: Keep sub-headlines in New Order Regular with line-height equal to font size.
      source_basis: Northstar typography-in-use image.
    - subject: body
      channels:
        - web
        - email
        - ads
      rule: Keep body copy in New Order Regular with line-height set to 1.8 times the font size.
      source_basis: Northstar typography-in-use image.

open_questions: []
