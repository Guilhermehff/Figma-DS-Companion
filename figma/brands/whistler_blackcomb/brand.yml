semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: brand
        source_family: whistler_blackcomb/red
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: whistler_blackcomb/red
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Whistler Blackcomb
        targets:
        - assets/logo
      inherited_from_base:
      - surface/neutral/*
      - surface/neutral/*_inverse
      - foreground/default
      - foreground/default_inverse
      - foreground/subtle
      - foreground/subtle_inverse
      - border/default
      - border/default_inverse
      - border/subtle
      - border/subtle_inverse
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - Exact black and white remain inherited through the shared neutral role recipes because the supplied palette matches `universal/black` and `universal/white`.
      - The official palette supplies one expressive hue, so `whistler_blackcomb/red` now drives both expressive semantic lanes in the current live schema.
      - "`assets/logo` is overridden to the string `Whistler Blackcomb` in the semantic theme extension."
      - The source guidance to balance red, black, and white evenly is preserved as a composition rule in the intake and preview artifacts rather than as duplicate raw exact tokens.
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: whistler_blackcomb/family/01
      - semantic_token: family/body
        alias_of: whistler_blackcomb/family/01
      - semantic_token: family/action
        alias_of: whistler_blackcomb/family/01
      - semantic_token: weight/heading/base
        alias_of: universal/weight/black
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: weight/body/strong
        alias_of: universal/weight/bold
      - semantic_token: weight/action/base
        alias_of: universal/weight/bold
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/heading/strong
      notes:
      - Whistler Blackcomb stages on one raw family, `Proxima Nova`, across headline, eyebrow, subhead, body, and button work, with weight carrying the hierarchy.
      - Eyebrow remains a documented role recipe under the heading lane because the current semantic theme typography schema has no separate eyebrow token.
      - Live size semantics remain inherited because the supplied hierarchy defines tracking and leading behavior but not governed token sizes.
notes:
- Whistler Blackcomb is live in the Foundations file with one raw color family, one raw typography family primitive, a semantic theme logo-name override, and Whistler Blackcomb semantic theme extension.
