validation:
  extraction_notes:
  - The source is explicit about family choice, weight labels, tracking, and leading behavior for headline,
    eyebrow, subhead, and body roles.
  - The source uses one family throughout, so the first semantic pass stays on one raw family with weight
    carrying the hierarchy.
  governance_notes:
  - The proposed live mapping stays inside the current semantic theme typography schema by using one family
    across heading, body, and action.
  - Eyebrow remains a documented role recipe rather than becoming a new semantic role because the current
    semantic schema has no separate eyebrow lane.
  - Brand-safe typography aliases now stage on `whistler_blackcomb/family_safe/*` from Vail Resorts Guidelines.pdf.
