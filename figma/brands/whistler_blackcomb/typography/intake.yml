primitive_recommendations:
  reuse_existing:
    families: []
    weights:
      - source_weight_label: Black
        existing_token: universal/weight/black
        reason: Direct match for the headline and eyebrow lane.
      - source_weight_label: Bold
        existing_token: universal/weight/bold
        reason: Direct match for the subhead and action lane.
      - source_weight_label: Regular
        existing_token: universal/weight/normal
        reason: Direct match for body copy.
    sizes: []
  proposed_primitives:
    families:
      - token_name: whistler_blackcomb/family/primary
        source_family_name: Proxima Nova
        source_style_reference: Black, Bold, and Regular hierarchy
        rationale: Whistler Blackcomb uses one type family across headline, eyebrow, subhead, body, and button roles, with weight and recipe behavior carrying the distinction.
        fallback_token: universal/family/web_safe
        fallback_note: The source does not define a fallback stack.
    weights: []
  hold_for_review: []

semantic_recommendations:
  family_aliases:
    - semantic_token: family/heading
      global_token: whistler_blackcomb/family/primary
      safe_semantic_token: family/heading_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
      notes: Headline and eyebrow work stay on Proxima Nova.
    - semantic_token: family/body
      global_token: whistler_blackcomb/family/primary
      safe_semantic_token: family/body_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
      notes: Body and subhead copy stay on the same family, with weight carrying the distinction.
    - semantic_token: family/action
      global_token: whistler_blackcomb/family/primary
      safe_semantic_token: family/action_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
      notes: Button and action copy stay on Proxima Nova.
  weight_aliases:
    - semantic_token: weight/heading/base
      global_token: universal/weight/black
      intended_channels:
        - web
        - email
        - ads
      notes: Headline and eyebrow weight map directly to black.
    - semantic_token: weight/body/base
      global_token: universal/weight/normal
      intended_channels:
        - web
        - email
        - ads
      notes: Body copy maps directly to regular.
    - semantic_token: weight/body/strong
      global_token: universal/weight/bold
      intended_channels:
        - web
        - email
        - ads
      notes: Subheads map directly to bold without introducing a new semantic family lane.
    - semantic_token: weight/action/base
      global_token: universal/weight/bold
      intended_channels:
        - web
        - email
        - ads
      notes: Action copy maps directly to bold.
  size_aliases: []

