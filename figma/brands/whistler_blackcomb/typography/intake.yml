validation:
  extraction_notes:
    - The source is explicit about family choice, weight labels, tracking, and leading behavior for headline, eyebrow, subhead, and body roles.
    - The source uses one family throughout, so the first semantic pass stays on one raw family with weight carrying the hierarchy.
  governance_notes:
    - The proposed live mapping stays inside the current semantic theme typography schema by using one family across heading, body, and action.
    - Eyebrow remains a documented role recipe rather than becoming a new semantic role because the current semantic schema has no separate eyebrow lane.

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Whistler Blackcomb headline lane
      channels:
        - web
        - email
        - ads
      rule: Keep headlines and eyebrows on Proxima Nova Black with 15 tracking; headlines use 90 percent leading and eyebrows use 100 percent leading.
      source_basis: Whistler Blackcomb hierarchy guidance image.
    - subject: Whistler Blackcomb supporting copy
      channels:
        - web
        - email
        - ads
      rule: Keep subheads on Proxima Nova Bold, body on Proxima Nova Regular, and button copy on Proxima Nova Bold without introducing a separate semantic eyebrow or subhead family.
      source_basis: Whistler Blackcomb hierarchy guidance image.

