validation:
  perceptual_consistency_notes:
    - Whistler Blackcomb Red lands at `600` because the supplied swatch is darker than pure digital red but still sits above the deepest accent range.
    - Exact black and white should remain shared through `universal/black` and `universal/white`.
    - The official guidance calls for an even ratio of red, black, and white, but only red becomes a new raw family because black and white are already governed universal primitives.
  contrast_checks:
    - token: whistler_blackcomb/red/600
      foreground: white
      ratio: "5.89:1"
      result: pass
    - token: whistler_blackcomb/red/900
      foreground: white
      ratio: "16.86:1"
      result: pass
    - token: whistler_blackcomb/red/100
      foreground: black
      ratio: "16.69:1"
      result: pass

semantic_recommendations:
  role_sets:
    - scope: neutral
      source_family: inherited_base
      rationale: The supplied black and white are exact universal matches, so the shared neutral role set remains inherited from the semantic base collection.
      targets:
        - surface/neutral/*
        - on_surface/neutral/*
        - foreground/default
        - foreground/subtle
        - border/default
        - border/subtle
    - scope: brand
      source_family: whistler_blackcomb/red
      rationale: Red is the primary Whistler Blackcomb expressive lane.
      targets:
        - surface/brand/*
        - on_surface/brand/*
        - foreground/brand
        - border/brand
    - scope: brand_secondary
      source_family: whistler_blackcomb/red
      rationale: The live schema still requires a secondary expressive lane, and the accepted semantic color family model allows brands with one expressive hue to map `brand_secondary/*` back to the same raw family used by `brand/*`.
      targets:
        - surface/brand_secondary/*
        - on_surface/brand_secondary/*
        - foreground/brand_secondary
        - border/brand_secondary
  global_only_families: []
  role_exceptions:
    - target: assets/logo
      source_token: Whistler Blackcomb
      rationale: "The live `Semantic: Color` schema includes `assets/logo`, and each brand extension overrides it to the brand display name string."

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Whistler Blackcomb neutral reuse
      channels:
        - web
        - email
        - ads
      rule: Keep exact black and white on the shared universal primitives rather than creating duplicate brand exact tokens.
      source_basis: The supplied palette exactly matches the governed universal values.
    - subject: Whistler Blackcomb expressive lane coverage
      channels:
        - web
        - email
        - ads
      rule: Use the red family for both `brand/*` and `brand_secondary/*` in the first semantic pass because the official palette supplies only one expressive hue.
      source_basis: The supplied palette defines red, black, and white only, and the accepted semantic family model permits same-family mapping when no second expressive hue is defined.

open_questions: []
