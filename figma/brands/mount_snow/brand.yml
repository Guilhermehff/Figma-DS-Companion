semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: neutral
        source_family: mount_snow/whipped_cream
        targets:
          - surface/neutral/*
          - on_surface/neutral/*
          - foreground/default
          - foreground/subtle
          - border/default
          - border/subtle
      - scope: brand
        source_family: mount_snow/bluebird_express
        targets:
          - surface/brand/*
          - on_surface/brand/*
          - foreground/brand
          - border/brand
      - scope: brand_secondary
        source_family: mount_snow/heart_red
        targets:
          - surface/brand_secondary/*
          - on_surface/brand_secondary/*
          - foreground/brand_secondary
          - border/brand_secondary
      - scope: asset_logo
        source_value: Mount Snow
        targets:
          - assets/logo
    inherited_from_base:
      - surface/positive/*
      - on_surface/positive/*
      - surface/warning/*
      - on_surface/warning/*
      - surface/critical/*
      - on_surface/critical/*
      - foreground/positive
      - foreground/warning
      - foreground/critical
      - border/positive
      - border/warning
      - border/critical
    notes:
      - Mount Snow stages Bluebird Express and Heart Red as the two expressive semantic lanes because they are the strongest supplied primary accents.
      - Whipped Cream drives the neutral surface system, while exact black is reused from `universal/black` for readable neutral foregrounds and the dark end of the palette.
      - Somerset Blue and Rosy Cheeks remain governed global-only extra families after the two-lane semantic mapping.
      - "`assets/logo` is overridden to the string `Mount Snow` in the semantic color extension."
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: mount_snow/family/primary
      - semantic_token: family/body
        alias_of: mount_snow/family/secondary
      - semantic_token: weight/heading/base
        alias_of: universal/weight/black
      - semantic_token: weight/body/base
        alias_of: universal/weight/medium
      - semantic_token: weight/body/strong
        alias_of: universal/weight/black
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action
      - family/action_safe
      - weight/action/*
      - size/*
    notes:
      - Vastago Grotesk drives the Mount Snow headline lane, and Area Extended covers both subheadline and body copy.
      - "`Heavy` and `Extra Bold` are both staged on `universal/weight/black` because the current shared raw ladder has no separate heavy or extra-bold primitive and the source does not provide numeric weight values."
      - Size semantics remain inherited from the shared baseline because the source uses example leading pairs rather than governed raw size tokens.
notes:
  - Mount Snow is live in the Foundations file with five raw color families, two raw typography families, a semantic color logo-name override, and Mount Snow semantic color and typography extensions.
