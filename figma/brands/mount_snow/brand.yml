semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: neutral
        source_family: mount_snow/whipped_cream
        targets:
        - surface/neutral/*
        - surface/neutral/*_inverse
        - foreground/default
        - foreground/default_inverse
        - foreground/subtle
        - foreground/subtle_inverse
        - border/default
        - border/default_inverse
        - border/subtle
        - border/subtle_inverse
      - scope: brand
        source_family: mount_snow/bluebird_express
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: mount_snow/heart_red
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Mount Snow
        targets:
        - assets/logo
      inherited_from_base:
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - Mount Snow stages Bluebird Express and Heart Red as the two expressive semantic lanes because they are the strongest supplied primary accents.
      - Whipped Cream drives the neutral surface system, while exact black is reused from `universal/black` for readable neutral foregrounds and the dark end of the palette.
      - Somerset Blue and Rosy Cheeks remain governed global-only extra families after the two-lane semantic mapping.
      - "`assets/logo` is overridden to the string `Mount Snow` in the semantic theme extension."
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: mount_snow/family/01
      - semantic_token: family/body
        alias_of: mount_snow/family/02
      - semantic_token: weight/heading/base
        alias_of: universal/weight/black
      - semantic_token: weight/body/base
        alias_of: universal/weight/medium
      - semantic_token: weight/body/strong
        alias_of: universal/weight/black
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action
      - family/action_safe
      - weight/action/*
      notes:
      - Vastago Grotesk drives the Mount Snow headline lane, and Area Extended covers both subheadline and body copy.
      - "`Heavy` and `Extra Bold` are both staged on `universal/weight/black` because the current shared raw ladder has no separate heavy or extra-bold primitive and the source does not provide numeric weight values."
      - 'Typography size binds directly from published `Global: Typography` because the source uses example leading pairs rather than governed raw size tokens.'
notes:
- Mount Snow is live in the Foundations file with five raw color families, two raw typography families, a semantic theme logo-name override, and Mount Snow semantic theme extension.
