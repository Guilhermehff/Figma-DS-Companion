artifacts:
  color:
    intake_artifact: figma/brands/mount_snow/color/intake.yml
    preview_artifact: figma/brands/mount_snow/color/preview.md
    decision_artifacts:
    - figma/decisions/2026-03-17-mount-snow-foundations-written-to-figma.md
