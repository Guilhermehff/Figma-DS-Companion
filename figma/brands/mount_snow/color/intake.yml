universal_reuse:
  reuse_universal:
    - source_name: Carinthia Rail
      provided_value: "#000000"
      existing_token: universal/black
      rationale: Exact match to the shared universal black primitive, so no duplicate brand black token is created.
  new_brand_families:
    - family: bluebird_express
      source_name: Bluebird Express
      provided_value: "#0068ff"
      rationale: Strongest supplied blue and the clearest Mount Snow brand anchor.
      anchor_step: 600
      anchor_label: 600_source
    - family: heart_red
      source_name: Heart Red
      provided_value: "#ff0000"
      rationale: Distinct primary accent that remains separate from the shared critical-status family because it carries brand identity.
      anchor_step: 500
      anchor_label: 500_source
    - family: whipped_cream
      source_name: Whipped Cream
      provided_value: "#fbf7f3"
      rationale: Warm off-white brand neutral that should drive Mount Snow surface roles without duplicating exact universal white or black.
      anchor_step: 100
      anchor_label: 100_source
    - family: somerset_blue
      source_name: Somerset Blue
      provided_value: "#0098ff"
      rationale: Secondary blue accent that remains available as a global-only extra family after the first semantic pass.
      anchor_step: 500
      anchor_label: 500_source
    - family: rosy_cheeks
      source_name: Rosy Cheeks
      provided_value: "#ff79df"
      rationale: Distinct pink accent preserved as a governed global-only family for future channel use.
      anchor_step: 400
      anchor_label: 400_source
  hold_for_review: []

