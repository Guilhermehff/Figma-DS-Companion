  safe_family_token: mount_snow/family_safe/02
validation:
  extraction_notes:
  - The source is explicit about family choice, weight labels, case, and the fixed 10px leading delta,
    but the numeric size pairs are presented as examples rather than governed token sizes.
  - Mount Snow uses one family for subheadline and body copy, with weight carrying the distinction.
  governance_notes:
  - '`Heavy` and `Extra Bold` are both staged on `universal/weight/black` because the current raw ladder
    has no stronger or intermediate approved weight between bold and black, and the source does not provide
    numeric weight values.'
  - Size semantics remain inherited from the shared baseline in the live Figma extension.
  - Brand-safe typography aliases now stage on `mount_snow/family_safe/*` from Vail Resorts Guidelines.pdf.
review_readiness:
  intended_review_channels:
  - web
  - email
  - ads
  review_rules:
  - subject: Mount Snow headline lane
    channels:
    - web
    - email
    - ads
    rule: Keep headlines on Vastago Grotesk Heavy in lowercase with 0 tracking and a 10px leading offset.
    source_basis: Mount Snow hierarchy guidance image.
  - subject: Mount Snow supporting copy
    channels:
    - web
    - email
    - ads
    rule: Keep subheadlines on Area Extended Extra Bold and body on Area Extended Medium, both in sentence
      case with 0 tracking and a 10px leading offset.
    source_basis: Mount Snow hierarchy guidance image.
open_questions: []
