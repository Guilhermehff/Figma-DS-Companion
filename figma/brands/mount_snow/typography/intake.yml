  source_family_name: Vastago Grotesk
  source_style_name: Heavy
  source_weight_label: Heavy
  source_usage_scope: primary_display_headline
  text_case: lowercase
  tracking: 0%
  leading: plus_10px_over_font_size
  size_rule: source gives example 44px / 54px leading but not a governed token size
  punctuation_rule: not specified in source
  sample_copy: the quick brown fox jumps over the lazy dog
  notes: Use for bold, impactful type.
  source_safe_family_name: Prompt
  source_safe_reference_column: headline_font
- source_role: subheadline
  source_family_name: Area Extended
  source_style_name: Extra Bold
  source_weight_label: Extra Bold
  source_usage_scope: supporting_headline_copy
  text_case: sentence_case
  tracking: 0%
  leading: plus_10px_over_font_size
  size_rule: source gives example 36px / 46px leading but not a governed token size
  punctuation_rule: sentence punctuation allowed
  sample_copy: The quick brown fox jumps over the lazy dog.
  notes: Source says to lean into Bold or Extra Bold for subheads.
  source_safe_family_name: Prompt
  source_safe_reference_column: headline_font
- source_role: body
  source_family_name: Area Extended
  source_style_name: Medium
  source_weight_label: Medium
  source_usage_scope: reading_copy
  text_case: sentence_case
  tracking: 0%
  leading: plus_10px_over_font_size
  size_rule: source gives example 20px / 30px leading but not a governed token size
  punctuation_rule: sentence punctuation allowed
  sample_copy: The quick brown fox jumps over the lazy dog.
  notes: Source explicitly says body copy should use Medium.
  source_safe_family_name: Poppins
  source_safe_reference_column: body_font
primitive_recommendations:
  reuse_existing:
    families: []
    weights:
    - source_weight_label: Heavy
      existing_token: universal/weight/black
      reason: The current shared raw ladder already has a strongest black weight, and the source does
        not provide a numeric value that would justify a separate heavy primitive in this pass.
    - source_weight_label: Extra Bold
      existing_token: universal/weight/black
      reason: The source names Extra Bold but does not provide a numeric distinction from the existing
        strongest shared raw weight.
    - source_weight_label: Medium
      existing_token: universal/weight/medium
      reason: Body copy explicitly uses Medium and the shared raw ladder already supports it.
    sizes:
    - source_size_reference: headline default
      existing_token: universal/size/core/700
      assumption_status: assumed
      assumption_note: The source shows a display example larger than the current shared ladder, so the
        first pass uses the largest governed heading step.
      reason: Keeps headline sizing inside the current shared raw ladder.
    - source_size_reference: subheadline default
      existing_token: universal/size/core/500
      assumption_status: assumed
      assumption_note: The source gives an example size but not a governed semantic size token, so the
        first pass uses the shared base heading step.
      reason: Preserves hierarchy without introducing a new raw size.
    - source_size_reference: body default
      existing_token: universal/size/core/200
      assumption_status: assumed
      assumption_note: The source provides an example size pair rather than a governed token size, so
        the live semantic size baseline remains inherited.
      reason: Keeps body sizing aligned to the shared base layer until a channel comp or explicit token
        request requires a size override.
  proposed_primitives:
    families:
    - token_name: mount_snow/family/01
      source_family_name: Vastago Grotesk
      source_style_reference: Heavy headline system
      rationale: Primary display family for Mount Snow headline work.
      safe_family_token: mount_snow/family_safe/01
      safe_family_note: Approved safe-family companion from Vail Resorts Guidelines.pdf.
    - token_name: mount_snow/family/02
      source_family_name: Area Extended
      source_style_reference: Extra Bold subheadline and Medium body system
      rationale: Shared family for readable Mount Snow subheads and body copy, with weight carrying the
        distinction.
      safe_family_token: ''
      safe_family_note: Multiple approved role-level safe-family mappings apply to this brand family;
        use the semantic safe aliases and role recipes below.
    weights: []
    safe_families:
    - token_name: mount_snow/family_safe/01
      source_family_name: Prompt
      source_role_reference: eyebrow, headline, cta
      rationale: Approved web safe family from Vail Resorts Guidelines.pdf for the eyebrow, headline,
        cta lane.
    - token_name: mount_snow/family_safe/02
      source_family_name: Poppins
      source_role_reference: body
      rationale: Approved web safe family from Vail Resorts Guidelines.pdf for the body lane.
  hold_for_review:
  - item: action typography
    reason: The source does not define CTA, button, or action-specific typography behavior.
semantic_recommendations:
  family_aliases:
  - semantic_token: typography/family/heading
    global_token: mount_snow/family/01
    safe_semantic_token: typography/family/heading_safe
    safe_global_token: mount_snow/family_safe/01
    intended_channels:
    - web
    - email
    - ads
    notes: Vastago Grotesk drives the Mount Snow headline system. Safe mapping is staged from Vail Resorts
      Guidelines.pdf.
  - semantic_token: typography/family/body
    global_token: mount_snow/family/02
    safe_semantic_token: typography/family/body_safe
    safe_global_token: mount_snow/family_safe/02
    intended_channels:
    - web
    - email
    - ads
    notes: Area Extended covers both subheadline and body roles in the supplied hierarchy. Safe mapping
      is staged from Vail Resorts Guidelines.pdf.
  weight_aliases:
  - semantic_token: typography/weight/heading/base
    global_token: universal/weight/black
    intended_channels:
    - web
    - email
    - ads
    notes: '`Heavy` is staged on the current strongest shared raw weight.'
  - semantic_token: typography/weight/body/base
    global_token: universal/weight/medium
    intended_channels:
    - web
    - email
    - ads
    notes: Body copy explicitly uses Medium.
  - semantic_token: typography/weight/body/strong
    global_token: universal/weight/black
    intended_channels:
    - web
    - email
    - ads
    notes: Subheadlines stage on the stronger Area Extended emphasis without adding a separate extra-bold
      raw primitive in this pass.
  size_aliases: []
