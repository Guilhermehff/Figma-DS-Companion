semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: brand
        source_family: mad_river_mountain/river_blue
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: mad_river_mountain/mountain_green
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Mad River Mountain
        targets:
        - assets/logo
      inherited_from_base:
      - surface/neutral/*
      - surface/neutral/*_inverse
      - foreground/default
      - foreground/default_inverse
      - foreground/subtle
      - foreground/subtle_inverse
      - border/default
      - border/default_inverse
      - border/subtle
      - border/subtle_inverse
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - '`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black`
        or `universal/white` and are not hue-tinted.'
      - '`river_blue` drives the primary expressive lane and `mountain_green` drives the supporting expressive
        lane.'
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: mad_river_mountain/family/01
      - semantic_token: family/body
        alias_of: mad_river_mountain/family/01
      - semantic_token: family/action
        alias_of: mad_river_mountain/family/01
      - semantic_token: weight/heading/base
        alias_of: universal/weight/normal
      - semantic_token: weight/heading/strong
        alias_of: universal/weight/normal
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: weight/body/strong
        alias_of: universal/weight/normal
      - semantic_token: weight/action/base
        alias_of: universal/weight/normal
      - semantic_token: family/heading_safe
        alias_of: mad_river_mountain/family_safe/01
      - semantic_token: family/body_safe
        alias_of: mad_river_mountain/family_safe/02
      - semantic_token: family/action_safe
        alias_of: mad_river_mountain/family_safe/01
      inherited_from_base: []
      notes:
      - Mad River Mountain is live as a one-family typography system with `Prompt` across heading, body,
        and action work.
      - 'Typography size continues to bind directly from published `Global: Typography`.'
      - Brand-safe typography aliases now stage on `mad_river_mountain/family_safe/*` from Vail Resorts
        Guidelines.pdf.
notes:
- Mad River Mountain is live in the Foundations file with two raw color families, one raw typography family
  primitive, and Mad River Mountain semantic theme extension.
