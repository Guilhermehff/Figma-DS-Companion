artifacts:
  color:
    intake_artifact: figma/brands/mad_river_mountain/color/intake.yml
    preview_artifact: figma/brands/mad_river_mountain/color/preview.md
    decision_artifacts: []
  typography:
    intake_artifact: figma/brands/mad_river_mountain/typography/intake.yml
    preview_artifact: figma/brands/mad_river_mountain/typography/preview.md
    decision_artifacts: []
semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: brand
        source_family: mad_river_mountain/river_blue
        targets:
          - surface/brand/*
          - surface/brand/*_inverse
          - on_surface/brand/*
          - on_surface/brand/*_inverse
          - foreground/brand
          - foreground/brand_inverse
          - border/brand
          - border/brand_inverse
      - scope: brand_secondary
        source_family: mad_river_mountain/mountain_green
        targets:
          - surface/brand_secondary/*
          - surface/brand_secondary/*_inverse
          - on_surface/brand_secondary/*
          - on_surface/brand_secondary/*_inverse
          - foreground/brand_secondary
          - foreground/brand_secondary_inverse
          - border/brand_secondary
          - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Mad River Mountain
        targets:
          - assets/logo
    inherited_from_base:
      - surface/neutral/*
      - surface/neutral/*_inverse
      - foreground/default
      - foreground/default_inverse
      - foreground/subtle
      - foreground/subtle_inverse
      - border/default
      - border/default_inverse
      - border/subtle
      - border/subtle_inverse
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
    notes:
      - '`on_surface/*` tokens in the live semantic color extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted.'
      - "`river_blue` drives the primary expressive lane and `mountain_green` drives the supporting expressive lane."
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: mad_river_mountain/family/primary
      - semantic_token: family/body
        alias_of: mad_river_mountain/family/primary
      - semantic_token: family/action
        alias_of: mad_river_mountain/family/primary
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/*
      - size/*
    notes:
      - Mad River Mountain adds a governed raw family token with the same string value as `universal/family/primary`.
notes:
  - Mad River Mountain is live in the Foundations file with two raw color families, one mirrored raw typography family primitive, and Mad River Mountain semantic color and typography extensions.
