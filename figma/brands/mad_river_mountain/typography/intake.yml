source_roles:
  - source_role: headline
    source_family_name: Prompt
    source_style_name: not specified
    source_weight_label: Regular
    source_usage_scope: headline
    text_case: source dependent
    tracking: not specified in source
    leading: not specified in source
    size_rule: source names the family but does not govern numeric sizes
    punctuation_rule: not specified in source
    sample_copy: Mad River Mountain
  - source_role: subheadline
    source_family_name: Prompt
    source_style_name: not specified
    source_weight_label: Regular
    source_usage_scope: supporting headline
    text_case: source dependent
    tracking: not specified in source
    leading: not specified in source
    size_rule: source names the family but does not govern numeric sizes
    punctuation_rule: not specified in source
    sample_copy: Plan your visit
  - source_role: body
    source_family_name: Prompt
    source_style_name: not specified
    source_weight_label: Regular
    source_usage_scope: body copy
    text_case: source dependent
    tracking: not specified in source
    leading: not specified in source
    size_rule: source names the family but does not govern numeric sizes
    punctuation_rule: sentence punctuation allowed
    sample_copy: Check operations, tickets, and snow conditions before you go.

primitive_recommendations:
  reuse_existing:
    families: []
    weights:
      - source_weight_label: Regular
        existing_token: universal/weight/normal
        reason: Prompt is documented without a separate governed weight in the PDF, so the first pass uses the shared normal weight token.
    sizes:
      - source_size_reference: inherited
        existing_token: universal/size/*
        assumption_status: deferred_no_new_size
        assumption_note: The PDF names the family only and does not govern numeric sizes.
        reason: "Typography size continues to publish from the shared Global: Typography ladder."
  proposed_primitives:
    families:
      - token_name: mad_river_mountain/family/01
        source_family_name: Prompt
        source_style_reference: shared family across headline, subheadline, and body
        rationale: One-family system for the first governed pass.
        fallback_token: universal/family/fallback
        fallback_note: Safe-family behavior remains inherited from the semantic base.
    weights: []
  hold_for_review: []

semantic_recommendations:
  family_aliases:
    - semantic_token: family/heading
      global_token: mad_river_mountain/family/01
      safe_semantic_token: family/heading_safe
      safe_global_token: universal/family/fallback
      intended_channels:
        - web
        - email
        - ads
    - semantic_token: family/body
      global_token: mad_river_mountain/family/01
      safe_semantic_token: family/body_safe
      safe_global_token: universal/family/fallback
      intended_channels:
        - web
        - email
        - ads
    - semantic_token: family/action
      global_token: mad_river_mountain/family/01
      safe_semantic_token: family/action_safe
      safe_global_token: universal/family/fallback
      intended_channels:
        - web
        - email
        - ads
  weight_aliases:
    - semantic_token: weight/heading/base
      global_token: universal/weight/normal
    - semantic_token: weight/heading/strong
      global_token: universal/weight/normal
    - semantic_token: weight/body/base
      global_token: universal/weight/normal
    - semantic_token: weight/body/strong
      global_token: universal/weight/normal
    - semantic_token: weight/action/base
      global_token: universal/weight/normal
  size_aliases: []

role_recipes:
  - role_name: heading
    source_role: Prompt
    proposed_family_token: mad_river_mountain/family/01
    proposed_weight_token: universal/weight/normal
    proposed_size_token: inherited current heading ladder
  - role_name: body
    source_role: Prompt
    proposed_family_token: mad_river_mountain/family/01
    proposed_weight_token: universal/weight/normal
    proposed_size_token: inherited current body ladder
  - role_name: action
    source_role: derived from the shared Prompt family because the PDF does not define a separate CTA lane
    proposed_family_token: mad_river_mountain/family/01
    proposed_weight_token: universal/weight/normal
    proposed_size_token: inherited current action ladder

validation:
  extraction_notes:
    - The PDF names Prompt across headline, subheadline, and body without a separate weight breakdown.
  governance_notes:
    - Mad River Mountain is live as a one-family typography system with Prompt across heading, body, and action work.
    - "Typography size continues to bind directly from published Global: Typography."

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Mad River one-family system
      channels:
        - web
        - email
        - ads
      rule: Keep Prompt on heading, body, and action work in the current governed pass.
      source_basis: Vail Resorts Guidelines - Google Sheets PDF.

open_questions: []
