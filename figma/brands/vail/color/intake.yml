universal_reuse:
  reuse_universal:
  - source_name: Vail White
    provided_value: "#ffffff"
    existing_token: universal/white
    reason: Exact match to the existing universal primitive.
  - source_name: Vail Gray
    provided_value: "#808285"
    existing_token: universal/slate/500
    reason: Use as a universal neutral reference instead of creating a Vail-specific gray family.
  - source_name: Vail Black
    provided_value: "#000000"
    existing_token: universal/black
    reason: Exact match to the existing universal primitive.
  new_brand_families:
  - family: vintage_blue
    source_name: Vail Vintage Blue
    provided_value: "#3968b1"
    rationale: Primary Vail brand color from the source brand palette. It is distinct from the existing digital accent family and needs its own governed raw ramp.
    anchor_step: 600
    anchor_label: 600_source
  - family: dark_blue
    source_name: Vail Dark Blue
    provided_value: "#009ada"
    rationale: Primary Vail brand color from the source brand palette. It is brighter and more cyan than the existing digital and navy families, so it should remain a distinct raw family.
    anchor_step: 500
    anchor_label: 500_source
  - family: digital_blue
    source_name: Vail Digital Blue
    provided_value: "#006cd1"
    rationale: Distinct branded blue used for digital surfaces and CTAs. It does not match an existing universal family.
    anchor_step: 600
    anchor_label: 600_source
  - family: navy
    source_name: Vail Navy
    provided_value: "#144276"
    rationale: Deep branded blue that behaves as a separate family from Digital Blue and is materially darker than the universal palette.
    anchor_step: 800
    anchor_label: 800_source
  - family: yellow
    source_name: Vail Yellow
    provided_value: "#ffaf18"
    rationale: Signature warm accent that needs its own family and cannot be represented by the current universal palette.
    anchor_step: 300
    anchor_label: 300_source
  hold_for_review: []
