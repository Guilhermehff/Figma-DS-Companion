color_proportion_guidance:
  status: active
  notes:
  - Color proportion guidance is documentation guidance for composition and emphasis. It does not change token values or semantic override behavior.
  - This record currently captures the approved digital-color guidance only. Primary brand color proportions are not being governed here.
  - "`Vail Vintage Blue` and `Vail Dark Blue` are now preserved as raw families from the primary brand palette, but they do not change the current digital color proportion model."
  contexts:
  - context: digital_interface
    scope: digital_colors_only
    source_basis: User-approved documentation guidance added on 2026-03-26 after the Vail color documentation draft in Foundations.
    intent: White carries layout and readability. Digital Blue and Navy carry brand emphasis. Yellow stays limited to emphasis and calls to action.
    proportions:
    - source_name: Vail White
      value: 50%
      ds_mapping: universal/white
    - source_name: Vail Digital Blue
      value: 20%
      ds_mapping: vail/digital_blue/600
    - source_name: Vail Navy
      value: 20%
      ds_mapping: vail/navy/800
    - source_name: Vail Yellow
      value: 10%
      ds_mapping: vail/yellow/300
validation:
  perceptual_consistency_notes:
  - The five Vail families land on different source anchor steps because the official source colors occupy different lightness zones in OKLCH.
  - Vintage Blue anchors at `600` and Dark Blue anchors at `500`, preserving the primary brand palette without replacing the digital accent families that already drive semantic mapping.
  - Digital Blue, Navy, Yellow, Vintage Blue, and Dark Blue all produce 900 and 950 steps that support white text at or above the required threshold.
  - The first intake shows that source-anchor selection cannot stay centered on 500 for every family without distorting official brand colors.
  - Vail Gray is intentionally mapped to the universal neutral system rather than expanded into a brand family.
  contrast_checks:
  - token: vail/vintage_blue/800
    foreground: white
    ratio: 10.48:1
    result: pass
  - token: vail/dark_blue/800
    foreground: white
    ratio: 10.31:1
    result: pass
  - token: vail/digital_blue/800
    foreground: white
    ratio: 10.58:1
    result: pass
  - token: vail/navy/800
    foreground: white
    ratio: 10.14:1
    result: pass
  - token: vail/yellow/800
    foreground: white
    ratio: 10.41:1
    result: pass
review_readiness:
  intended_review_channels:
  - web
  - email
  - ads
  review_rules:
  - subject: Vail White, Vail Gray, and Vail Black
    channels:
    - web
    - email
    - ads
    rule: Treat these as logo or typography colors and neutral references during downstream brand review.
    source_basis: Source image groups them under logo or typography colors.
  - subject: Vail Digital Blue, Vail Navy, and Vail Yellow
    channels:
    - web
    - email
    - ads
    rule: Treat these as digital accent colors for CTA, website, and online usage rather than core logo-neutral colors.
    source_basis: Source image groups them under CTA, website, or online use only colors.
  - subject: Vail Vintage Blue and Vail Dark Blue
    channels:
    - web
    - email
    - ads
    rule: Preserve these as governed raw families from the primary brand palette, but do not remap the current semantic lanes to them without an explicit follow-up decision.
    source_basis: Source image labels Vail Vintage Blue and Vail Dark Blue as the primary brand colors.
