version: 1
updated: 2026-03-17
brand_id: vail
display_name: Vail
status: active
owners:
  - design_system_governance
supported_channels:
  - web
  - email
  - ads
figma:
  design_system_file_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Foundations?node-id=1-3
  global_collections:
    color_id: VariableCollectionId:23:2
    typography_id: VariableCollectionId:23:3
    dimensions_id: VariableCollectionId:23:4
  semantic_extensions:
    color:
      collection_name: Vail
      collection_id: VariableCollectionId:79:918
      parent_collection: "Semantic: Color"
      parent_collection_id: VariableCollectionId:41:135
    typography:
      collection_name: Vail
      collection_id: VariableCollectionId:38:121
      parent_collection: "Semantic: Typography"
      parent_collection_id: VariableCollectionId:38:114
artifacts:
  color:
    intake_artifact: figma/brands/vail/color/intake.yml
    preview_artifact: figma/brands/vail/color/preview.md
    decision_artifacts:
      - figma/decisions/2026-03-10-brand-color-ramp-governance.md
      - figma/decisions/2026-03-10-brand-color-preview-before-write.md
      - figma/decisions/2026-03-11-initial-semantic-color-family-model.md
      - figma/decisions/2026-03-13-proposed-semantic-role-channel-color-model.md
  typography:
    intake_artifact: figma/brands/vail/typography/intake.yml
    preview_artifact: figma/brands/vail/typography/preview.md
    decision_artifacts:
      - figma/decisions/2026-03-10-brand-typography-governance.md
      - figma/decisions/2026-03-11-role-scoped-semantic-typography-ladders.md
semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: brand
        source_family: vail/digital_blue
        targets:
          - surface/brand/*
          - on_surface/brand/*
          - foreground/brand
          - border/brand
      - scope: brand_secondary
        source_family: vail/navy
        targets:
          - surface/brand_secondary/*
          - on_surface/brand_secondary/*
          - foreground/brand_secondary
          - border/brand_secondary
      - scope: asset_logo
        source_value: Vail
        targets:
          - assets/logo
    inherited_from_base:
      - surface/neutral/*
      - on_surface/neutral/*
      - foreground/default
      - foreground/subtle
      - border/default
      - border/subtle
      - surface/positive/*
      - on_surface/positive/*
      - surface/warning/*
      - on_surface/warning/*
      - surface/critical/*
      - on_surface/critical/*
      - foreground/positive
      - foreground/warning
      - foreground/critical
      - border/positive
      - border/warning
      - border/critical
    notes:
      - The role-based migration rebuilds Vail around `digital_blue` and `navy` while inheriting the shared neutral and status role sets from the base collection.
      - "`assets/logo` is overridden to the string `Vail` in the semantic color extension."
      - "`yellow` remains a governed global family but is no longer promoted into semantic."
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: vail/family/display
      - semantic_token: family/body
        alias_of: vail/family/primary
      - semantic_token: family/action
        alias_of: vail/family/primary
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/*
      - size/*
    notes:
      - Typography weight and size semantics remain on the shared base collection because the approved Vail recipes reuse the universal baseline.
notes:
  - Active Vail brand artifacts now live under figma/brands/vail and are the canonical approved sources.
