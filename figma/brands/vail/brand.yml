semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: brand
        source_family: vail/digital_blue
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: vail/navy
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Vail
        targets:
        - assets/logo
      inherited_from_base:
      - surface/neutral/*
      - surface/neutral/*_inverse
      - foreground/default
      - foreground/default_inverse
      - foreground/subtle
      - foreground/subtle_inverse
      - border/default
      - border/default_inverse
      - border/subtle
      - border/subtle_inverse
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - The role-based migration rebuilds Vail around `digital_blue` and `navy` while inheriting the shared neutral and status role sets from the base collection.
      - "`vintage_blue` and `dark_blue` are preserved as additional raw `_Global: Color` families from the primary Vail brand palette, but they remain outside the current semantic override model."
      - "`assets/logo` is overridden to the string `Vail` in the semantic theme extension."
      - "`yellow` remains a governed global family but is no longer promoted into semantic."
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: vail/family/01
      - semantic_token: family/body
        alias_of: vail/family/02
      - semantic_token: family/action
        alias_of: vail/family/02
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/*
      notes:
      - 'Typography weight semantics remain on the shared semantic theme base collection because the approved Vail recipes reuse the universal baseline. Typography size now binds directly from published `Global: Typography`.'
notes:
- Active Vail brand artifacts now live under figma/brands/vail and are the canonical approved sources.
- Vail now carries five raw color families in `_Global: Color`, with `vintage_blue` and `dark_blue` preserved as raw-only primary brand families while semantic stays aligned to the digital palette.
