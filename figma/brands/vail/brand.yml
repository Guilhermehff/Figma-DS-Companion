  design_system_file_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Foundations?node-id=1-3
  global_collections:
    color_id: VariableCollectionId:23:2
    typography_id: VariableCollectionId:23:3
    dimensions_id: VariableCollectionId:23:4
  semantic_extensions:
    theme:
      collection_name: Vail
      collection_id: VariableCollectionId:79:918
      parent_collection: 'Semantic: Theme'
      parent_collection_id: VariableCollectionId:41:135
artifacts:
  color:
    intake_artifact: figma/brands/vail/color/intake.yml
    preview_artifact: figma/brands/vail/color/preview.md
    decision_artifacts:
    - figma/decisions/2026-03-10-brand-color-ramp-governance.md
    - figma/decisions/2026-03-10-brand-color-preview-before-write.md
    - figma/decisions/2026-03-11-initial-semantic-color-family-model.md
    - figma/decisions/2026-03-13-proposed-semantic-role-channel-color-model.md
    - figma/decisions/2026-03-31-vail-primary-brand-colors-added-to-global.md
    - figma/decisions/2026-03-31-universal-100-900-color-ramp-normalization.md
  typography:
    intake_artifact: figma/brands/vail/typography/intake.yml
    preview_artifact: figma/brands/vail/typography/preview.md
    decision_artifacts:
    - figma/decisions/2026-03-10-brand-typography-governance.md
    - figma/decisions/2026-03-11-role-scoped-semantic-typography-ladders.md
    - figma/decisions/2026-04-01-safe-typography-lane-migration.md
semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: brand
        source_family: vail/digital_blue
        targets:
        - color/surface/brand/*
        - color/surface/brand/*_inverse
        - color/foreground/brand
        - color/foreground/brand_inverse
        - color/border/brand
        - color/border/brand_inverse
      - scope: brand_secondary
        source_family: vail/navy
        targets:
        - color/surface/brand_secondary/*
        - color/surface/brand_secondary/*_inverse
        - color/foreground/brand_secondary
        - color/foreground/brand_secondary_inverse
        - color/border/brand_secondary
        - color/border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Vail
        targets:
        - variables/assets/logo
      inherited_from_base:
      - color/surface/neutral/*
      - color/surface/neutral/*_inverse
      - color/foreground/default
      - color/foreground/default_inverse
      - color/foreground/subtle
      - color/foreground/subtle_inverse
      - color/border/default
      - color/border/default_inverse
      - color/border/subtle
      - color/border/subtle_inverse
      - color/on_surface/brand/*
      - color/on_surface/brand/*_inverse
      - color/on_surface/brand_secondary/*
      - color/on_surface/brand_secondary/*_inverse
      - color/surface/positive/*
      - color/surface/positive/*_inverse
      - color/on_surface/positive/*
      - color/on_surface/positive/*_inverse
      - color/surface/warning/*
      - color/surface/warning/*_inverse
      - color/on_surface/warning/*
      - color/on_surface/warning/*_inverse
      - color/surface/critical/*
      - color/surface/critical/*_inverse
      - color/on_surface/critical/*
      - color/on_surface/critical/*_inverse
      - color/foreground/positive
      - color/foreground/positive_inverse
      - color/foreground/warning
      - color/foreground/warning_inverse
      - color/foreground/critical
      - color/foreground/critical_inverse
      - color/border/positive
      - color/border/positive_inverse
      - color/border/warning
      - color/border/warning_inverse
      - color/border/critical
      - color/border/critical_inverse
      notes:
      - '`color/on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted.'
      - The role-based migration rebuilds Vail around `digital_blue` and `navy` while inheriting the shared neutral and status role sets from the base collection.
      - '`vintage_blue` and `dark_blue` are preserved as additional raw `_Global: Color` families from the primary Vail brand palette, but they remain outside the current semantic override model.'
      - '`variables/assets/logo` is overridden to the string `Vail` in the semantic theme extension.'
      - '`yellow` remains a governed global family but is no longer promoted into semantic.'
    typography:
      override_scopes:
      - semantic_token: typography/family/heading
        alias_of: vail/family/01
      - semantic_token: typography/family/body
        alias_of: vail/family/02
      - semantic_token: typography/family/action
        alias_of: vail/family/02
      - semantic_token: typography/family/heading_safe
        alias_of: vail/family_safe/01
      - semantic_token: typography/family/body_safe
        alias_of: vail/family_safe/01
      - semantic_token: typography/family/action_safe
        alias_of: vail/family_safe/01
      inherited_from_base:
      - typography/weight/heading/base
      - typography/weight/heading/strong
      - typography/weight/body/base
      - typography/weight/body/strong
      - typography/weight/action/base
      notes:
      - 'Typography weight semantics remain on the shared semantic theme base collection because the approved Vail recipes reuse the universal baseline. Typography size now binds directly from published `Global: Typography`.'
      - Brand-safe typography aliases now stage on `vail/family_safe/*` from Vail Resorts Guidelines.pdf.
notes:
- Active Vail brand artifacts now live under figma/brands/vail and are the canonical approved sources.
- Vail now carries five raw color families in `_Global: Color`, with `vintage_blue` and `dark_blue` preserved as raw-only primary brand families while semantic stays aligned to the digital palette.
