primitive_recommendations:
  reuse_existing:
    families: []
    weights:
    - source_weight_label: Regular
      existing_token: universal/weight/normal
      reason: Prompt is documented without a separate governed weight in the PDF, so the first pass uses
        the shared normal weight token.
    sizes:
    - source_size_reference: inherited
      existing_token: universal/size/*
      assumption_status: deferred_no_new_size
      assumption_note: The PDF names the family only and does not govern numeric sizes.
      reason: 'Typography size continues to publish from the shared Global: Typography ladder.'
  proposed_primitives:
    families:
    - token_name: snow_creek/family/01
      source_family_name: Prompt
      source_style_reference: shared family across headline, subheadline, and body
      rationale: One-family system for the first governed pass.
      safe_family_token: ''
      safe_family_note: Multiple approved role-level safe-family mappings apply to this brand family;
        use the semantic safe aliases and role recipes below.
    weights: []
    safe_families:
    - token_name: snow_creek/family_safe/01
      source_family_name: Prompt
      source_role_reference: eyebrow, headline, cta
      rationale: Approved web safe family from Vail Resorts Guidelines.pdf for the eyebrow, headline,
        cta lane.
    - token_name: snow_creek/family_safe/02
      source_family_name: Open Sans
      source_role_reference: body
      rationale: Approved web safe family from Vail Resorts Guidelines.pdf for the body lane.
  hold_for_review: []
semantic_recommendations:
  family_aliases:
  - semantic_token: typography/family/heading
    global_token: snow_creek/family/01
    safe_semantic_token: typography/family/heading_safe
    safe_global_token: snow_creek/family_safe/01
    intended_channels:
    - web
    - email
    - ads
    notes: Safe mapping is staged from Vail Resorts Guidelines.pdf.
  - semantic_token: typography/family/body
    global_token: snow_creek/family/01
    safe_semantic_token: typography/family/body_safe
    safe_global_token: snow_creek/family_safe/02
    intended_channels:
    - web
    - email
    - ads
    notes: Safe mapping is staged from Vail Resorts Guidelines.pdf.
  - semantic_token: typography/family/action
    global_token: snow_creek/family/01
    safe_semantic_token: typography/family/action_safe
    safe_global_token: snow_creek/family_safe/01
    intended_channels:
    - web
    - email
    - ads
    notes: Safe mapping is staged from Vail Resorts Guidelines.pdf.
  weight_aliases:
  - semantic_token: typography/weight/heading/base
    global_token: universal/weight/normal
  - semantic_token: typography/weight/heading/strong
    global_token: universal/weight/normal
  - semantic_token: typography/weight/body/base
    global_token: universal/weight/normal
  - semantic_token: typography/weight/body/strong
    global_token: universal/weight/normal
  - semantic_token: typography/weight/action/base
    global_token: universal/weight/normal
  size_aliases: []
