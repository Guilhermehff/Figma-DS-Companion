artifacts:
  color:
    intake_artifact: figma/brands/snow_creek/color/intake.yml
    preview_artifact: figma/brands/snow_creek/color/preview.md
    decision_artifacts:
    - figma/decisions/2026-03-31-universal-100-900-color-ramp-normalization.md
  typography:
