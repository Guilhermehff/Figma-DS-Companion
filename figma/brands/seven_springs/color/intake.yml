      foreground: white
      ratio: "14.92:1"
      result: pass
    - token: seven_springs/tupelo/950
      foreground: white
      ratio: "17.85:1"
      result: pass
    - token: seven_springs/springs_neutral/50
      foreground: black
      ratio: "20.57:1"
      result: pass
    - token: seven_springs/springs_neutral/200
      foreground: black
      ratio: "13.67:1"
      result: pass
    - token: seven_springs/springs_neutral/800
