        - source_name: Mini Golf Green
          provided_value: "#89ebad"
          anchor_step: 300
          anchor_label: 300_source
    - family: tupelo
      source_name: Tupelo
      provided_value: "#002e1c"
      rationale: Approved live write. Tupelo remains its own dark green family as the separate secondary expressive lane.
      anchor_step: 900
      anchor_label: 900_source
    - family: springs_neutral
      source_name: Grandma's Axe
      provided_value: "#141418"
      rationale: Recommended first pass. Grandma's Axe and Mashed Potatoes behave as a branded neutral system for backgrounds, borders, and readable foregrounds, so they stage most cleanly as one governed neutral ladder.
      anchor_step: 950
      anchor_label: 950_source
      source_anchors:
        - source_name: Mashed Potatoes
          provided_value: "#f6fff7"
          anchor_step: 50
          anchor_label: 50_source
