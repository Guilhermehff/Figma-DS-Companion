validation:
  perceptual_consistency_notes:
    - Springs Green lands at `600` and Mini Golf Green at `300`, keeping the primary Seven Springs green ladder aligned to the supplied lighter and mid-dark brand greens.
    - User-approved interpretation. Tupelo lands at `900` on its own dark-green ladder so the secondary expressive lane stays distinct from the primary Springs Green family.
    - Mashed Potatoes and Grandma's Axe land cleanly at `50` and `950`, so they can support a branded neutral surface and foreground system without inventing extra neutral swatches.
    - The Terrain Park palette is explicitly preserved in the intake but intentionally excluded from the resort-brand raw families because the source says not to treat those colors as Seven Springs brand colors.
  contrast_checks:
    - token: seven_springs/springs_green/700
      foreground: white
      ratio: "6.62:1"
      result: pass
    - token: seven_springs/springs_green/800
      foreground: white
      ratio: "10.45:1"
      result: pass
    - token: seven_springs/springs_green/900
      foreground: white
      ratio: "15.33:1"
      result: pass
    - token: seven_springs/tupelo/800
      foreground: white
      ratio: "11.03:1"
      result: pass
