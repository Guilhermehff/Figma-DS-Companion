semantic_recommendations:
  role_sets:
    - scope: neutral
      source_family: seven_springs/springs_neutral
      rationale: Recommended first pass. Mashed Potatoes and Grandma's Axe are the strongest candidates for branded surfaces, borders, and readable neutral foregrounds.
      targets:
        - surface/neutral/*
        - on_surface/neutral/*
        - foreground/default
        - foreground/subtle
        - border/default
        - border/subtle
    - scope: brand
      source_family: seven_springs/springs_green
      rationale: Approved live write. The governed Seven Springs green ladder is the primary brand-capable expressive lane across web, email, and ads.
      targets:
        - surface/brand/*
        - on_surface/brand/*
        - foreground/brand
        - border/brand
    - scope: brand_secondary
      source_family: seven_springs/tupelo
      rationale: Approved live write. Tupelo is the separate dark green family for the `brand_secondary/*` lane.
      targets:
        - surface/brand_secondary/*
        - on_surface/brand_secondary/*
        - foreground/brand_secondary
        - border/brand_secondary
  global_only_families: []
  role_exceptions:
    - target: assets/logo
      source_token: Seven Springs
      rationale: "The live `Semantic: Theme` schema includes `assets/logo`, and each brand extension should override it to the brand display name string."

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Seven Springs resort versus terrain park colors
      channels:
        - web
        - email
        - ads
      rule: Keep the Terrain Park colors out of the Seven Springs resort-brand write path unless terrain park governance is explicitly requested.
      source_basis: The source explicitly says the Terrain Park colors are not the Seven Springs resort brand colors and should be treated separately.
    - subject: Seven Springs green family staging
      channels:
        - web
        - email
        - ads
      rule: Use `springs_green/*` as the primary expressive lane and `tupelo/*` as the separate secondary expressive lane.
      source_basis: User approval in chat overrode the earlier single-family recommendation for the dark green lane.
    - subject: Seven Springs branded neutral system
      channels:
        - web
        - email
        - ads
      rule: Use `springs_neutral/*` for branded neutral surfaces, borders, and readable foregrounds rather than defaulting back to universal white and black.
      source_basis: Mashed Potatoes and Grandma's Axe are explicit primary resort brand colors, not incidental neutrals.

open_questions: []
