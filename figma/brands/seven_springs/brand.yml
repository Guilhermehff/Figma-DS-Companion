semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: neutral
        source_family: seven_springs/springs_neutral
        targets:
        - surface/neutral/*
        - surface/neutral/*_inverse
        - foreground/default
        - foreground/default_inverse
        - foreground/subtle
        - foreground/subtle_inverse
        - border/default
        - border/default_inverse
        - border/subtle
        - border/subtle_inverse
      - scope: brand
        source_family: seven_springs/springs_green
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: seven_springs/tupelo
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Seven Springs
        targets:
        - assets/logo
      inherited_from_base:
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - "`springs_green` drives the primary expressive semantic lane, while `tupelo` drives the secondary expressive semantic lane."
      - "`springs_neutral` absorbs Mashed Potatoes and Grandma's Axe into one branded neutral lane for surfaces and readable foregrounds."
      - The Seven Springs Terrain Park colors remain out of the resort-brand semantic write path because the source explicitly separates them from the resort brand colors.
      - User-approved exception. The live write uses the explicit `Mini Golf Green` HEX field `#89EBAD` despite the conflicting RGB line in the source image.
      - "`assets/logo` should resolve to the string `Seven Springs` when the live semantic theme extension is written."
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: seven_springs/family/primary
      - semantic_token: family/body
        alias_of: seven_springs/family/primary
      - semantic_token: family/action
        alias_of: seven_springs/family/primary
      - semantic_token: weight/heading/base
        alias_of: universal/weight/black
      - semantic_token: weight/heading/strong
        alias_of: universal/weight/bold
      - semantic_token: weight/body/base
        alias_of: universal/weight/medium
      - semantic_token: weight/action/base
        alias_of: universal/weight/black
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/body/strong
      notes:
      - Seven Springs uses one family, `Hoss Sharp`, across headline, subhead, body, and CTA roles, with weight and layout behavior carrying the hierarchy.
      - "`weight/heading/strong = bold` stages the Hoss Sharp Bold subhead treatment through the existing semantic ladder."
      - "`Heavy` stages on `universal/weight/black` because the shared raw typography ladder has no dedicated heavy primitive."
notes:
- Seven Springs is live in the Foundations file with three raw color families, one raw typography family primitive, a semantic theme logo-name override, and Seven Springs semantic theme extension.
