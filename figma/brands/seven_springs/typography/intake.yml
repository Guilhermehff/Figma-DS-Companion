      notes: Body copy stays on Hoss Sharp with Medium carrying the reading tone.
    - semantic_token: family/action
      global_token: seven_springs/family/primary
      safe_semantic_token: family/action_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
      notes: CTA stays on Hoss Sharp.
  weight_aliases:
    - semantic_token: weight/heading/base
      global_token: universal/weight/black
      intended_channels:
        - web
        - email
        - ads
      notes: Headlines explicitly use Black.
    - semantic_token: weight/heading/strong
      global_token: universal/weight/bold
      intended_channels:
        - web
        - email
        - ads
      notes: Approved live write. Subheads stage through the stronger heading emphasis slot because the current semantic typography schema has no dedicated subhead role.
    - semantic_token: weight/body/base
      global_token: universal/weight/medium
      intended_channels:
        - web
        - email
        - ads
      notes: Body copy explicitly uses Medium.
    - semantic_token: weight/action/base
      global_token: universal/weight/black
      intended_channels:
        - web
        - email
        - ads
      notes: CTA uses Heavy in the source and stages on the strongest existing raw weight because there is no separate shared heavy primitive.
  size_aliases: []

