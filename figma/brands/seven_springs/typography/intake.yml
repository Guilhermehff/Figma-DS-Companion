primitive_recommendations:
  reuse_existing:
    families: []
    weights:
      - source_weight_label: Black
        existing_token: universal/weight/black
        reason: Direct match for the headline treatment.
      - source_weight_label: Bold
        existing_token: universal/weight/bold
        reason: Direct match for the subhead treatment.
      - source_weight_label: Medium
        existing_token: universal/weight/medium
        reason: Direct match for the body copy treatment.
      - source_weight_label: Heavy
        existing_token: universal/weight/black
        reason: The shared raw typography ladder has no dedicated heavy primitive, so the approved default staging path is to map Heavy to the strongest existing raw weight.
    sizes:
      - source_size_reference: headline default
        existing_token: inherited current heading ladder
        assumption_status: deferred_no_new_size
        assumption_note: The source defines family, weight, alignment, and leading behavior, but not governed numeric sizes.
        reason: Live semantic size aliases can remain inherited in the first pass.
      - source_size_reference: body default
        existing_token: inherited current body ladder
        assumption_status: deferred_no_new_size
        assumption_note: The source defines family, weight, alignment, and leading behavior, but not governed numeric sizes.
        reason: Live semantic size aliases can remain inherited in the first pass.
      - source_size_reference: cta default
        existing_token: inherited current action ladder
        assumption_status: deferred_no_new_size
        assumption_note: The source defines family, weight, alignment, and leading behavior, but not governed numeric sizes.
        reason: Live semantic size aliases can remain inherited in the first pass.
  proposed_primitives:
    families:
      - token_name: seven_springs/family/primary
        source_family_name: Hoss Sharp
        source_style_reference: Black headline, Bold subhead, Medium body, and Heavy CTA system
        rationale: Seven Springs uses one type family across headline, subhead, body, and CTA roles, with weight and layout behavior carrying the hierarchy.
        fallback_token: universal/family/web_safe
        fallback_note: The source does not define a fallback stack.
    weights: []
  hold_for_review: []

