validation:
  extraction_notes:
    - The source is explicit about family choice, weight, tracking, kerning behavior, alignment behavior, and relative leading.
    - The source does not provide governed numeric sizes, so live size aliases can remain inherited in the first pass.
  governance_notes:
    - The proposed live mapping stays inside the current semantic typography schema by using one family and weight-driven hierarchy.
    - "`Heavy` stages on `universal/weight/black` because the shared raw ladder has no dedicated heavy primitive."
    - User-approved live interpretation. The Seven Springs Bold subhead recipe stages through `weight/heading/strong` because the current schema has no dedicated subhead role.

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Seven Springs Hoss Sharp family
      channels:
        - web
        - email
        - ads
      rule: Keep headline, subhead, body, and CTA work on the Hoss Sharp family, with weight and layout behavior carrying the hierarchy.
      source_basis: Seven Springs typography guidance image.
    - subject: Seven Springs heading and CTA weights
      channels:
        - web
        - email
        - ads
      rule: Stage headline Black and CTA Heavy on `universal/weight/black` in the first pass.
      source_basis: The source explicitly names Black for headlines and Heavy for CTAs, and the shared raw ladder currently tops out at Black.
    - subject: Seven Springs body copy treatment
      channels:
        - web
        - email
        - ads
      rule: Keep body copy on `Hoss Sharp Medium` with 0px tracking, optical kerning, and 1.2x leading.
      source_basis: Seven Springs typography guidance image.

