color_proportion_guidance:
  status: active
  source_basis: The user-provided Mount Sunapee color-usage page gives a stacked distribution graphic and explicit text saying white space should lead, primary brand colors should follow, and secondary colors should remain accent-only. Exact percentages are not published.
  contexts:
  - name: brand_touchpoints
    intent: White space leads. Lake Sunapee and Cold Wax carry the main brand presence. Golden Hour, Snow Gun, and Verde Slate remain accent-level support and should not dominate on their own.
    proportions:
    - source_color: White Space
      token: universal/white
      percentage: 45
      rationale: Largest field in the distribution graphic and explicitly called out as the leading emphasis.
    - source_color: Lake Sunapee
      token: mount_sunapee/sunapee_neutral/800
      percentage: 25
      rationale: Strongest non-white structural block in the distribution graphic.
    - source_color: Cold Wax
      token: mount_sunapee/cold_wax/500
      percentage: 15
      rationale: Most prominent saturated primary brand color after the structural white and dark field.
    - source_color: Golden Hour
      token: mount_sunapee/golden_hour/300
      percentage: 8
      rationale: Warm accent strip in the guidance graphic.
    - source_color: Snow Gun
      token: mount_sunapee/sunapee_neutral/200
      percentage: 4
      rationale: Light secondary accent strip in the source graphic.
    - source_color: Verde Slate
      token: mount_sunapee/sunapee_neutral/400
      percentage: 3
      rationale: Smallest muted support strip in the source graphic.
    notes:
    - These percentages are approximate documentation guidance derived from the stacked source graphic plus the accompanying text.
    - The source also says secondary colors should be used only as accents and should never dominate a design.
validation:
  perceptual_consistency_notes:
  - Snow Gun, Verde Slate, and Lake Sunapee align well as a single low-chroma structural family from light canvas-adjacent surfaces through muted mid-tone borders to the dark readable default foreground.
  - Cold Wax remains the cleanest cool expressive family once the structural neutral system is separated from the accent lanes.
  - Golden Hour lands naturally as a bright warm accent and still yields dark enough deeper steps for semantic default and emphasis roles.
  - User-approved live write. The semantic color extension keeps `surface/neutral/canvas` on the branded `sunapee_neutral/200` step rather than leaving canvas on shared white.
  - User-approved live write. The brand lane stages on `cold_wax/700`, `800`, and `900`, and the supporting expressive lane stages on `golden_hour/600`, `700`, and `800` so white on-surface text remains readable.
  contrast_checks:
  - token: mount_sunapee/sunapee_neutral/800
    foreground: white
    ratio: 12.60:1
    result: pass
  - token: mount_sunapee/cold_wax/800
    foreground: white
    ratio: 10.35:1
    result: pass
  - token: mount_sunapee/golden_hour/800
    foreground: white
    ratio: 11.32:1
    result: pass
semantic_recommendations:
  role_sets:
  - scope: neutral
    source_family: mount_sunapee/sunapee_neutral
    rationale: Approved live write. The usage guidance gives structural weight to white space, the dark Lake tone, and subdued supporting colors more than to a classic gray system, so one branded neutral family is the cleanest governed fit.
    targets:
    - surface/neutral/*
    - on_surface/neutral/*
    - foreground/default
    - foreground/subtle
    - border/default
    - border/subtle
  - scope: brand
    source_family: mount_sunapee/cold_wax
    rationale: Approved live write. Cold Wax is the strongest remaining cool accent once the neutral family is established, with semantic `default/strong/emphasis` staging on `700/800/900`.
    targets:
    - surface/brand/*
    - on_surface/brand/*
    - foreground/brand
    - border/brand
  - scope: brand_secondary
    source_family: mount_sunapee/golden_hour
    rationale: Approved live write. Golden Hour remains the warm supporting accent lane, with semantic `default/strong/emphasis` staging on `600/700/800`.
    targets:
    - surface/brand_secondary/*
    - on_surface/brand_secondary/*
    - foreground/brand_secondary
    - border/brand_secondary
  global_only_families: []
  role_exceptions: []
review_readiness:
  intended_review_channels:
  - web
  - email
  - ads
  review_rules:
  - subject: Mount Sunapee structural neutral system
    channels:
    - web
    - email
    - ads
    rule: Keep Snow Gun, Verde Slate, and Lake Sunapee in one branded structural lane so the dominant page white, the muted support tones, and the dark readable foreground stay governed together.
    source_basis: The color-usage page gives white and the dark Lake Sunapee tone the largest structural share and places the lower-chroma secondary colors in support roles.
  - subject: Mount Sunapee expressive lane order
    channels:
    - web
    - email
    - ads
    rule: Use Cold Wax as the primary expressive lane and Golden Hour as the supporting expressive lane in the first pass.
    source_basis: After accounting for the structural neutral system, Cold Wax and Golden Hour remain the two distinct accent hues in the source palette.
