semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: neutral
        source_family: mount_sunapee/sunapee_neutral
        targets:
        - surface/neutral/*
        - surface/neutral/*_inverse
        - foreground/default
        - foreground/default_inverse
        - foreground/subtle
        - foreground/subtle_inverse
        - border/default
        - border/default_inverse
        - border/subtle
        - border/subtle_inverse
      - scope: brand
        source_family: mount_sunapee/cold_wax
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: mount_sunapee/golden_hour
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Mount Sunapee
        targets:
        - assets/logo
      inherited_from_base:
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - Mount Sunapee is live in the Foundations file with `sunapee_neutral` as the structural neutral lane, `cold_wax` as the primary expressive lane, and `golden_hour` as the supporting expressive lane.
      - User-approved live write. `sunapee_neutral` absorbs Snow Gun, Verde Slate, and Lake Sunapee into one structural family because the source usage guidance gives the white canvas, the dark Lake block, and the muted support tones more structural weight than a classic gray-neutral system.
      - User-approved live write. `surface/brand/default`, `surface/brand/strong`, and `surface/brand/emphasis` stage on `mount_sunapee/cold_wax/700`, `800`, and `900` so the shared white on-surface contract holds on brand surfaces.
      - User-approved live write. `surface/brand_secondary/default`, `surface/brand_secondary/strong`, and `surface/brand_secondary/emphasis` stage on `mount_sunapee/golden_hour/600`, `700`, and `800` so the supporting expressive lane also holds the shared white on-surface contract.
      - "`assets/logo` resolves to the string `Mount Sunapee` in the semantic theme extension."
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: mount_sunapee/family/01
      - semantic_token: family/body
        alias_of: mount_sunapee/family/01
      - semantic_token: weight/heading/base
        alias_of: universal/weight/bold
      - semantic_token: weight/body/base
        alias_of: universal/weight/light
      - semantic_token: weight/body/strong
        alias_of: universal/weight/normal
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action
      - family/action_safe
      - weight/action/*
      notes:
      - Mount Sunapee is live as a Graphik-led typography system with `family/heading` and `family/body` both mapped to `mount_sunapee/family/01`.
      - User-approved live write. `Neutraface Text Bold Italic` is preserved as the raw `mount_sunapee/family/02` primitive because the current semantic theme typography schema has no dedicated subhead family lane.
      - "`weight/heading/base = universal/weight/bold`, `weight/body/base = universal/weight/light`, and `weight/body/strong = universal/weight/normal` stage the explicit H1, H2, and body hierarchy through the current semantic theme typography ladder."
      - The source does not define a CTA or action recipe, so the action lane remains inherited in the live semantic extension.
notes:
- Mount Sunapee is live in the Foundations file with three raw color families, two raw typography family primitives, a semantic theme logo-name override, and Mount Sunapee semantic theme extension.
