semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: brand
        source_family: mount_sunapee/cold_wax
        targets:
        - color/surface/brand/*
        - color/surface/brand/*_inverse
        - color/foreground/brand
        - color/foreground/brand_inverse
        - color/border/brand
        - color/border/brand_inverse
      - scope: brand_secondary
        source_family: mount_sunapee/golden_hour
        targets:
        - color/surface/brand_secondary/*
        - color/surface/brand_secondary/*_inverse
        - color/foreground/brand_secondary
        - color/foreground/brand_secondary_inverse
        - color/border/brand_secondary
        - color/border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Mount Sunapee
        targets:
        - variables/assets/logo
      inherited_from_base:
      - color/surface/neutral/*
      - color/surface/neutral/*_inverse
      - color/foreground/default
      - color/foreground/default_inverse
      - color/foreground/subtle
      - color/foreground/subtle_inverse
      - color/border/default
      - color/border/default_inverse
      - color/border/subtle
      - color/border/subtle_inverse
      - color/on_surface/brand/*
      - color/on_surface/brand/*_inverse
      - color/on_surface/brand_secondary/*
      - color/on_surface/brand_secondary/*_inverse
      - color/surface/positive/*
      - color/surface/positive/*_inverse
      - color/on_surface/positive/*
      - color/on_surface/positive/*_inverse
      - color/surface/warning/*
      - color/surface/warning/*_inverse
      - color/on_surface/warning/*
      - color/on_surface/warning/*_inverse
      - color/surface/critical/*
      - color/surface/critical/*_inverse
      - color/on_surface/critical/*
      - color/on_surface/critical/*_inverse
      - color/foreground/positive
      - color/foreground/positive_inverse
      - color/foreground/warning
      - color/foreground/warning_inverse
      - color/foreground/critical
      - color/foreground/critical_inverse
      - color/border/positive
      - color/border/positive_inverse
      - color/border/warning
      - color/border/warning_inverse
      - color/border/critical
      - color/border/critical_inverse
      notes:
      - '`color/on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted.'
      - Mount Sunapee is live in the Foundations file with `sunapee_neutral` as the structural neutral lane, `cold_wax` as the primary expressive lane, and `golden_hour` as the supporting expressive lane.
      - User-approved live write. `sunapee_neutral` absorbs Snow Gun, Verde Slate, and Lake Sunapee into one structural family because the source usage guidance gives the white canvas, the dark Lake block, and the muted support tones more structural weight than a classic gray-neutral system.
      - User-approved live write. `color/surface/brand/default`, `color/surface/brand/strong`, and `color/surface/brand/emphasis` stage on `mount_sunapee/cold_wax/700`, `800`, and `900` so the shared white on-surface contract holds on brand surfaces.
      - User-approved live write. `color/surface/brand_secondary/default`, `color/surface/brand_secondary/strong`, and `color/surface/brand_secondary/emphasis` stage on `mount_sunapee/golden_hour/600`, `700`, and `800` so the supporting expressive lane also holds the shared white on-surface contract.
      - '`variables/assets/logo` resolves to the string `Mount Sunapee` in the semantic theme extension.'
    typography:
      override_scopes:
      - semantic_token: typography/family/heading
        alias_of: mount_sunapee/family/01
      - semantic_token: typography/family/body
        alias_of: mount_sunapee/family/01
      - semantic_token: typography/family/action
        alias_of: mount_sunapee/family/01
      - semantic_token: typography/weight/body/base
        alias_of: universal/weight/light
      - semantic_token: typography/weight/body/strong
        alias_of: universal/weight/normal
      - semantic_token: typography/family/heading_safe
        alias_of: mount_sunapee/family_safe/01
      - semantic_token: typography/family/body_safe
        alias_of: mount_sunapee/family_safe/02
      - semantic_token: typography/family/action_safe
        alias_of: mount_sunapee/family_safe/01
      inherited_from_base:
      - typography/weight/heading/base
      - typography/weight/heading/strong
      - typography/weight/action/base
      notes:
      - Mount Sunapee is live as a Graphik-led typography system with `typography/family/heading` and `typography/family/body` both mapped to `mount_sunapee/family/01`.
      - User-approved live write. `Neutraface Text` is preserved as the raw `mount_sunapee/family/02` primitive because the current semantic theme typography schema has no dedicated subhead family lane.
      - '`typography/weight/body/base = universal/weight/light` and `typography/weight/body/strong = universal/weight/normal` stage the explicit body hierarchy through the current semantic theme typography ladder, while heading weights inherit from base.'
      - The source does not define a distinct CTA weight recipe, so `typography/family/action` follows the shared Graphik family while `typography/weight/action/*` remains inherited in the live semantic extension.
      - Brand-safe typography aliases now stage on `mount_sunapee/family_safe/*` from Vail Resorts Guidelines.pdf.
notes:
- Mount Sunapee is live in the Foundations file with three raw color families, two raw typography family primitives, a semantic theme logo-name override, and Mount Sunapee semantic theme extension.
