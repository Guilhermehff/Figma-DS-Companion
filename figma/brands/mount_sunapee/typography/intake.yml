primitive_recommendations:
  reuse_existing:
    families: []
    weights:
      - source_weight_label: Bold
        existing_token: universal/weight/bold
        reason: Direct match for Graphik Bold in the H1 lane.
      - source_weight_label: Regular
        existing_token: universal/weight/normal
        reason: Direct match for Graphik Regular in the H2 lane.
      - source_weight_label: Light
        existing_token: universal/weight/light
        reason: Direct match for Graphik Light in the body lane.
    sizes:
      - source_size_reference: headline default
        existing_token: inherited current heading ladder
        assumption_status: deferred_no_new_size
        assumption_note: The source names roles and tracking only, without governed numeric sizes.
        reason: Live semantic size aliases can remain inherited in the first pass.
      - source_size_reference: secondary header default
        existing_token: inherited current heading and body ladders
        assumption_status: deferred_no_new_size
        assumption_note: The source names roles and tracking only, without governed numeric sizes.
        reason: No new raw size values are justified yet.
      - source_size_reference: body default
        existing_token: inherited current body ladder
        assumption_status: deferred_no_new_size
        assumption_note: The source names roles and tracking only, without governed numeric sizes.
        reason: Live semantic size aliases can remain inherited in the first pass.
  proposed_primitives:
    families:
      - token_name: mount_sunapee/family/primary
        source_family_name: Graphik
        source_style_reference: Bold, Regular, and Light across H1, H2, and body copy
        rationale: Graphik is the repeated Mount Sunapee typography system across both display and reading roles, with weight carrying the hierarchy.
        fallback_token: universal/family/web_safe
        fallback_note: The source does not define a fallback stack.
      - token_name: mount_sunapee/family/utility
        source_family_name: Neutraface Text Bold Italic
        source_style_reference: Bold Italic subheader system
        rationale: Approved live write. Preserve the distinct H3 subheader face as a raw utility family until the semantic typography schema gains a dedicated subhead lane.
        fallback_token: universal/family/web_safe
        fallback_note: The source does not define a fallback stack.
    weights: []
  hold_for_review: []

semantic_recommendations:
  family_aliases:
    - semantic_token: family/heading
      global_token: mount_sunapee/family/primary
      safe_semantic_token: family/heading_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
      notes: Graphik drives the H1 and H2 heading hierarchy.
    - semantic_token: family/body
      global_token: mount_sunapee/family/primary
      safe_semantic_token: family/body_safe
      safe_global_token: universal/family/web_safe
      intended_channels:
        - web
        - email
        - ads
      notes: Graphik also drives the reading-copy lane.
  weight_aliases:
    - semantic_token: weight/heading/base
      global_token: universal/weight/bold
      intended_channels:
        - web
        - email
        - ads
      notes: H1 explicitly uses Graphik Bold.
    - semantic_token: weight/body/base
      global_token: universal/weight/light
      intended_channels:
        - web
        - email
        - ads
      notes: Body copy explicitly uses Graphik Light.
    - semantic_token: weight/body/strong
      global_token: universal/weight/normal
      intended_channels:
        - web
        - email
        - ads
      notes: Approved live write. Graphik Regular stages the H2 secondary-header recipe through the stronger body emphasis slot because the current semantic typography schema has no dedicated secondary-heading weight lane.
  size_aliases: []

