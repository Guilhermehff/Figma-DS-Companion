validation:
  extraction_notes:
    - The source is explicit about family choice, role names, and tracking labels, but not about governed numeric sizes or leading.
    - Mount Sunapee uses one repeated Graphik family across H1, H2, and body, with a separate Neutraface Text utility face only for H3 subheaders.
  governance_notes:
    - Graphik stages cleanly as the shared heading and body family, with weight carrying the hierarchy between H1, H2, and body.
    - User-approved live write. The distinct Neutraface Text Bold Italic H3 treatment is preserved as a raw utility family rather than forced into a semantic slot that would misrepresent the primary Graphik system.
    - The source does not define a CTA or action recipe, so the action family and weight remain inherited in the live semantic extension.

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Mount Sunapee Graphik system
      channels:
        - web
        - email
        - ads
      rule: Keep H1 on Graphik Bold, H2 on Graphik Regular, and body copy on Graphik Light.
      source_basis: Mount Sunapee typography image.
    - subject: Mount Sunapee H3 lane
      channels:
        - web
        - email
        - ads
      rule: Preserve Neutraface Text Bold Italic as a distinct raw subheader recipe rather than forcing it into the primary Graphik semantic family mapping.
      source_basis: Mount Sunapee typography image and application example.

