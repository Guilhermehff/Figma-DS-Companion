semantic_overrides:
  color:
    status: active
    override_scopes:
      - semantic_slot: brand
        raw_family: kirkwood/orange_021_c
      - semantic_slot: brand_secondary
        raw_family: kirkwood/blue_648_c
      - semantic_slot: brand_tertiary
        raw_family: kirkwood/teal_633_c
      - semantic_slot: neutral
        raw_family: kirkwood/cool_gray
    inherited_from_base:
      - positive/*
      - warning/*
      - negative/*
    notes:
      - Kirkwood's `642 C` pale blue is intentionally absorbed into the branded neutral ladder rather than creating a fourth semantic accent family.
      - Exact white and black are preserved inside the neutral ladder because the supplied foundational palette treats them as a governed brand system alongside the cool grays.
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: kirkwood/family/primary
      - semantic_token: family/body
        alias_of: kirkwood/family/secondary
      - semantic_token: family/action
        alias_of: kirkwood/family/action
      - semantic_token: weight/heading/base
        alias_of: universal/weight/bold
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: weight/action/base
        alias_of: universal/weight/bold
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/heading/strong
      - weight/body/strong
      - size/*
    notes:
      - Trade Gothic Bold Condensed No. 20 drives the headline lane, Avenir Next remains the reading family, and Futura Bold stages as the action-emphasis family.
      - `kirkwood/family/utility` preserves Trade Gothic Condensed No. 18 as a raw primitive because the current semantic typography schema has no stable fourth family slot for limited-space emphasis.
notes:
  - Kirkwood is live in the Design System file with four raw color families, four raw typography family primitives, and semantic color and typography extensions.
  - Governance exception: the Kirkwood write occurred before preview review was completed, so the decision log and preview artifacts explicitly record the sequencing defect.
