semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: neutral
        source_family: kirkwood/cool_gray
        targets:
        - surface/neutral/*
        - surface/neutral/*_inverse
        - foreground/default
        - foreground/default_inverse
        - foreground/subtle
        - foreground/subtle_inverse
        - border/default
        - border/default_inverse
        - border/subtle
        - border/subtle_inverse
      - scope: brand
        source_family: kirkwood/orange_021_c
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: kirkwood/blue_648_c
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Kirkwood
        targets:
        - assets/logo
      inherited_from_base:
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - '`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black`
        or `universal/white` and are not hue-tinted.'
      - Kirkwood's `642 C` pale blue remains absorbed into the neutral role set rather than creating a
        third expressive semantic lane.
      - '`teal_633_c` remains global-only after the role-based migration.'
      - '`assets/logo` is overridden to the string `Kirkwood` in the semantic theme extension.'
      - Exact white and black stay inherited through the shared role recipes.
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: kirkwood/family/01
      - semantic_token: family/body
        alias_of: kirkwood/family/02
      - semantic_token: family/action
        alias_of: kirkwood/family/03
      - semantic_token: weight/heading/base
        alias_of: universal/weight/bold
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: weight/action/base
        alias_of: universal/weight/bold
      - semantic_token: family/heading_safe
        alias_of: kirkwood/family_safe/01
      - semantic_token: family/body_safe
        alias_of: kirkwood/family_safe/02
      - semantic_token: family/action_safe
        alias_of: kirkwood/family_safe/01
      inherited_from_base:
      - weight/heading/strong
      - weight/body/strong
      notes:
      - Trade Gothic Condensed No. 20 drives the headline lane, Avenir Next remains the reading family,
        and Futura stages as the action-emphasis family.
      - '`kirkwood/family/04` preserves Trade Gothic Condensed No. 18 as an extra raw primitive outside
        the current semantic theme alias set; the neutral slot remains available for future approved mappings
        without encoding role meaning into the global layer.'
      - Brand-safe typography aliases now stage on `kirkwood/family_safe/*` from Vail Resorts Guidelines.pdf.
notes:
- Kirkwood is live in the Foundations file with four raw color families, four raw typography family primitives,
  a semantic theme logo-name override, and semantic theme extension.
- Governance exception: the Kirkwood write occurred before preview review was completed, so the decision
    log and preview artifacts explicitly record the sequencing defect.
