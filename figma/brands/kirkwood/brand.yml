semantic_overrides:
  color:
    status: active
    override_scopes:
      - scope: neutral
        source_family: kirkwood/cool_gray
        targets:
          - surface/neutral/*
          - on_surface/neutral/*
          - foreground/default
          - foreground/subtle
          - border/default
          - border/subtle
      - scope: brand
        source_family: kirkwood/orange_021_c
        targets:
          - surface/brand/*
          - on_surface/brand/*
          - foreground/brand
          - border/brand
      - scope: brand_secondary
        source_family: kirkwood/blue_648_c
        targets:
          - surface/brand_secondary/*
          - on_surface/brand_secondary/*
          - foreground/brand_secondary
          - border/brand_secondary
    inherited_from_base:
      - foreground/inverse
      - surface/positive/*
      - on_surface/positive/*
      - surface/warning/*
      - on_surface/warning/*
      - surface/critical/*
      - on_surface/critical/*
      - foreground/positive
      - foreground/warning
      - foreground/critical
      - border/positive
      - border/warning
      - border/critical
    notes:
      - Kirkwood's `642 C` pale blue remains absorbed into the neutral role set rather than creating a third expressive semantic lane.
      - "`teal_633_c` remains global-only after the role-based migration."
      - Exact white and black stay inherited through the shared role recipes.
  typography:
    status: active
    override_scopes:
      - semantic_token: family/heading
        alias_of: kirkwood/family/primary
      - semantic_token: family/body
        alias_of: kirkwood/family/secondary
      - semantic_token: family/action
        alias_of: kirkwood/family/action
      - semantic_token: weight/heading/base
        alias_of: universal/weight/bold
      - semantic_token: weight/body/base
        alias_of: universal/weight/normal
      - semantic_token: weight/action/base
        alias_of: universal/weight/bold
    inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/heading/strong
      - weight/body/strong
      - size/*
    notes:
      - Trade Gothic Bold Condensed No. 20 drives the headline lane, Avenir Next remains the reading family, and Futura Bold stages as the action-emphasis family.
      - "`kirkwood/family/utility` preserves Trade Gothic Condensed No. 18 as a raw primitive because the current semantic typography schema has no stable fourth family slot for limited-space emphasis."
notes:
  - Kirkwood is live in the Design System file with four raw color families, four raw typography family primitives, and semantic color and typography extensions.
  - Governance exception: the Kirkwood write occurred before preview review was completed, so the decision log and preview artifacts explicitly record the sequencing defect.
