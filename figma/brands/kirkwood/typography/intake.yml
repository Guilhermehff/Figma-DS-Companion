validation:
  extraction_notes:
  - The source is explicit about family choice, case behavior, and leading rules, but not about numeric
    type sizes beyond the 16 pt cap for body copy.
  - Kirkwood uses four distinct named families or family-styles across the supplied guidance, which exceeds
    the current three-lane semantic family schema.
  governance_notes:
  - Futura Bold is staged into `family/action` because it best fits short emphatic copy that can appear
    in title case or all caps.
  - Trade Gothic Condensed No. 18 is preserved as a raw primitive only, avoiding a silent semantic schema
    expansion.
  - Brand-safe typography aliases now stage on `kirkwood/family_safe/*` from Vail Resorts Guidelines.pdf.
review_readiness:
  intended_review_channels:
  - web
  - email
  - ads
  review_rules:
  - subject: Kirkwood headline lane
    channels:
    - web
    - email
    - ads
    rule: Use Trade Gothic Bold Condensed No. 20 in all caps for primary display headlines.
    source_basis: Kirkwood typography image headline guidance.
  - subject: Kirkwood body lane
    channels:
    - web
    - email
    - ads
    rule: Use Avenir Next Regular in sentence case only, with loose leading at 150 percent and a max size
      of 16 pt.
    source_basis: Kirkwood typography image body guidance.
  - subject: Kirkwood short emphasis lane
    channels:
    - web
    - email
    - ads
    rule: Stage Futura Bold as the semantic action family and preserve Trade Gothic Condensed No. 18 as
      a raw utility family until a fourth semantic lane is approved.
    source_basis: Kirkwood typography image and current semantic schema limits.
open_questions: []
