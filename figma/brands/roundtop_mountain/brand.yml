version: 1
updated: '2026-03-26'
brand_id: roundtop_mountain
display_name: Roundtop Mountain
status: active
owners:
- design_system_governance
supported_channels:
- web
- email
- ads
figma:
  design_system_file_url: https://www.figma.com/design/70O01X6MWNKMpsLqIke99Q/Foundations?node-id=1-3
  global_collections:
    color_id: VariableCollectionId:23:2
    typography_id: VariableCollectionId:23:3
    dimensions_id: VariableCollectionId:23:4
  semantic_extensions:
    theme:
      collection_name: Roundtop Mountain
      collection_id: VariableCollectionId:205:717
      parent_collection: 'Semantic: Theme'
      parent_collection_id: VariableCollectionId:41:135
artifacts:
  color:
    intake_artifact: figma/brands/roundtop_mountain/color/intake.yml
    preview_artifact: figma/brands/roundtop_mountain/color/preview.md
    decision_artifacts: []
  typography:
    intake_artifact: figma/brands/roundtop_mountain/typography/intake.yml
    preview_artifact: figma/brands/roundtop_mountain/typography/preview.md
    decision_artifacts: []
semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
      - scope: brand
        source_family: roundtop_mountain/green
        targets:
        - surface/brand/*
        - surface/brand/*_inverse
        - on_surface/brand/*
        - on_surface/brand/*_inverse
        - foreground/brand
        - foreground/brand_inverse
        - border/brand
        - border/brand_inverse
      - scope: brand_secondary
        source_family: roundtop_mountain/blue
        targets:
        - surface/brand_secondary/*
        - surface/brand_secondary/*_inverse
        - on_surface/brand_secondary/*
        - on_surface/brand_secondary/*_inverse
        - foreground/brand_secondary
        - foreground/brand_secondary_inverse
        - border/brand_secondary
        - border/brand_secondary_inverse
      - scope: asset_logo
        source_value: Roundtop Mountain
        targets:
        - assets/logo
      inherited_from_base:
      - surface/neutral/*
      - surface/neutral/*_inverse
      - foreground/default
      - foreground/default_inverse
      - foreground/subtle
      - foreground/subtle_inverse
      - border/default
      - border/default_inverse
      - border/subtle
      - border/subtle_inverse
      - surface/positive/*
      - surface/positive/*_inverse
      - on_surface/positive/*
      - on_surface/positive/*_inverse
      - surface/warning/*
      - surface/warning/*_inverse
      - on_surface/warning/*
      - on_surface/warning/*_inverse
      - surface/critical/*
      - surface/critical/*_inverse
      - on_surface/critical/*
      - on_surface/critical/*_inverse
      - foreground/positive
      - foreground/positive_inverse
      - foreground/warning
      - foreground/warning_inverse
      - foreground/critical
      - foreground/critical_inverse
      - border/positive
      - border/positive_inverse
      - border/warning
      - border/warning_inverse
      - border/critical
      - border/critical_inverse
      notes:
      - "`on_surface/*` tokens in the live semantic theme extension are contrast-derived from `universal/black` or `universal/white` and are not hue-tinted."
      - "`green` drives the primary expressive lane and `blue` drives the secondary expressive lane."
      - "`yellow`, `orange`, `red`, and `cyan` remain governed raw-only families in the first pass."
    typography:
      override_scopes:
      - semantic_token: family/heading
        alias_of: roundtop_mountain/family/primary
      - semantic_token: family/body
        alias_of: roundtop_mountain/family/primary
      - semantic_token: family/action
        alias_of: roundtop_mountain/family/primary
      inherited_from_base:
      - family/heading_safe
      - family/body_safe
      - family/action_safe
      - weight/*
      notes:
      - Roundtop Mountain adds a governed raw family token with the same string value as `universal/family/primary`.
notes:
- Roundtop Mountain is live in the Foundations file with six raw color families, one mirrored raw typography family primitive, and Roundtop Mountain semantic theme extension.
