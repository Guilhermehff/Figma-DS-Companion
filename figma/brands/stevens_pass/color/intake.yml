validation:
  perceptual_consistency_notes:
    - Stevens Blue lands at `700` because the supplied swatch is already a dark, high-contrast primary brand blue.
    - Secondary Blue lands at `800` because the supplied swatch is materially darker than Stevens Blue and behaves as a strong secondary dark lane.
    - Mossy Green lands at `600` because the supplied swatch reads as a mid-dark accent rather than a neutral.
    - Exact black and white should remain shared through `universal/black` and `universal/white`.
  contrast_checks:
    - token: stevens_pass/stevens_blue/700
      foreground: white
      ratio: "6.26:1"
      result: pass
    - token: stevens_pass/secondary_blue/800
      foreground: white
      ratio: "10.18:1"
      result: pass
    - token: stevens_pass/mossy_green/600
      foreground: white
      ratio: "4.82:1"
      result: pass
    - token: stevens_pass/stevens_blue/100
      foreground: black
      ratio: "18.39:1"
      result: pass

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Stevens Pass black and white
      channels:
        - web
        - email
        - ads
      rule: Reuse universal black and universal white instead of creating duplicate Stevens Pass exact tokens.
      source_basis: The supplied palette exactly matches the governed universal values.
    - subject: Stevens Pass expressive lane order
      channels:
        - web
        - email
        - ads
      rule: Use Stevens Blue as the primary expressive lane and Secondary Blue as the second expressive lane; keep Mossy Green governed global-only unless a later review promotes it.
      source_basis: The source marks Stevens Blue as a primary swatch and the other two as secondary or special-case palette colors.

