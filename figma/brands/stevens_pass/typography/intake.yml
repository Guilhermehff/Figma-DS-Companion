primitive_recommendations:
  reuse_existing:
    families: []
    weights:
      - source_weight_label: Bold
        existing_token: universal/weight/bold
        reason: Direct match for the headline lane.
      - source_weight_label: Semi Bold
        existing_token: universal/weight/semibold
        reason: Direct match for the subhead lane.
      - source_weight_label: Medium
        existing_token: universal/weight/medium
        reason: Direct match for one allowed body weight.
      - source_weight_label: Regular
        existing_token: universal/weight/normal
        reason: Direct match for CTA and one allowed body weight.
      - source_weight_label: Light
        existing_token: universal/weight/light
        reason: Direct match for one allowed body weight.
    sizes: []
  proposed_primitives:
    families:
      - token_name: stevens_pass/family/01
        source_family_name: Gibson
        source_style_reference: Bold, Semi Bold, Medium, Regular, Light, and italic variants
        rationale: Stevens Pass uses one type family across headline, subhead, CTA, and body roles, with weight and italic carrying the distinction.
        fallback_token: universal/family/fallback
        fallback_note: The source does not define a fallback stack.
    weights: []
  hold_for_review:
    - item: semantic body baseline
      reason: The source lists multiple allowed body weights and italics without naming one semantic default for `body/base`.

semantic_recommendations:
  family_aliases:
    - semantic_token: family/heading
      global_token: stevens_pass/family/01
      safe_semantic_token: family/heading_safe
      safe_global_token: universal/family/fallback
      intended_channels:
        - web
        - email
        - ads
      notes: Headline work stays on Gibson.
    - semantic_token: family/body
      global_token: stevens_pass/family/01
      safe_semantic_token: family/body_safe
      safe_global_token: universal/family/fallback
      intended_channels:
        - web
        - email
        - ads
      notes: Body and subhead copy stay on the same Gibson family, with weight carrying the hierarchy.
    - semantic_token: family/action
      global_token: stevens_pass/family/01
      safe_semantic_token: family/action_safe
      safe_global_token: universal/family/fallback
      intended_channels:
        - web
        - email
        - ads
      notes: CTA is explicitly Gibson Regular.
  weight_aliases:
    - semantic_token: weight/heading/base
      global_token: universal/weight/bold
      intended_channels:
        - web
        - email
        - ads
      notes: Headline weight is an explicit direct match to bold.
    - semantic_token: weight/body/base
      global_token: universal/weight/light
      intended_channels:
        - web
        - email
        - ads
      notes: User-approved exception. Stevens Pass body base stages on Light rather than Medium or Regular.
    - semantic_token: weight/body/strong
      global_token: universal/weight/medium
      intended_channels:
        - web
        - email
        - ads
      notes: User-approved exception. Stevens Pass stronger body and subhead emphasis stages on Medium rather than Semi Bold.
    - semantic_token: weight/action/base
      global_token: universal/weight/medium
      intended_channels:
        - web
        - email
        - ads
      notes: User-approved exception. CTA stages on Medium rather than the source-labeled Regular treatment.
  size_aliases: []

