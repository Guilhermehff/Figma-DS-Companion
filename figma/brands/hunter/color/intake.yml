semantic_recommendations:
  role_sets:
    - scope: neutral
      source_family: hunter/hunter_neutral
      rationale: Approved live write. Flurry White and City Grey now form the structural neutral family, keeping the neutral lane separate from the expressive Hunter blue ramp.
      targets:
        - surface/neutral/*
        - on_surface/neutral/*
        - foreground/default
        - foreground/subtle
        - border/default
        - border/subtle
    - scope: brand
      source_family: hunter/mountain_blue
      rationale: Approved live write. Snow Blue and Mountain Blue now form the primary expressive semantic brand lane, with semantic `default/strong/emphasis` staging on `600/700/800`.
      targets:
        - surface/brand/*
        - on_surface/brand/*
        - foreground/brand
        - border/brand
    - scope: brand_secondary
      source_family: hunter/sunrise_orange
      rationale: Approved live write. Sunrise Orange now drives the supporting expressive semantic lane, with semantic `default/strong/emphasis` staging on `600/700/800`.
      targets:
        - surface/brand_secondary/*
        - on_surface/brand_secondary/*
        - foreground/brand_secondary
        - border/brand_secondary
  global_only_families:
    - family: forest_green
      rationale: Approved live write. Forest Green remains available as a governed raw family but is intentionally excluded from the first semantic pass.
  role_exceptions: []

review_readiness:
  intended_review_channels:
    - web
    - email
    - ads
  review_rules:
    - subject: Hunter neutral and expressive split
      channels:
        - web
        - email
        - ads
      rule: Keep Flurry White and City Grey in the neutral lane while Snow Blue and Mountain Blue move together into the expressive blue family.
      source_basis: User-approved live write decision in chat.
    - subject: Hunter expressive lane order
      channels:
        - web
        - email
        - ads
      rule: Use the blue `mountain_blue` ramp as the primary expressive lane, Sunrise Orange as the supporting expressive lane, and preserve Forest Green as global-only in the first pass.
      source_basis: User-approved live write decision in chat.

