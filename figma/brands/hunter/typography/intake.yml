validation:
  extraction_notes:
    - The source is explicit about one family choice and four weight roles, but not about governed numeric sizes, tracking values, or CTA recipes.
    - Hunter uses one repeated Galano Grotesque family across headline, subheadline, body, and contrasting body work.
  governance_notes:
    - Galano Grotesque stages cleanly as one shared family, with weight carrying the hierarchy between H1, H2, body, and the lighter contrasting-copy lane.
    - Approved live write. `weight/body/strong` uses `universal/weight/semibold` so the explicit subheadline treatment remains available through the current semantic theme typography ladder.
    - The source does not define a CTA or action recipe, so the action family and weight remain inherited in the live semantic extension.

