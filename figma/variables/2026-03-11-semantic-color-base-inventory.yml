  reviewed_artifacts:
    - figma/variables/2026-03-10-vail-brand-color-intake.yml
    - figma/variables/2026-03-10-vail-brand-color-preview.md
    - figma/decisions/2026-03-11-shared-semantic-collections-with-brand-extensions.md
    - figma/decisions/2026-03-11-initial-semantic-color-family-model.md
    - figma/decisions/2026-03-11-semantic-feedback-color-family-naming.md
    - figma/variables/2026-03-11-universal-global-feedback-color-proposal.yml
  derivation_rule: Create only the semantic color ladders justified by the approved shared baseline, the governed shared feedback family naming, and the reviewed brand color foundations. Keep the semantic layer palette-scoped and meaning-light. Reserve stable primary, secondary, and tertiary brand slots now. Add shared feedback ladders only when approved universal raw families exist.

recommended_family_strategy:
  model: conservative_palette_slot_baseline
  families_now:
    - neutral
    - brand
    - brand_secondary
    - brand_tertiary
    - positive
    - warning
    - negative
  rationale:
    - neutral is the stable shared ladder for non-brand surfaces and text relationships.
    - brand, brand_secondary, and brand_tertiary reserve the stable cross-brand schema needed by future brands and channels.
    - when a brand lacks secondary or tertiary colors, those semantic slots should still exist and should map to the brand primary family in the brand extension.
    - positive, warning, and negative establish shared feedback ladders for downstream channels without pushing meaning into the raw global layer.
    - the feedback ladders belong in the base semantic collection because they are shared cross-brand semantics, not brand-specific extensions.
    - the current approved inventory still does not justify broader shared slots beyond the current brand and feedback families.

