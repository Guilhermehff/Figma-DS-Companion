  mapping_rationale:
    brand: Vail Digital Blue is the primary digital brand family in the reviewed color intake.
    brand_secondary: Vail Navy is the second approved Vail family and provides the darker companion brand ladder.
    brand_tertiary: Vail Yellow is the third approved Vail family and provides the warm tertiary ladder.
  fallback_rule:
    description: When a brand does not define secondary or tertiary semantic colors, map those slots to the same raw family as the primary brand slot.
    applied_here: false

intentionally_not_written_yet:
  semantic_families:
    - accent/50-950
  exact_extremes:
    - dedicated_white_alias
    - dedicated_black_alias
  vail_raw_families_without_shared_slot: []
  notes:
    - The primary, secondary, and tertiary brand slots are now reserved in the semantic schema. Some brands may resolve more than one slot to the same raw family, but Vail does not.
    - Add dedicated semantic aliases for exact white and black only when a channel baseline shows that the neutral ladder is insufficient.
    - "Shared feedback ladders use `positive`, `warning`, and `negative` at the semantic level."
    - "The base `Semantic: Color` collection now includes `positive`, `warning`, and `negative`, aliased to `universal/green/*`, `universal/yellow/*`, and `universal/red/*`."
    - "The Vail `Semantic: Color` extension does not override the shared feedback ladders."

open_questions:
  - "When channels need exact white or black, should `Semantic: Color` add dedicated aliases or should they continue to rely on the neutral ladder alone?"

