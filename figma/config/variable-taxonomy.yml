version: 12
updated: 2026-04-01
owner: vail_resorts
scope:
  purpose: Token naming and structure rules for the Vail Resorts Design System
  applies_to:
    - global_tokens
    - semantic_tokens
    - channel_tokens

principles:
  - Global tokens are raw values only and do not carry UI meaning.
  - Semantic tokens form an abstraction ladder and remain meaning-light.
  - Channel tokens define final meaning and usage for a specific channel.
  - Each global token category must live in its own dedicated collection.
  - The semantic layer uses one shared published collection named `Semantic: Theme`.
  - "Global collection names default to the `_Global: *` pattern so they remain unpublished and readable in user-facing contexts; `Global: Typography` and `Global: Dimensions` are the approved published exceptions."
  - Figma variable names use slash-delimited paths.
  - Variable names inside a collection must not repeat the collection category.
  - Prefer semantic names over visual-only names.
  - Keep raw values separate from aliases.
  - Track deprecations explicitly.
  - Avoid breaking schema when expanding brands.
  - Brand color ramps must reuse universal neutrals where appropriate and keep a consistent lightness ladder across hues.
  - When a brand review includes multiple foundation types, keep separate intake and preview artifacts per foundation.

governance_sources:
  reserved_groups:
    - universal
  brand_manifest_source: figma/brands/registry.yml
  notes:
    - Governed brand ids come from the brand manifest registry instead of a hardcoded taxonomy list.

token_levels:
  global:
    description: Raw values warehouse for all brands
    rules:
      - Each global token category uses its own dedicated collection containing all brands.
      - "Global collection names default to the `_Global: *` pattern; `Global: Typography` and `Global: Dimensions` are the approved published exceptions."
      - Every global collection uses an initial mode named values.
      - Variable names inside a global collection do not repeat the collection category.
      - Brand separation is done through groups within the collection.
      - The first group is always universal.
      - Brand groups follow after universal.
      - Do not add brand typography groups that only mirror the shared universal baseline when a brand has no established typography guidance.
    naming:
      format: "<group>/<token>"
      notes:
        - group is universal or a brand_id defined in figma/brands/registry.yml
        - token is a scale key or a neutral primitive slot key
        - use underscore for decimal scale keys in Figma (for example 0_5, 1_5)
      examples:
        - universal/slate/100
        - vail/digital_blue/600
        - universal/family/01
        - universal/family_safe/01
        - northstar/family/01
        - space/4

  semantic:
    description: Shared semantic theme layer that aliases Global primitives without becoming channel-specific meaning
    rules:
      - Semantic tokens must alias Global tokens.
      - The semantic layer uses a single published collection named `Semantic: Theme`.
      - Variable names inside a semantic collection do not repeat the collection category.
      - Extended collections are used at the Semantic level to support brands.
      - The base semantic collection must point to universal primitives first.
      - Brand-specific differences should be expressed only in the brand extension collection for `Semantic: Theme`.
      - A semantic extension should override only the tokens that materially differ from the shared universal baseline.
      - Brands without established typography guidance must inherit semantic typography family and weight aliases from the shared base without extension overrides.
      - Semantic naming must stay channel-agnostic while supporting laddering into channel meaning.
      - Semantic typography at this layer includes family and weight only; typography size is published directly from `Global: Typography`.
    ladder_examples:
      - "universal/slate/300 -> surface/neutral/default -> background/module/default"
      - "universal/green/700 -> surface/positive/strong -> background/status/positive"
      - "universal/slate/900 -> foreground/default -> text/body/default"
      - "vail/digital_blue/800 -> surface/brand/default -> background/action/default"
      - "vail/family/01 -> family/heading -> typography/heading/display"
      - "vail/family/02 -> family/body -> typography/body/default"
      - "universal/family_safe/01 -> family/body_safe -> typography/body/email"
      - "universal/weight/black -> weight/heading/strong -> typography/heading/display"
    naming:
      format: "<semantic_role_path>"
      notes:
        - semantic role paths are slash-delimited and stable across channels.
        - semantic theme color uses role groups such as surface, on_surface, foreground, and border.
        - semantic `on_surface/*` tokens are readability-driven and must alias universal neutral primitives chosen by contrast against their paired surface.
        - semantic theme typography keeps role-based paths such as family/heading and weight/heading/base.
      examples:
        - surface/neutral/default
        - on_surface/brand/default
        - foreground/critical
        - border/brand_secondary
        - family/heading
        - family/body_safe
        - weight/body/base
        - weight/heading/strong

  channel:
    description: Final meaning and usage per channel file
    rules:
      - Channel libraries live in separate Figma files from the DS file.
      - Channel color tokens must alias `Semantic: Theme`.
      - "Channel collection names must use the `Channel: *` pattern in title case."
      - Channel naming encodes meaning such as bg, text, border, icon, state.
      - Channel typography is typically expressed as styles in the channel library.
      - Channel text styles bind `fontFamily` and `fontWeight` from `Semantic: Theme`.
      - Channel text styles bind `fontSize` directly from `Global: Typography`.
      - Channel dimensions may define only the modes needed by that channel.
      - Do not introduce responsive modes in Global or Semantic dimensions collections.
    naming:
      format: "<category>/<meaning_path>"
      examples:
        - color/bg/surface
        - color/text/primary
        - color/border/default
        - color/icon/secondary
        - layout/page/padding_inline
        - layout/section/gap
        - component/button/padding_block

exceptions:
  typography:
    description: Typography keeps raw family, weight, and size primitives global-first, but only size publishes to channels
    notes:
      - "`Global: Typography` is intentionally published as a library-visible exception to the default `_Global: *` rule."
      - Publish only the shared universal size ladder from `Global: Typography`.
      - Keep raw family and raw weight primitives hidden from publishing even though the collection is published.
      - Do not create brand-level raw typography primitives when a brand lacks established typography guidance; those brands inherit the shared universal baseline directly.
      - "`Semantic: Theme` carries semantic typography family and weight aliases only."
      - Typography size meanings are assigned in channel text styles, not in the semantic layer.
  dimensions:
    description: Dimensions stay global-first across channels and aggregate sizing related aspects
    notes:
      - Keep sizing scales stable and consistent.
      - Use a single global space ladder at the raw level; sizing meaning is assigned later.
      - "`Global: Dimensions` is intentionally published as a library-visible exception to the default `_Global: *` rule."
      - Global dimensions start at 0_5 and do not include 0 or px.
      - Do not create `Semantic: Dimensions` by default; introduce it only after repeated cross-channel alias roles justify it and record that decision first.
      - If `Semantic: Dimensions` is introduced later, it must remain universal and must not use brand extensions.
      - Responsive spacing variation belongs in channel collections, not in global or semantic dimensions.
      - Web and Email may use channel-specific responsive modes; Ads should remain single-mode unless a real need appears.
      - Channel specific sizing should be rare and justified.

collections:
  - name: "_Global: Color"
    level: global
    category: color
    grouping: by_brand
  - name: "Global: Typography"
    level: global
    category: typography
    grouping: by_brand
  - name: "Global: Dimensions"
    level: global
    category: dimensions
    grouping: universal_first
  - name: "Semantic: Theme"
    level: semantic
    category: theme
    extended_collections: true
    extension_naming:
      base_collection: "Semantic: Theme"
      brand_extension_format: "<Brand>"

slot_admission:
  theme_color:
    rules:
      - New semantic theme color slots require an accepted decision artifact before they are added to the taxonomy or written into Figma.
      - A new semantic theme color slot must support a shared cross-brand or cross-channel need, not a one-off brand hue.
      - Raw brand families that do not yet justify a shared semantic slot remain in `_Global: Color` only.
  theme_typography:
    rules:
      - New semantic theme typography family or weight roles require an accepted decision artifact and a reusable downstream need that cannot be covered by heading, body, or action.
      - New semantic weight steps must be justified by approved role recipes or a shared baseline need.
      - Channel-specific naming should not be introduced at the semantic layer unless another accepted decision explicitly allows it.
  semantic_dimensions:
    rules:
      - "Do not create `Semantic: Dimensions` by default; introduce it only when repeated cross-channel alias roles justify a shared abstraction."
      - "`Semantic: Dimensions`, if added later, must remain universal and must not use brand extensions."
      - "Responsive modes belong in channel dimensions collections, not in `Semantic: Dimensions`."

deprecation_lifecycle:
  statuses:
    - proposed
    - active
    - deprecated
    - removed
  rules:
    - Deprecations must be recorded in figma/decisions before status changes are applied to governed artifacts.
    - Deprecated tokens or manifests must retain a replacement or migration note until they are removed.
    - Removed items should disappear from active inventories but remain discoverable through historical decisions or archived artifacts.

brand_color_foundations:
  description: "Rules for evaluating and expanding brand-specific color families inside `_Global: Color`"
  applies_to:
    - brand guideline images
    - official brand swatches
    - logo colors
    - CTA and digital accent colors
  intake_rules:
    - Prefer official digital RGB or HEX values from the source artifact over visual sampling.
    - Preserve the original source swatches in the intake artifact and mirror them in the preview artifact so later reviews do not depend on reopening the original image.
    - Preserve any source-labeled usage scopes or channel restrictions such as logo-only, typography-only, online-only, or CTA-only so later page, email, and ad reviews can validate usage.
    - Review every source color against existing universal tokens before proposing a new brand family.
    - Exact matches to universal/white or universal/black must reuse the universal token and must not be duplicated under a brand group.
    - Neutral colors may reuse universal neutrals when they are not materially distinct and are not contractually brand-defining.
    - Signature or saturated hues that establish brand identity must receive their own brand family under the brand group.
    - If a brand family is used primarily as a background or system neutral, map it to the semantic neutral role set rather than a brand accent lane.
    - Generate a preview artifact for the proposed brand colors before any Figma write is proposed or executed.
  naming:
    family_format: "<brand>/<family>/<step>"
    notes:
      - family names are hue-based, lowercase, and may use underscore for multi-word source names.
      - prefer recognizable source labels such as digital_blue, navy, yellow.
      - the standard scale is always 100, 200, 300, 400, 500, 600, 700, 800, 900.
    examples:
      - vail/digital_blue/500
      - vail/navy/600
      - northstar/copper/500
    source_anchor_notation:
      format: "<step>_source"
      scope: documentation_only
      notes:
        - Use this suffix in YAML or Markdown artifacts to mark the exact source-provided brand swatch within the scale.
        - Keep Figma global variable names on the clean numeric scale only; do not create duplicate raw variables only to label the anchor.
        - Example: token vail/navy/500 with anchor label 500_source.
  scale_rules:
    working_space: OKLCH
    required_steps:
      - 100
      - 200
      - 300
      - 400
      - 500
      - 600
      - 700
      - 800
      - 900
    anchor_steps:
      default: 500
      commonly_used:
        - 300
        - 400
        - 500
        - 600
        - 700
        - 800
      notes:
        - The source brand swatch should land on the scale step whose lightness band best matches the official source value.
        - 500 is the default starting assumption for middle-value accents, but bright yellows and dark navies may anchor elsewhere.
    generation_rules:
      - Build ramps in a perceptual color space instead of applying a fixed HSL formula.
      - Adjust lightness first, chroma second, and hue last.
      - Preserve hue identity most strongly between 300 and 700.
      - Allow 800 through 900 to lose chroma when needed to maintain consistent darkness and usable white contrast.
      - Avoid introducing hue shifts that make the darkest steps read as a different family.
    target_lightness_bands:
      - step: 100
        oklch_l: "0.98-0.99"
      - step: 200
        oklch_l: "0.93-0.95"
      - step: 300
        oklch_l: "0.84-0.88"
      - step: 400
        oklch_l: "0.74-0.78"
      - step: 500
        oklch_l: "0.63-0.68"
      - step: 600
        oklch_l: "0.53-0.58"
      - step: 700
        oklch_l: "0.43-0.48"
      - step: 800
        oklch_l: "0.31-0.37"
      - step: 900
        oklch_l: "0.18-0.24"
    contrast_targets:
      with_white:
        "800": "4.5:1 preferred"
        "900": "7:1 required"
      with_black:
        "100": "7:1 required"
        "200": "7:1 required"
        "300": "4.5:1 required"
      notes:
        - 900 across every family must remain dark enough for white foreground use.
        - Do not assume a given step passes contrast because another hue passed at that same step; verify each family.
  required_outputs:
    - original_source_swatches_preserved
    - universal_reuse_recommendation
    - family_list
    - source_anchor_step_per_family
    - 100_900_scale_spec
    - contrast_validation_notes
    - downstream_review_guidance
    - preview_artifact_before_write

semantic_theme_color_aliases:
  description: "Role-based semantic theme color slots that alias `_Global: Color` primitives before channel meaning is applied"
  collection_strategy:
    base_collection: "Semantic: Theme"
    base_mode: Default
    brand_extension_format: "<Brand>"
    brand_extension_rule: The base collection defines shared neutral, expressive, status, inverse, and asset role sets. Brand extensions override only the neutral, brand, and brand_secondary role groups that materially differ from the shared universal baseline, including their `_inverse` companions, plus `assets/logo` when that base token is present. A third brand family stays global-only until another accepted decision promotes it into semantic.
  neutral_role_set:
    surfaces:
      - canvas
      - subtle
      - default
      - strong
      - emphasis
    notes:
      - Neutral surfaces use shared foreground tokens instead of paired `on_surface/neutral/*` tokens.
      - The shared base neutral recipe uses the universal slate ladder for surfaces and borders, `foreground/default` or `foreground/subtle` for standard light-polarity content, and the corresponding `_inverse` foreground and border tokens for dark-polarity content unless an approved brand neutral overrides that role set.
  expressive_role_sets:
    lanes:
      - brand
      - brand_secondary
    surface_steps:
      - muted
      - subtle
      - default
      - strong
      - emphasis
    notes:
      - Expressive role sets are shared across brands, but each brand extension may map them to approved raw families.
      - Every expressive semantic token has a governed `_inverse` companion using the same role path plus the `_inverse` suffix.
      - Expressive `on_surface/*` tokens are contrast-derived from `universal/black` or `universal/white`; they are not hue-tinted by the expressive family.
      - If a brand has a third approved family, keep it global-only until another accepted decision promotes a new semantic lane.
  status_role_sets:
    lanes:
      - positive
      - warning
      - critical
    surface_steps:
      - muted
      - subtle
      - default
      - strong
      - emphasis
    notes:
      - Shared status roles remain on the base collection and are not brand-specific unless another accepted decision explicitly allows it.
      - Every status semantic token has a governed `_inverse` companion using the same role path plus the `_inverse` suffix.
      - Status `on_surface/*` tokens are contrast-derived from `universal/black` or `universal/white`; they are not lane-tinted.
  foreground_tokens:
    - foreground/default
    - foreground/default_inverse
    - foreground/subtle
    - foreground/subtle_inverse
    - foreground/brand
    - foreground/brand_inverse
    - foreground/brand_secondary
    - foreground/brand_secondary_inverse
    - foreground/positive
    - foreground/positive_inverse
    - foreground/warning
    - foreground/warning_inverse
    - foreground/critical
    - foreground/critical_inverse
  asset_tokens:
    - assets/logo
  border_tokens:
    - border/default
    - border/default_inverse
    - border/subtle
    - border/subtle_inverse
    - border/brand
    - border/brand_inverse
    - border/brand_secondary
    - border/brand_secondary_inverse
    - border/positive
    - border/positive_inverse
    - border/warning
    - border/warning_inverse
    - border/critical
    - border/critical_inverse
  examples:
    - surface/neutral/default
    - surface/neutral/default_inverse
    - surface/brand/strong
    - surface/brand/strong_inverse
    - on_surface/brand_secondary/subtle
    - on_surface/brand_secondary/subtle_inverse
    - surface/critical/default
    - surface/critical/default_inverse
    - foreground/brand
    - foreground/brand_inverse
    - border/subtle
    - border/subtle_inverse
  notes:
    - Semantic theme color is role-based and channel-agnostic; do not encode hover, pressed, or component names in this layer.
    - The `_inverse` suffix is the governed semantic polarity companion naming convention.
    - "`on_surface/*` must be verified against the paired semantic surface at write time and resolved to `universal/black` or `universal/white` based on contrast."
    - Brand-specific families used as structural surfaces should override the neutral role set before they are considered for brand or brand_secondary.
    - "`assets/logo` is a governed string token in the base semantic theme collection and should be overridden in each brand extension to the brand display name."
    - Channel libraries own usage-first naming such as background/action/default, text/body/default, and border/input/default.

brand_typography_foundations:
  description: "Rules for evaluating and documenting brand typography using `Global: Typography` primitives, `Semantic: Theme` family and weight aliases, and later channel style recipes"
  applies_to:
    - brand guideline images
    - official typography spec pages
    - marketing typography guides
    - editorial or campaign typography rules
  intake_rules:
    - Preserve the original source typography roles in the intake artifact and mirror them in the preview artifact so later reviews do not depend on reopening the original image.
    - Separate raw primitives from usage-bearing role recipes.
    - "Review every source family against existing `Global: Typography` primitives before proposing a new brand family token."
    - Reuse universal weight primitives by default; raw weights should remain universal unless a truly distinct numeric value is required later.
    - If the source omits raw sizes, provisionally map each role to the existing universal size ladder and mark the mapping as assumed until design validation confirms it.
    - If the source omits safe families, default the safe-family reference to universal/family_safe/01.
    - Recommend semantic theme family aliases using family/heading, family/body, and family/action plus the safe counterparts family/heading_safe, family/body_safe, and family/action_safe.
    - Recommend role-scoped semantic theme weight aliases using emphasis keys such as subtle, base, and strong.
    - Keep typography sizes on the shared global size ladder and bind them directly from `Global: Typography` in channel text styles.
    - Capture the typography rules needed for later page, email, and ad review, including casing, punctuation, safe-family behavior, and channel-safe expectations.
    - "Do not encode role names such as eyebrow, headline, subhead, body, or cta inside `Global: Typography` primitive names."
    - Generate a preview artifact for the proposed typography before any Figma write is proposed or executed.
  primitives:
    family_naming:
      format: "<brand>/family/<slot>"
      preferred_slots:
        - 01
        - 02
        - 03
        - 04
      notes:
        - family slots must be structural and reusable across roles.
        - use neutral numeric slots in the live brand-local family order rather than encoding usage or emphasis in the primitive name.
        - if one family serves multiple roles, keep one family token and map multiple role recipes to it.
      examples:
        - vail/family/01
        - vail/family/02
        - breckenridge/family/02
    safe_family_naming:
      format: "<brand>/family_safe/<slot>"
      preferred_slots:
        - 01
        - 02
        - 03
        - 04
      notes:
        - safe-family slots are raw constrained-channel substitutes for the brand family lane.
        - use neutral numeric slots in first-use order from the approved safe-family source.
        - do not mirror the brand-family lane blindly when the safe-family source only defines one or two distinct families.
      examples:
        - universal/family_safe/01
        - vail/family_safe/01
        - beaver_creek/family_safe/02
    weight_naming:
      format: "<group>/weight/<weight_key>"
      notes:
        - weight tokens are raw numeric values and should reuse universal tokens whenever possible.
        - use universal/weight/black as the shared raw black weight when a source specifies Black without a separate numeric exception.
        - add a brand-specific weight token only if the value or mapping is truly brand-specific and cannot be governed universally.
      examples:
        - universal/weight/medium
        - universal/weight/black
    size_naming:
      format: "universal/size/<step>"
      notes:
        - continue using the shared universal size ladder for raw sizes.
        - if a source guide only provides relational size rules, preserve the relation in role recipes and map the working assumption to an existing universal size token.
  theme_family_aliases:
    collection_strategy:
      base_collection: "Semantic: Theme"
      base_mode: values
      brand_extension_format: "<Brand>"
      brand_extension_rule: The base collection aliases universal families. Each brand extension overrides only the semantic tokens that differ for that brand.
    default_tokens:
      - family/heading
      - family/heading_safe
      - family/body
      - family/body_safe
      - family/action
      - family/action_safe
    notes:
      - safe aliases are semantic substitutes for channels such as email that need safe-family behavior.
      - the base collection should point safe aliases to universal/family_safe/01.
      - brand extensions should override safe aliases only when an approved safe-family source defines a different constrained-channel family for that brand.
  theme_weight_aliases:
    collection_strategy:
      base_collection: "Semantic: Theme"
      base_mode: values
      brand_extension_format: "<Brand>"
      brand_extension_rule: Keep weight aliases in the base collection unless a brand-specific semantic override is explicitly approved.
    format: "weight/<role>/<emphasis_step>"
    recommended_roles:
      - heading
      - body
      - action
    default_emphasis_steps:
      - subtle
      - base
      - strong
    examples:
      - weight/body/subtle
      - weight/body/base
      - weight/heading/strong
      - weight/action/strong
    notes:
      - semantic theme weight aliases are role-scoped and meaning-light; they map approved role recipes to universal raw weights.
      - do not force every role to use every emphasis step; create only the steps that are actually needed.
      - do not add safe weight aliases; constrained-channel safety is handled at the family layer.
  published_global_size_ladder:
    collection_strategy:
      base_collection: "Global: Typography"
      base_mode: values
    format: "universal/size/<step>"
    published_scope:
      - universal/size/100
      - universal/size/200
      - universal/size/300
      - universal/size/400
      - universal/size/500
      - universal/size/600
      - universal/size/700
      - universal/size/800
    notes:
      - published typography sizes stay on the shared universal size ladder.
      - channel text styles bind size directly from `Global: Typography` instead of consuming semantic size aliases.
      - do not create semantic size aliases in `Semantic: Theme`.
  role_recipe_rules:
    description: Usage-bearing typography specs that later become channel styles
    required_fields:
      - role_name
      - source_family
      - proposed_family_token
      - weight
      - casing
      - tracking
      - leading_rule
      - punctuation_rule
      - sample_copy
    notes:
      - "role recipes are review artifacts and style guidance, not `Global: Typography` variable names."
      - channel typography styles may later implement these recipes in channel libraries.
      - prefer semantic family aliases such as family/heading, family/body, and family/action; reserve family/cta only if the semantic layer intentionally mirrors channel-specific language.
      - email and other constrained channels should consume the corresponding safe aliases, such as family/body_safe.
      - document the semantic family mapping, semantic weight mapping, and global size mapping alongside the raw primitive mapping so later channel libraries can bind the approved contract without guessing.
    example_roles:
      - eyebrow
      - headline
      - subhead
      - body
      - cta
  required_outputs:
    - original_source_roles_preserved
    - primitive_reuse_recommendation
    - proposed_family_primitives
    - semantic_family_mapping
    - safe_semantic_family_mapping
    - semantic_weight_mapping
    - global_size_mapping
    - proposed_weight_reuse_or_additions
    - role_recipe_spec
    - assumed_size_mapping_when_raw_sizes_are_missing
    - downstream_review_guidance
    - hold_for_review_summary_when_needed
    - preview_artifact_before_write

required_fields:
  - level
  - collection
  - mode
  - name
  - type
  - value
  - status

recommended_statuses:
  - active
  - deprecated
  - proposed

review_checks:
  - Flag brand ids that are not present in figma/brands/registry.yml.
  - Flag names that use numeric suffixes without scale meaning.
  - Flag names that encode temporary migration context.
  - Flag duplicated values with inconsistent semantic names.
  - Flag semantic tokens that resolve to different primitives without using semantic extended collections.
  - Flag extension manifests that restate inherited base aliases without changing the target primitive.
  - Flag channel tokens created in the DS file instead of the channel file.
  - "Flag global collections that do not use the `_Global: *` pattern unless they are the approved published exceptions `Global: Typography` or `Global: Dimensions`."
  - Flag global collections whose default mode is not named values.
  - Flag variables that repeat the collection category in their path.
  - Flag writes performed without confirming the target file.
  - Flag brand-specific duplicates of universal/white or universal/black.
  - Flag brand color families that do not use the standard 50 to 950 scale.
  - Flag brand color artifacts that omit the documented source anchor step.
  - Flag 900 or 950 brand color steps that do not meet the white-contrast requirement.
  - Flag brand color proposals that do not include a preview artifact before write.
  - Flag brand color artifacts that do not preserve the original source swatches in both intake and preview.
  - Flag brand color artifacts that omit source usage scopes or review guidance needed for later page, email, or ad review.
  - "Flag typography role names written into `Global: Typography` primitive names."
  - Flag typography proposals that invent new raw size values when the source only provided relational sizing rules and an existing universal size token could have been used provisionally.
  - Flag typography artifacts that do not preserve the original source roles in both intake and preview.
  - Flag typography artifacts that omit semantic safe aliases or downstream review guidance for email and other constrained channels.
  - "Flag `Semantic: Theme` typography inventories that use flat raw-like weight aliases such as weight/medium instead of approved role-scoped semantic ladders."
  - Flag manifests or docs that describe semantic size aliases instead of published global typography sizes.
  - Flag typography proposals that do not include a preview artifact before write.
