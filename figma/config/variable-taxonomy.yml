version: 2
updated: 2026-03-10
owner: vail_resorts
scope:
  purpose: Token naming and structure rules for the Vail Resorts Design System
  applies_to:
    - global_tokens
    - semantic_tokens
    - channel_tokens
    - component_scoped_variables

principles:
  - Global tokens are raw values only and do not carry UI meaning.
  - Semantic tokens form an abstraction ladder and remain meaning-light.
  - Channel tokens define final meaning and usage for a specific channel.
  - Each global and semantic token category must live in its own dedicated collection.
  - Global collection names must start with "_" so they remain unpublished.
  - Figma variable names use slash-delimited paths.
  - Variable names inside a collection must not repeat the collection category.
  - Prefer semantic names over visual-only names.
  - Keep raw values separate from aliases.
  - Track deprecations explicitly.
  - Avoid breaking schema when expanding brands.

brands:
  - universal
  - vail
  - beaver_creek
  - breckenridge
  - park_city

token_levels:
  global:
    description: Raw values warehouse for all brands
    rules:
      - Each global token category uses its own dedicated collection containing all brands.
      - Global collection names must start with "_" so they remain unpublished.
      - Every _global collection uses an initial mode named values.
      - Variable names inside a global collection do not repeat the collection category.
      - Brand separation is done through groups within the collection.
      - The first group is always universal.
      - Brand groups follow after universal.
    naming:
      format: "<group>/<token>"
      notes:
        - group is one of: universal, vail, beaver_creek, breckenridge, park_city
        - token is a scale key or a descriptive primitive key
        - use underscore for decimal scale keys in Figma (for example 0_5, 1_5)
      examples:
        - universal/slate/50
        - vail/blue/600
        - universal/family/sans
        - universal/family/web_safe
        - park_city/family/primary
        - space/4

  semantic:
    description: Abstraction ladder that aliases Global, still not final meaning
    rules:
      - Semantic tokens must alias Global tokens.
      - Each semantic token category uses its own dedicated collection.
      - Variable names inside a semantic collection do not repeat the collection category.
      - Extended collections are used at the Semantic level to support brands.
      - Semantic naming must support laddering into channel meaning.
    ladder_examples:
      - "universal/slate/50 -> neutral/50 -> color/bg/surface"
      - "universal/family/sans -> family/sans -> typography/body/default"
    naming:
      format: "<semantic_group>/<scale_or_role>"
      notes:
        - semantic_group is category-like and meaning-light (e.g., gray, blue, neutral)
        - scale_or_role is typically a scale key (50, 60, 70) or a role key for typography
      examples:
        - gray/50
        - blue/600
        - neutral/50
        - family/primary
        - size/100
        - weight/regular

  channel:
    description: Final meaning and usage per channel file
    rules:
      - Channel libraries live in separate Figma files from the DS file.
      - Channel tokens must alias Semantic tokens.
      - Channel naming encodes meaning such as bg, text, border, icon, state.
      - Channel typography is typically expressed as styles in the channel library.
    naming:
      format: "<category>/<meaning_path>"
      examples:
        - color/bg/surface
        - color/text/primary
        - color/border/default
        - color/icon/secondary

exceptions:
  dimensions:
    description: Dimensions stay global-first across channels and aggregate sizing related aspects
    notes:
      - Keep sizing scales stable and consistent.
      - Use a single global space ladder at the raw level; sizing meaning is assigned later.
      - Global dimensions start at 0_5 and do not include 0 or px.
      - Channel specific sizing should be rare and justified.

collections:
  - name: _global_color
    level: global
    category: color
    grouping: by_brand
  - name: _global_typography
    level: global
    category: typography
    grouping: by_brand
  - name: _global_dimensions
    level: global
    category: dimensions
    grouping: universal_first
  - name: semantic_color
    level: semantic
    category: color
    extended_collections: true
  - name: semantic_typography
    level: semantic
    category: typography
    extended_collections: true

component_scoped_variables:
  description: Variables scoped to a component or pattern
  rules:
    - Only introduce if semantic and channel tokens cannot cover the need.
    - Must reference which component owns it.
    - Must not duplicate global or semantic scales.
  naming:
    format: "component/<component_name>/<part>/<property>/<state_optional>"
    examples:
      - component/button/container/color/default
      - component/input/border/color/focus

required_fields:
  - level
  - collection
  - mode
  - name
  - type
  - value
  - status

recommended_statuses:
  - active
  - deprecated
  - proposed

review_checks:
  - Flag names that use numeric suffixes without scale meaning.
  - Flag names that encode temporary migration context.
  - Flag duplicated values with inconsistent semantic names.
  - Flag semantic tokens that resolve to different primitives without using semantic extended collections.
  - Flag channel tokens created in the DS file instead of the channel file.
  - Flag global collections that do not start with "_".
  - Flag _global collections whose default mode is not named values.
  - Flag variables that repeat the collection category in their path.
  - Flag writes performed without confirming the target file.
