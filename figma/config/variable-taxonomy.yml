version: 3
updated: 2026-03-10
owner: vail_resorts
scope:
  purpose: Token naming and structure rules for the Vail Resorts Design System
  applies_to:
    - global_tokens
    - semantic_tokens
    - channel_tokens
    - component_scoped_variables

principles:
  - Global tokens are raw values only and do not carry UI meaning.
  - Semantic tokens form an abstraction ladder and remain meaning-light.
  - Channel tokens define final meaning and usage for a specific channel.
  - Each global and semantic token category must live in its own dedicated collection.
  - Global collection names must start with "_" so they remain unpublished.
  - Figma variable names use slash-delimited paths.
  - Variable names inside a collection must not repeat the collection category.
  - Prefer semantic names over visual-only names.
  - Keep raw values separate from aliases.
  - Track deprecations explicitly.
  - Avoid breaking schema when expanding brands.
  - Brand color ramps must reuse universal neutrals where appropriate and keep a consistent lightness ladder across hues.
  - When a brand review includes multiple foundation types, keep separate intake and preview artifacts per foundation.

brands:
  - universal
  - vail
  - beaver_creek
  - breckenridge
  - park_city

token_levels:
  global:
    description: Raw values warehouse for all brands
    rules:
      - Each global token category uses its own dedicated collection containing all brands.
      - Global collection names must start with "_" so they remain unpublished.
      - Every _global collection uses an initial mode named values.
      - Variable names inside a global collection do not repeat the collection category.
      - Brand separation is done through groups within the collection.
      - The first group is always universal.
      - Brand groups follow after universal.
    naming:
      format: "<group>/<token>"
      notes:
        - group is one of: universal, vail, beaver_creek, breckenridge, park_city
        - token is a scale key or a descriptive primitive key
        - use underscore for decimal scale keys in Figma (for example 0_5, 1_5)
      examples:
        - universal/slate/50
        - vail/blue/600
        - universal/family/primary
        - universal/family/web_safe
        - park_city/family/primary
        - space/4

  semantic:
    description: Abstraction ladder that aliases Global, still not final meaning
    rules:
      - Semantic tokens must alias Global tokens.
      - Each semantic token category uses its own dedicated collection.
      - Variable names inside a semantic collection do not repeat the collection category.
      - Extended collections are used at the Semantic level to support brands.
      - Semantic naming must support laddering into channel meaning.
    ladder_examples:
      - "universal/slate/50 -> neutral/50 -> color/bg/surface"
      - "vail/family/display -> family/heading -> typography/heading/display"
      - "vail/family/primary -> family/body -> typography/body/default"
      - "universal/family/web_safe -> family/body_safe -> typography/body/email"
    naming:
      format: "<semantic_group>/<scale_or_role>"
      notes:
        - semantic_group is category-like and meaning-light (e.g., gray, blue, neutral)
        - scale_or_role is typically a scale key (50, 60, 70) or a role key for typography
      examples:
        - gray/50
        - blue/600
        - neutral/50
        - family/heading
        - family/body_safe
        - size/100
        - weight/regular

  channel:
    description: Final meaning and usage per channel file
    rules:
      - Channel libraries live in separate Figma files from the DS file.
      - Channel tokens must alias Semantic tokens.
      - Channel naming encodes meaning such as bg, text, border, icon, state.
      - Channel typography is typically expressed as styles in the channel library.
    naming:
      format: "<category>/<meaning_path>"
      examples:
        - color/bg/surface
        - color/text/primary
        - color/border/default
        - color/icon/secondary

exceptions:
  dimensions:
    description: Dimensions stay global-first across channels and aggregate sizing related aspects
    notes:
      - Keep sizing scales stable and consistent.
      - Use a single global space ladder at the raw level; sizing meaning is assigned later.
      - Global dimensions start at 0_5 and do not include 0 or px.
      - Channel specific sizing should be rare and justified.

collections:
  - name: _global_color
    level: global
    category: color
    grouping: by_brand
  - name: _global_typography
    level: global
    category: typography
    grouping: by_brand
  - name: _global_dimensions
    level: global
    category: dimensions
    grouping: universal_first
  - name: semantic_color
    level: semantic
    category: color
    extended_collections: true
  - name: semantic_typography
    level: semantic
    category: typography
    extended_collections: true

brand_color_foundations:
  description: Rules for evaluating and expanding brand-specific color families inside _global_color
  applies_to:
    - brand guideline images
    - official brand swatches
    - logo colors
    - CTA and digital accent colors
  intake_rules:
    - Prefer official digital RGB or HEX values from the source artifact over visual sampling.
    - Preserve the original source swatches in the intake artifact and mirror them in the preview artifact so later reviews do not depend on reopening the original image.
    - Preserve any source-labeled usage scopes or channel restrictions such as logo-only, typography-only, online-only, or CTA-only so later page, email, and ad reviews can validate usage.
    - Review every source color against existing universal tokens before proposing a new brand family.
    - Exact matches to universal/white or universal/black must reuse the universal token and must not be duplicated under a brand group.
    - Neutral colors may reuse universal neutrals when they are not materially distinct and are not contractually brand-defining.
    - Signature or saturated hues that establish brand identity must receive their own brand family under the brand group.
    - Generate a preview artifact for the proposed brand colors before any Figma write is proposed or executed.
  naming:
    family_format: "<brand>/<family>/<step>"
    notes:
      - family names are hue-based, lowercase, and may use underscore for multi-word source names.
      - prefer recognizable source labels such as digital_blue, navy, yellow.
      - the standard scale is always 50, 100, 200, 300, 400, 500, 600, 700, 800, 900, 950.
    examples:
      - vail/digital_blue/500
      - vail/navy/600
      - beaver_creek/gold/500
    source_anchor_notation:
      format: "<step>_source"
      scope: documentation_only
      notes:
        - Use this suffix in YAML or Markdown artifacts to mark the exact source-provided brand swatch within the scale.
        - Keep Figma global variable names on the clean numeric scale only; do not create duplicate raw variables only to label the anchor.
        - Example: token vail/navy/500 with anchor label 500_source.
  scale_rules:
    working_space: OKLCH
    required_steps:
      - 50
      - 100
      - 200
      - 300
      - 400
      - 500
      - 600
      - 700
      - 800
      - 900
      - 950
    anchor_steps:
      default: 500
      commonly_used:
        - 300
        - 400
        - 500
        - 600
        - 700
        - 800
      notes:
        - The source brand swatch should land on the scale step whose lightness band best matches the official source value.
        - 500 is the default starting assumption for middle-value accents, but bright yellows and dark navies may anchor elsewhere.
    generation_rules:
      - Build ramps in a perceptual color space instead of applying a fixed HSL formula.
      - Adjust lightness first, chroma second, and hue last.
      - Preserve hue identity most strongly between 300 and 700.
      - Allow 800 through 950 to lose chroma when needed to maintain consistent darkness and usable white contrast.
      - Avoid introducing hue shifts that make the darkest steps read as a different family.
    target_lightness_bands:
      - step: 50
        oklch_l: "0.98-0.99"
      - step: 100
        oklch_l: "0.95-0.96"
      - step: 200
        oklch_l: "0.90-0.92"
      - step: 300
        oklch_l: "0.83-0.86"
      - step: 400
        oklch_l: "0.74-0.78"
      - step: 500
        oklch_l: "0.63-0.68"
      - step: 600
        oklch_l: "0.53-0.58"
      - step: 700
        oklch_l: "0.44-0.48"
      - step: 800
        oklch_l: "0.35-0.39"
      - step: 900
        oklch_l: "0.26-0.30"
      - step: 950
        oklch_l: "0.18-0.22"
    contrast_targets:
      with_white:
        "800": "4.5:1 preferred"
        "900": "7:1 required"
        "950": "7:1 required"
      with_black:
        "50": "7:1 required"
        "100": "7:1 required"
        "200": "4.5:1 required"
      notes:
        - 950 across every family must remain dark enough for white foreground use.
        - Do not assume a given step passes contrast because another hue passed at that same step; verify each family.
  required_outputs:
    - original_source_swatches_preserved
    - universal_reuse_recommendation
    - family_list
    - source_anchor_step_per_family
    - 50_950_scale_spec
    - contrast_validation_notes
    - downstream_review_guidance
    - preview_artifact_before_write

brand_typography_foundations:
  description: Rules for evaluating and documenting brand typography using _global_typography primitives plus later channel style recipes
  applies_to:
    - brand guideline images
    - official typography spec pages
    - marketing typography guides
    - editorial or campaign typography rules
  intake_rules:
    - Preserve the original source typography roles in the intake artifact and mirror them in the preview artifact so later reviews do not depend on reopening the original image.
    - Separate raw primitives from usage-bearing role recipes.
    - Review every source family against existing _global_typography primitives before proposing a new brand family token.
    - Reuse universal weight primitives by default; raw weights should remain universal unless a truly distinct numeric value is required later.
    - If the source omits raw sizes, provisionally map each role to the existing universal size ladder and mark the mapping as assumed until design validation confirms it.
    - If the source omits fallback or web-safe families, default the family fallback reference to universal/family/web_safe.
    - Recommend semantic family aliases using family/heading, family/body, and family/action plus the safe counterparts family/heading_safe, family/body_safe, and family/action_safe.
    - Capture the typography rules needed for later page, email, and ad review, including casing, punctuation, fallback behavior, and channel-safe expectations.
    - Do not encode role names such as eyebrow, headline, subhead, body, or cta inside _global_typography primitive names.
    - Generate a preview artifact for the proposed typography before any Figma write is proposed or executed.
  primitives:
    family_naming:
      format: "<brand>/family/<slot>"
      preferred_slots:
        - primary
        - secondary
        - display
        - accent
        - web_safe
      notes:
        - family slots must be structural and reusable across roles.
        - if a family is used mainly for headlines, prefer display over headline because headline is a style role, not a raw primitive.
        - if one family serves multiple roles, keep one family token and map multiple role recipes to it.
        - universal/family/web_safe is the single raw safe-family placeholder used by semantic safe aliases when email or other constrained channels cannot rely on brand fonts.
      examples:
        - vail/family/display
        - vail/family/primary
        - beaver_creek/family/accent
    weight_naming:
      format: "<group>/weight/<weight_key>"
      notes:
        - weight tokens are raw numeric values and should reuse universal tokens whenever possible.
        - use universal/weight/black as the shared raw black weight when a source specifies Black without a separate numeric exception.
        - add a brand-specific weight token only if the value or mapping is truly brand-specific and cannot be governed universally.
      examples:
        - universal/weight/medium
        - universal/weight/black
    size_naming:
      format: "universal/size/<step>"
      notes:
        - continue using the shared universal size ladder for raw sizes.
        - if a source guide only provides relational size rules, preserve the relation in role recipes and map the working assumption to an existing universal size token.
  semantic_family_aliases:
    default_tokens:
      - family/heading
      - family/heading_safe
      - family/body
      - family/body_safe
      - family/action
      - family/action_safe
    notes:
      - safe aliases are semantic substitutes for channels such as email that need safe-family behavior.
      - until a more specific safe raw family is approved, safe aliases should point to universal/family/web_safe.
  role_recipe_rules:
    description: Usage-bearing typography specs that later become channel styles
    required_fields:
      - role_name
      - source_family
      - proposed_family_token
      - weight
      - casing
      - tracking
      - leading_rule
      - punctuation_rule
      - sample_copy
    notes:
      - role recipes are review artifacts and style guidance, not _global_typography variable names.
      - channel typography styles may later implement these recipes in channel libraries.
      - prefer semantic family aliases such as family/heading, family/body, and family/action; reserve family/cta only if the semantic layer intentionally mirrors channel-specific language.
      - email and other constrained channels should consume the corresponding safe aliases, such as family/body_safe.
    example_roles:
      - eyebrow
      - headline
      - subhead
      - body
      - cta
  required_outputs:
    - original_source_roles_preserved
    - primitive_reuse_recommendation
    - proposed_family_primitives
    - semantic_family_mapping
    - safe_semantic_family_mapping
    - proposed_weight_reuse_or_additions
    - role_recipe_spec
    - assumed_size_mapping_when_raw_sizes_are_missing
    - downstream_review_guidance
    - hold_for_review_summary_when_needed
    - preview_artifact_before_write

component_scoped_variables:
  description: Variables scoped to a component or pattern
  rules:
    - Only introduce if semantic and channel tokens cannot cover the need.
    - Must reference which component owns it.
    - Must not duplicate global or semantic scales.
  naming:
    format: "component/<component_name>/<part>/<property>/<state_optional>"
    examples:
      - component/button/container/color/default
      - component/input/border/color/focus

required_fields:
  - level
  - collection
  - mode
  - name
  - type
  - value
  - status

recommended_statuses:
  - active
  - deprecated
  - proposed

review_checks:
  - Flag names that use numeric suffixes without scale meaning.
  - Flag names that encode temporary migration context.
  - Flag duplicated values with inconsistent semantic names.
  - Flag semantic tokens that resolve to different primitives without using semantic extended collections.
  - Flag channel tokens created in the DS file instead of the channel file.
  - Flag global collections that do not start with "_".
  - Flag _global collections whose default mode is not named values.
  - Flag variables that repeat the collection category in their path.
  - Flag writes performed without confirming the target file.
  - Flag brand-specific duplicates of universal/white or universal/black.
  - Flag brand color families that do not use the standard 50 to 950 scale.
  - Flag brand color artifacts that omit the documented source anchor step.
  - Flag 900 or 950 brand color steps that do not meet the white-contrast requirement.
  - Flag brand color proposals that do not include a preview artifact before write.
  - Flag brand color artifacts that do not preserve the original source swatches in both intake and preview.
  - Flag brand color artifacts that omit source usage scopes or review guidance needed for later page, email, or ad review.
  - Flag typography role names written into _global_typography primitive names.
  - Flag typography proposals that invent new raw size values when the source only provided relational sizing rules and an existing universal size token could have been used provisionally.
  - Flag typography artifacts that do not preserve the original source roles in both intake and preview.
  - Flag typography artifacts that omit semantic safe aliases or downstream review guidance for email and other constrained channels.
  - Flag typography proposals that do not include a preview artifact before write.
