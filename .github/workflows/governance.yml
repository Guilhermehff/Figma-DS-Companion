name: Governance

on:
  push:
  pull_request:

jobs:
  governance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Run tests
        run: pytest

      - name: Validate governance data
        run: python -m scripts.figma_governance validate

      - name: Rebuild compatibility registry
        run: python -m scripts.figma_governance build-registry

      - name: Ensure generated registry is committed
        run: git diff --exit-code figma/variables/registry.yml
