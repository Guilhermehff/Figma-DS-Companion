version: 1
updated: 2026-03-14
brand_id: typography_override
display_name: Typography Override
status: active
owners:
  - governance
supported_channels:
  - web
  - ads
figma:
  design_system_file_url: https://example.com/figma/typography-override
  global_collections:
    color_id: global-color
    typography_id: global-typography
    dimensions_id: global-dimensions
  semantic_extensions:
    theme:
      collection_name: Typography Override
      collection_id: semantic-theme-typography-override
      parent_collection: "Semantic: Theme"
      parent_collection_id: semantic-theme
artifacts:
  color:
    intake_artifact: brands/typography-override/color-intake.yml
    preview_artifact: brands/typography-override/color-preview.md
    decision_artifacts: []
  typography:
    intake_artifact: brands/typography-override/typography-intake.yml
    preview_artifact: brands/typography-override/typography-preview.md
    decision_artifacts: []
semantic_overrides:
  theme:
    status: active
    color:
      override_scopes: []
      inherited_from_base:
        - surface/neutral/*
        - on_surface/neutral/*
        - surface/brand/*
        - on_surface/brand/*
        - surface/brand_secondary/*
        - on_surface/brand_secondary/*
        - foreground/default
        - foreground/subtle
        - foreground/inverse
        - foreground/brand
        - foreground/brand_secondary
        - border/default
        - border/subtle
        - border/brand
        - border/brand_secondary
        - surface/positive/*
        - on_surface/positive/*
        - surface/warning/*
        - on_surface/warning/*
        - surface/critical/*
        - on_surface/critical/*
        - foreground/positive
        - foreground/warning
        - foreground/critical
        - border/positive
        - border/warning
        - border/critical
      notes: []
    typography:
      override_scopes:
        - semantic_token: family/heading
          alias_of: typography_override/family/display
        - semantic_token: family/body
          alias_of: typography_override/family/primary
        - semantic_token: family/action
          alias_of: typography_override/family/primary
      inherited_from_base:
        - family/*_safe
        - weight/*
        - size/*
      notes: []
notes: []
