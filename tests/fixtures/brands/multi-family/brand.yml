version: 1
updated: 2026-03-14
brand_id: multi_family
display_name: Multi Family
status: active
owners:
  - governance
supported_channels:
  - web
  - email
figma:
  design_system_file_url: https://example.com/figma/multi-family
  global_collections:
    color_id: global-color
    typography_id: global-typography
    dimensions_id: global-dimensions
  semantic_extensions:
    theme:
      collection_name: Multi Family
      collection_id: semantic-theme-multi-family
      parent_collection: "Semantic: Theme"
      parent_collection_id: semantic-theme
artifacts:
  color:
    intake_artifact: brands/multi-family/color-intake.yml
    preview_artifact: brands/multi-family/color-preview.md
    decision_artifacts: []
  typography:
    intake_artifact: brands/multi-family/typography-intake.yml
    preview_artifact: brands/multi-family/typography-preview.md
    decision_artifacts: []
semantic_overrides:
  theme:
    status: active
    color:
      override_scopes:
        - scope: brand
          source_family: multi_family/blue
          targets:
            - surface/brand/*
            - on_surface/brand/*
            - foreground/brand
            - border/brand
        - scope: brand_secondary
          source_family: multi_family/gold
          targets:
            - surface/brand_secondary/*
            - on_surface/brand_secondary/*
            - foreground/brand_secondary
            - border/brand_secondary
      inherited_from_base:
        - surface/neutral/*
        - on_surface/neutral/*
        - foreground/default
        - foreground/subtle
        - foreground/inverse
        - border/default
        - border/subtle
        - surface/positive/*
        - on_surface/positive/*
        - surface/warning/*
        - on_surface/warning/*
        - surface/critical/*
        - on_surface/critical/*
        - foreground/positive
        - foreground/warning
        - foreground/critical
        - border/positive
        - border/warning
        - border/critical
      notes: []
    typography:
      override_scopes: []
      inherited_from_base:
        - family/*
        - weight/*
        - size/*
      notes: []
notes: []
